<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;touch-action:none;}
html,body{margin:0;height:100%;overflow:hidden;}

body{
 display:flex;
 flex-direction:column;
 justify-content:space-between;
 font-family:Arial;
}

.menu{
 height:60px;
 display:flex;
 justify-content:center;
 align-items:center;
 gap:12px;
}
.black{background:#222;color:white;}
.white{background:#ddd;}

.piece{font-size:28px;}

#board{
 width:100vw;
 height:100vw;
 max-width:100vh;
 max-height:100vh;
 margin:auto;
 display:grid;
 grid-template-columns:repeat(8,1fr);
}

.cell{
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:4.5vw;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

#drag{
 position:fixed;
 pointer-events:none;
 font-size:32px;
 transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="topMenu" class="menu black"></div>
<div id="board"></div>
<div id="bottomMenu" class="menu white"></div>
<div id="drag"></div>

<script src="engine.js"></script>
</body>
</html>
