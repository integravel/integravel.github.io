<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xadrez Custom</title>

<style>

body{
 margin:0;
 height:100vh;
 display:flex;
 flex-direction:column;
 background:#222;
 font-family:sans-serif;
 overflow:hidden;
}

/* MENUS */
.menu{
 height:120px;
 display:flex;
 justify-content:center;
 align-items:center;
 gap:12px;
 background:#333;
}

.menuPiece{
 font-size:48px;
}

/* TABULEIRO */
#boardContainer{
 flex:1;
 display:flex;
 justify-content:center;
 align-items:center;
}

#board{
 width:100vw;
 max-width:500px;
 aspect-ratio:1;
 display:grid;
 grid-template-columns:repeat(8,1fr);
}

.cell{
 display:flex;
 justify-content:center;
 align-items:center;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.piece{
 font-size:48px;
 pointer-events:none;
}

/* DRAG */
#drag{
 position:fixed;
 font-size:48px;
 pointer-events:none;
 transform:translate(-50%,-50%);
}

/* CONTROLES */
#controls{
 height:80px;
 display:flex;
 justify-content:center;
 align-items:center;
 gap:20px;
 background:#444;
}

button{
 padding:10px 20px;
 font-size:16px;
}

/* EDITOR */
#editor{
 position:fixed;
 inset:0;
 background:#111;
 color:white;
 display:none;
 flex-direction:column;
 align-items:center;
 padding:20px;
 overflow:auto;
}

#editor button{
 font-size:30px;
 margin:5px;
}

</style>
</head>

<body>

<div id="topMenu" class="menu"></div>

<div id="boardContainer">
  <div id="board"></div>
</div>

<div id="bottomMenu" class="menu"></div>

<div id="controls">
 <button onclick="openEditor()">Editor</button>
 <button onclick="resetBoard()">Reset</button>
</div>

<div id="drag"></div>

<div id="editor"></div>

<script>

/* ================= ESTADO ================= */

const game={
 board:Array.from({length:8},()=>Array(8).fill(""))
};

let customPieces = JSON.parse(localStorage.getItem("customPieces")||"[]");

/* ================= ELEMENTOS ================= */

const boardEl=document.getElementById("board");
const dragEl=document.getElementById("drag");
const topMenu=document.getElementById("topMenu");
const bottomMenu=document.getElementById("bottomMenu");
const editor=document.getElementById("editor");

/* ================= PEÇAS ================= */

const baseSymbols={
 P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔",
 p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚"
};

const iconList=[
 "★","✦","✪","☀","☠","⚔","⚙","⚡","🔥","💀","👑","🛡"
];

/* ================= DRAG ================= */

let dragging=null;

document.addEventListener("pointermove",e=>{
 if(dragging){
  dragEl.style.left=e.clientX+"px";
  dragEl.style.top=e.clientY+"px";
 }
});

document.addEventListener("pointerup",e=>{
 if(!dragging) return;

 let el=document.elementFromPoint(e.clientX,e.clientY);

 if(el?.dataset){
  let r=+el.dataset.r;
  let c=+el.dataset.c;
  game.board[r][c]=dragging;
 }

 dragging=null;
 dragEl.textContent="";
 draw();
});

/* ================= MENUS ================= */

function getAllPieces(){
 let list=[...Object.keys(baseSymbols)];
 customPieces.forEach((_,i)=>list.push("c"+i));
 return list;
}

function getSymbol(p){
 if(baseSymbols[p]) return baseSymbols[p];
 return customPieces[parseInt(p.slice(1))]?.symbol||"?";
}

function drawMenus(){

 topMenu.innerHTML="";
 bottomMenu.innerHTML="";

 getAllPieces().forEach(p=>{
  let el=document.createElement("div");
  el.className="menuPiece";
  el.textContent=getSymbol(p);

  el.onpointerdown=()=>{
    dragging=p;
