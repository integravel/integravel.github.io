<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório Integrável</title>
    <style>
        /* Estilos para o layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }
        
        /* Cabeçalho */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .header img {
            width: 150px;
            height: auto;
        }
        
        /* Seção principal */
        .main-content {
            display: flex;
            gap: 20px;
        }
        
        .main-image {
            flex: 1;
            width: 300px;
            height: auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            flex: 2;
        }
        
        .grid-item {
            text-align: center;
        }
        
        .grid-item img {
            width: 100%;
            height: auto;
        }
        
        .grid-item a {
            text-decoration: none;
            color: #007bff;
        }

        .grid-item a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho com imagem e texto -->
        <div class="header">
            <img src="sua-imagem-topo.png" alt="Imagem do topo">
            <h1><a href="https://sites.google.com/view/integravel">Laboratório Integrável</a> é um hub para recursos virtuais, abertos, de Ciências e Matemática, de autoria neurodivergente.
</h1>
        </div>

        <!-- Seção principal com imagem comprida e grid de imagens -->
        <div class="main-content">
            <!-- Imagem comprida à esquerda -->
            <img src="sua-imagem-comprida.png" alt="Imagem comprida" class="main-image">

            <!-- Grid de 9 imagens com links -->
            <div class="grid">
                <!-- Cada item do grid -->
                <div class="grid-item">
                    <img src="imagem1.png" alt="Imagem 1">
                    <p><a href="https://sites.google.com/view/integravel/subscribe-meow">Cursos MOOC</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem2.png" alt="Imagem 2">
                    <p><a href="https://link2.com">Texto com link 2</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem3.png" alt="Imagem 3">
                    <p><a href="https://link3.com">Texto com link 3</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem4.png" alt="Imagem 4">
                    <p><a href="https://link4.com">Texto com link 4</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem5.png" alt="Imagem 5">
                    <p><a href="https://link5.com">Texto com link 5</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem6.png" alt="Imagem 6">
                    <p><a href="https://link6.com">Texto com link 6</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem7.png" alt="Imagem 7">
                    <p><a href="https://link7.com">Texto com link 7</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem8.png" alt="Imagem 8">
                    <p><a href="https://link8.com">Texto com link 8</a></p>
                </div>
                <div class="grid-item">
                    <img src="imagem9.png" alt="Imagem 9">
                    <p><a href="https://link9.com">Texto com link 9</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
