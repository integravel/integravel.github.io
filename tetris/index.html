<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riemann Drop</title>

<style>
body{
  margin:0;
  background:#0f1115;
  overflow:hidden;
}

canvas{
  display:block;
  margin:auto;
}

#controls{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  gap:8px;
  padding:10px;
  background:#151922;
}

button{
  flex:1;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#222836;
  color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
  <button onclick="move(-1)">◀</button>
  <button onclick="move(1)">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let cols = 10;
let rows;
let blockSize;
let grid;

let piece;

function f(x){
  return 0.15*(x-5)*(x-5)+3;
}

function resize(){
  const controls = document.getElementById('controls');
  const h = window.innerHeight - controls.offsetHeight;

  blockSize = Math.floor(window.innerWidth / cols);
  rows = Math.floor(h / blockSize);

  canvas.width = cols * blockSize;
  canvas.height = rows * blockSize;

  grid = Array.from({length: rows}, () => Array(cols).fill(0));
}

resize();
window.addEventListener("resize", resize);

function newPiece(){
  piece = {
    x: Math.floor(cols/2),
    y: 0,
    size: Math.floor(Math.random()*5)+1,
    color:"#c58cff"
  };
}

function move(dir){
  piece.x += dir;
  if(piece.x < 0) piece.x = 0;
  if(piece.x >= cols) piece.x = cols-1;
}

function collide(){
  for(let i=0;i<piece.size;i++){
    let py = piece.y + i;
    if(py >= rows) return true;
    if(grid[py][piece.x]) return true;

    // colisão com curva
    let limit = Math.floor(f(piece.x));
    if(py >= limit) return true;
  }
  return false;
}

function merge(){
  for(let i=0;i<piece.size;i++){
    let py = piece.y + i;
    if(py < rows){
      grid[py][piece.x] = piece.color;
    }
  }
}

function update(){
  piece.y++;

  if(collide()){
    piece.y--;
    merge();
    newPiece();
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // grid
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  for(let x=0;x<cols;x++){
    ctx.beginPath();
    ctx.moveTo(x*blockSize,0);
    ctx.lineTo(x*blockSize,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<rows;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*blockSize);
    ctx.lineTo(canvas.width,y*blockSize);
    ctx.stroke();
  }

  // blocos
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid[y][x]){
        ctx.fillStyle=grid[y][x];
        ctx.fillRect(x*blockSize,y*blockSize,blockSize-1,blockSize-1);
      }
    }
  }

  // peça
  ctx.fillStyle=piece.color;
  for(let i=0;i<piece.size;i++){
    ctx.fillRect(
      piece.x*blockSize,
      (piece.y+i)*blockSize,
      blockSize-1,
      blockSize-1
    );
  }

  // curva
  ctx.strokeStyle="#ffd166";
  ctx.beginPath();
  for(let x=0;x<cols;x++){
    let y=f(x);
    ctx.lineTo(x*blockSize,y*blockSize);
  }
  ctx.stroke();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

newPiece();
loop();
</script>

</body>
</html>
