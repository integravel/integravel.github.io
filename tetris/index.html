<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riemann Game</title>

<style>
body{
  margin:0;
  background:#0f1115;
  overflow:hidden;
  font-family:sans-serif;
}

canvas{
  display:block;
  margin:auto;
}

#controls{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  gap:8px;
  padding:10px;
  background:#151922;
}

button{
  flex:1;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#222836;
  color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
  <button onclick="move(-1)">◀</button>
  <button onclick="drop()">▼</button>
  <button onclick="move(1)">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let cols = 10;
let rows;
let blockSize;
let grid;

let cursor = 5;
let currentSize = 1;

function f(x){
  return 0.02*(x-5)*(x-5)+5;
}

function resize(){
  const controls = document.getElementById('controls');
  const h = window.innerHeight - controls.offsetHeight;

  blockSize = Math.floor(window.innerWidth / cols);
  rows = Math.floor(h / blockSize);

  canvas.width = cols * blockSize;
  canvas.height = rows * blockSize;

  grid = Array.from({length: rows}, () => Array(cols).fill(0));
}

resize();
window.addEventListener("resize", resize);

function move(dir){
  cursor += dir;
  if(cursor < 0) cursor = 0;
  if(cursor >= cols) cursor = cols-1;
}

function columnHeight(x){
  for(let y=0;y<rows;y++){
    if(grid[y][x]) return y;
  }
  return rows;
}

function drop(){
  let x = cursor;
  let top = Math.floor(f(x));

  let currentTop = columnHeight(x);

  let available = currentTop - top;

  if(available <= 0) return;

  let size = Math.min(currentSize, available);

  for(let i=0;i<size;i++){
    grid[currentTop-1-i][x] = "#7c8cff";
  }

  currentSize = Math.floor(Math.random()*5)+1;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // grid
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  for(let x=0;x<cols;x++){
    ctx.beginPath();
    ctx.moveTo(x*blockSize,0);
    ctx.lineTo(x*blockSize,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<rows;y++){
    ctx.beginPath();
    ctx.moveTo(0,y*blockSize);
    ctx.lineTo(canvas.width,y*blockSize);
    ctx.stroke();
  }

  // blocos
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(grid[y][x]){
        ctx.fillStyle = grid[y][x];
        ctx.fillRect(x*blockSize,y*blockSize,blockSize-1,blockSize-1);
      }
    }
  }

  // cursor
  ctx.fillStyle = "#ffd166";
  ctx.fillRect(cursor*blockSize,0,blockSize,blockSize);

  // gráfico
  ctx.strokeStyle = "#ffd166";
  ctx.beginPath();
  for(let x=0;x<cols;x++){
    let y = f(x);
    ctx.lineTo(x*blockSize,y*blockSize);
  }
  ctx.stroke();
}

function loop(){
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
