<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Labirinto do Tempo</title>
<style>
  :root{ --cell: min(9vw, 9vh); }
  *{box-sizing:border-box;}
  body{margin:0;background:#111;color:#fff;font-family:monospace;overflow:hidden;}#container{ height:100dvh; display:flex;flex-direction:column;justify-content:space-between;align-items:center; padding-bottom:env(safe-area-inset-bottom); }

#game{ margin-top:10px; display:grid; grid-template-columns: repeat(10, var(--cell)); gap:2px; justify-content:center; }

.cell{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell)*0.6);} .wall{background:#333;} .floor{background:#222;} .door{background:#550000;} .door.open{background:#006600;} .button{background:#4444aa;} .time{background:#663399;} .goal{background:#006666;} .player{color:#00ffcc;} .clone{color:#ffcc00;opacity:0.8;}

/* JOYSTICK */ #controls{ width:100%; max-width:300px; margin-bottom:10px; display:grid; grid-template-areas: ". up ." "left center right" ". down ."; gap:10px; justify-items:center; align-items:center; }

.btn{ width:70px;height:70px;border-radius:12px;background:#333;display:flex;align-items:center;justify-content:center;font-size:22px; } .btn:active{background:#555;}

#up{grid-area:up;} #down{grid-area:down;} #left{grid-area:left;} #right{grid-area:right;}

#center{grid-area:center;font-size:18px;}

#message{ position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:8px;font-size:14px;opacity:0;transition:0.5s; }

.rewind{ animation: rewindFlash 0.2s infinite alternate; } @keyframes rewindFlash{ from{filter:invert(0);} to{filter:invert(1);} } </style>

</head>
<body>
<div id="container">
  <div id="message"></div>
  <div id="game"></div>  <div id="controls">
    <div></div>
    <div id="up" class="btn">▲</div>
    <div></div>
    <div id="left" class="btn">◀</div>
    <div id="center">⏱ <span id="timer">0.0</span></div>
    <div id="right" class="btn">▶</div>
    <div></div>
    <div id="down" class="btn">▼</div>
    <div></div>
  </div>
</div><script>
let map=[
"##########",
"#P....B..#",
"#.####.#.#",
"#....#.#T#",
"#.##.#.#.#",
"#....#...#",
"#.######.#",
"#........#",
"#..D....G#",
"##########"
];

let player={x:1,y:1};
let history=[]; // {x,y,time}
let clone=null;
let time=0;
let timeTravelUsed=false;
let reversing=false;
let lastMoveTime=0;

const game=document.getElementById("game");
const timerEl=document.getElementById("timer");
const msg=document.getElementById("message");

function getCell(x,y){return map[y][x];}

function isOnButton(e){return getCell(e.x,e.y)==="B";}
function isDoorOpen(){return isOnButton(player)||(clone&&isOnButton(clone));}

function isBlocked(x,y){
  const c=getCell(x,y);
  if(c==="#") return true;
  if(c==="D"&&!isDoorOpen()) return true;
  return false;
}

function move(dx,dy){
  if(reversing) return;
  const nx=player.x+dx, ny=player.y+dy;
  if(isBlocked(nx,ny)) return;

  history.push({x:player.x,y:player.y,time:time});

  player.x=nx; player.y=ny;
  lastMoveTime=time;

  if(getCell(nx,ny)==="T"&&!timeTravelUsed){ reversing=true; }
}

function updateClone(){
  if(!clone||!clone.path.length) return;

  // move respeitando tempo
  if(time>=clone.path[0].time){
    const step=clone.path.shift();
    clone.x=step.x; clone.y=step.y;
  }
}

function reverseTime(){
  document.body.classList.add("rewind");
  if(history.length>0){
    const step=history.pop();
    player.x=step.x; player.y=step.y;
    time=step.time;
  }else{
    reversing=false;
    document.body.classList.remove("rewind");
    clone={x:player.x,y:player.y,path:[...historyOriginal]};
    timeTravelUsed=true;
  }
}

let historyOriginal=[];

function checkWin(){
  if(getCell(player.x,player.y)==="G"){
    showMsg("✔ Resolvido!");
    setTimeout(()=>location.reload(),2000);
  }
}

function showMsg(t){ msg.textContent=t; msg.style.opacity=1; setTimeout(()=>msg.style.opacity=0,1500); }

function draw(){
  game.innerHTML="";
  map.forEach((row,y)=>{
    row.split("").forEach((cell,x)=>{
      const div=document.createElement("div");
      div.classList.add("cell");

      if(cell==="#") div.classList.add("wall"); else div.classList.add("floor");
      if(cell==="D"){ div.classList.add("door"); if(isDoorOpen()) div.classList.add("open"); }
      if(cell==="B") div.classList.add("button");
      if(cell==="T") div.classList.add("time");
      if(cell==="G") div.classList.add("goal");

      if(player.x===x&&player.y===y){div.textContent="♚";div.classList.add("player");}
      if(clone&&clone.x===x&&clone.y===y){div.textContent="♟";div.classList.add("clone");}

      game.appendChild(div);
    });
  });
}

// tempo real
setInterval(()=>{
  if(!reversing) time+=0.1;
  else reverseTime();

  updateClone();

  timerEl.textContent=time.toFixed(1);
  draw();
  checkWin();
},100);

// botões
function bind(id,dx,dy){ document.getElementById(id).onclick=()=>{ move(dx,dy); historyOriginal=[...history]; }; }
bind("up",0,-1); bind("down",0,1); bind("left",-1,0); bind("right",1,0);

draw();
</script></body>
</html>
