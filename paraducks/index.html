<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Labirinto do Tempo</title>
<style>
  body { background:#111; color:#fff; font-family:monospace; text-align:center; }
  #game { display:grid; grid-template-columns: repeat(10, 40px); gap:2px; justify-content:center; margin-top:20px; }
  .cell { width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .wall { background:#333; }
  .floor { background:#222; }
  .player { color:#00ffcc; }
  .clone { color:#ffcc00; }
  .door { background:#550000; }
  .door.open { background:#005500; }
  .button { background:#4444aa; }
  .time { background:#660066; }
</style>
</head>
<body>
<h2>Labirinto do Tempo ⏳</h2>
<p>Use WASD para mover. Vá até a máquina do tempo (⏳).</p>
<p id="timer">Tempo: 0</p>
<div id="game"></div><script>
const map = [
  "##########",
  "#P....B..#",
  "#.####.#.#",
  "#....#.#T#",
  "#.##.#.#.#",
  "#....#...#",
  "#.######.#",
  "#........#",
  "#..D.....#",
  "##########"
];

let player = {x:1,y:1};
let history = [];
let clone = null;
let timeTravelUsed = false;
let time = 0;
let reversing = false;

const game = document.getElementById("game");
const timerEl = document.getElementById("timer");

function draw(){
  game.innerHTML="";
  map.forEach((row,y)=>{
    row.split("").forEach((cell,x)=>{
      const div=document.createElement("div");
      div.classList.add("cell");

      if(cell==="#") div.classList.add("wall");
      else div.classList.add("floor");

      if(cell==="D"){
        div.classList.add("door");
        if(buttonPressed) div.classList.add("open");
      }
      if(cell==="B") div.classList.add("button");
      if(cell==="T") div.classList.add("time");

      if(player.x===x && player.y===y) div.textContent="♚";
      if(clone && clone.x===x && clone.y===y) div.textContent="♟";

      game.appendChild(div);
    });
  });
}

let buttonPressed = false;

function move(dx,dy){
  const nx = player.x+dx;
  const ny = player.y+dy;
  const cell = map[ny][nx];

  if(cell==="#") return;
  if(cell==="D" && !buttonPressed) return;

  history.push({...player});

  player.x=nx;
  player.y=ny;

  if(cell==="B") buttonPressed=true;
  if(cell==="T" && !timeTravelUsed){
    reversing=true;
  }

  time++;
}

function updateClone(){
  if(!clone || !clone.path.length) return;
  const step = clone.path.shift();
  clone.x = step.x;
  clone.y = step.y;
}

function reverseTime(){
  if(history.length>0){
    player = history.pop();
    time--;
  } else {
    reversing=false;
    clone = {
      x: player.x,
      y: player.y,
      path: [...historyOriginal]
    };
    timeTravelUsed=true;
  }
}

let historyOriginal = [];

setInterval(()=>{
  if(reversing){
    reverseTime();
  } else {
    updateClone();
  }

  timerEl.textContent = "Tempo: "+time;
  draw();
},200);

window.addEventListener("keydown",e=>{
  if(reversing) return;

  if(e.key==='w') move(0,-1);
  if(e.key==='s') move(0,1);
  if(e.key==='a') move(-1,0);
  if(e.key==='d') move(1,0);

  historyOriginal = [...history];
});

// inicial
draw();
</script></body>
</html>
