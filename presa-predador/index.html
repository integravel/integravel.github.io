<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>✨ Garotas vs Bruxas</title>

<style>
body {
    background: #0f0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

#game {
    width: 90%;
    height: 420px;
    border: 2px solid #ff79c6;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
    background: #050510;
}

.entity {
    position: absolute;
    font-size: 22px;
    transition: transform 0.8s linear, opacity 0.5s;
}

.fade {
    opacity: 0;
}

button, input {
    padding: 8px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>✨ Garotas Mágicas vs Bruxas 🕸️</h1>

<label>Garotas iniciais:</label>
<input type="number" id="initialMagical" value="10" min="1" max="50">

<br>
<button onclick="startGame()">Iniciar</button>

<div id="game"></div>

<p id="stats"></p>
<p id="status"></p>

<script>
let magicalGirls = [];
let witches = [];

let running = false;
let stableTime = 0;

const game = document.getElementById("game");

const WITCH_GROWTH_RATE = 0.3;
const RECRUIT_RATE = 1;

function randomPos() {
    return {
        x: Math.random() * (game.clientWidth - 30),
        y: Math.random() * (game.clientHeight - 30)
    };
}

function createEntity(symbol, list) {
    const el = document.createElement("div");
    el.classList.add("entity");
    el.innerText = symbol;

    let pos = randomPos();
    el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;

    game.appendChild(el);

    list.push({ el, x: pos.x, y: pos.y });
}

function moveTo(entity, x, y) {
    entity.x = x;
    entity.y = y;
    entity.el.style.transform = `translate(${x}px, ${y}px)`;
}

function removeEntity(entity, list) {
    entity.el.classList.add("fade");
    setTimeout(() => entity.el.remove(), 400);

    let index = list.indexOf(entity);
    if (index > -1) list.splice(index, 1);
}

function updateSystem() {

    // embaralhar bruxas para evitar padrão fixo
    let availableWitches = [...witches];
    availableWitches.sort(() => Math.random() - 0.5);

    let newWitchesFromGirls = [];

    magicalGirls.forEach((girl, i) => {

        if (availableWitches.length > 0) {
            let target = availableWitches.pop();

            // mover até a bruxa
            moveTo(girl, target.x, target.y);

            setTimeout(() => {
                removeEntity(target, witches);

                // garota vira bruxa
                createEntity("🕸️", witches);
                removeEntity(girl, magicalGirls);

            }, 700);

        } else {
            // sem comida → vira bruxa
            createEntity("🕸️", witches);
            removeEntity(girl, magicalGirls);
        }
    });

    // reprodução das bruxas
    let currentWitches = [...witches];
    let births = Math.floor(currentWitches.length * WITCH_GROWTH_RATE);

    for (let i = 0; i < births; i++) {
        if (currentWitches.length === 0) break;

        let parent = currentWitches[Math.floor(Math.random() * currentWitches.length)];
        let pos = randomPos();

        let el = document.createElement("div");
        el.classList.add("entity");
        el.innerText = "🕸️";

        el.style.transform = `translate(${parent.x}px, ${parent.y}px)`;
        game.appendChild(el);

        let newWitch = { el, x: parent.x, y: parent.y };
        witches.push(newWitch);

        setTimeout(() => {
            moveTo(newWitch, pos.x, pos.y);
        }, 50);
    }

    // recrutamento
    for (let i = 0; i < RECRUIT_RATE; i++) {
        createEntity("✨", magicalGirls);
    }

    updateStats();
    checkState();
}

function updateStats() {
    document.getElementById("stats").innerText =
        `✨ Garotas: ${magicalGirls.length} | 🕸️ Bruxas: ${witches.length}`;
}

function checkState() {
    const status = document.getElementById("status");

    if (magicalGirls.length === 0 || witches.length > 200) {
        status.innerText = "💀 Colapso!";
        running = false;
        setTimeout(startGame, 2500);
        return;
    }

    if (
        magicalGirls.length > 5 && magicalGirls.length < 40 &&
        witches.length > 5 && witches.length < 80
    ) {
        stableTime++;
    } else {
        stableTime = 0;
    }

    if (stableTime > 20) {
        status.innerText = "🏆 Equilíbrio alcançado!";
        running = false;
        return;
    }

    status.innerText = "⚖️ Sistema em evolução...";
}

function loop() {
    if (!running) return;

    updateSystem();
    setTimeout(loop, 1200);
}

function startGame() {

    game.innerHTML = "";
    magicalGirls = [];
    witches = [];

    let initial = parseInt(document.getElementById("initialMagical").value);

    for (let i = 0; i < initial; i++) {
        createEntity("✨", magicalGirls);
    }

    let initialWitches = Math.floor(Math.random() * 10 + 5);

    for (let i = 0; i < initialWitches; i++) {
        createEntity("🕸️", witches);
    }

    stableTime = 0;
    running = true;

    document.getElementById("status").innerText = "🔮 Novo ciclo iniciado";

    loop();
}
</script>

</body>
</html>
