<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>EcoSim - Presa vs Predador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0a0a23, #1a1a40);
  color: white;
  text-align: center;
}

#game {
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.stats {
  margin: 10px;
  font-size: 18px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

#log {
  margin-top: 15px;
  height: 80px;
  overflow: auto;
  font-size: 14px;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 8px;
}

.day {
  background: linear-gradient(to right, #87ceeb, #f0e68c);
  color: black;
}

.night {
  background: linear-gradient(to right, #0a0a23, #000);
}

</style>
</head>

<body>

<div id="game">
  <h1>🌿 EcoSim</h1>

  <div class="stats">🐇 Presas: <span id="presas">0</span></div>
  <div class="stats">🐺 Predadores: <span id="predadores">0</span></div>
  <div class="stats">📅 Dia: <span id="dia">0</span></div>

  <div>
    <button id="addPrey">+ Presas</button>
    <button id="addPred">+ Predadores</button>
    <button id="huntPrey">Caçar Presas</button>
  </div>

  <div id="log"></div>
</div>

<script>
let presas = 40;
let predadores = 9;
let dia = 1;

// parâmetros
const alpha = 0.08;
const beta = 0.002;
const delta = 0.0008;
const gamma = 0.05;

// cooldowns
let cooldowns = {
  prey: 0,
  pred: 0,
  hunt: 0
};

function log(msg) {
  const logDiv = document.getElementById("log");
  logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
}

function updateUI() {
  document.getElementById("presas").textContent = Math.round(presas);
  document.getElementById("predadores").textContent = Math.round(predadores);
  document.getElementById("dia").textContent = dia;

  document.getElementById("addPrey").disabled = cooldowns.prey > 0;
  document.getElementById("addPred").disabled = cooldowns.pred > 0;
  document.getElementById("huntPrey").disabled = cooldowns.hunt > 0;
}

function nextTurn() {
  // simulação (dia)
  let newPresas = presas + (alpha * presas) - (beta * presas * predadores);
  let newPred = predadores + (delta * presas * predadores) - (gamma * predadores);

  // ruído aleatório leve
  newPresas *= (0.95 + Math.random() * 0.1);
  newPred *= (0.95 + Math.random() * 0.1);

  presas = Math.max(0, newPresas);
  predadores = Math.max(0, newPred);

  // cooldown reduz
  for (let key in cooldowns) {
    if (cooldowns[key] > 0) cooldowns[key]--;
  }

  // eventos
  if (presas <= 0) {
    log("❌ Presas extintas!");
    alert("Game Over!");
    location.reload();
  }

  if (predadores <= 0) {
    log("⚠️ Predadores extintos!");
  }

  dia++;
  updateUI();
}

document.getElementById("addPrey").onclick = () => {
  presas += 10;
  cooldowns.prey = 2;
  log("🌿 Presas introduzidas");
};

document.getElementById("addPred").onclick = () => {
  predadores += 2;
  cooldowns.pred = 2;
  log("🐺 Predadores introduzidos");
};

document.getElementById("huntPrey").onclick = () => {
  presas = Math.max(0, presas - 8);
  cooldowns.hunt = 2;
  log("🏹 Caça realizada");
};

// loop automático (dia/noite)
setInterval(() => {
  document.body.className = "day";

  setTimeout(() => {
    nextTurn();
    document.body.className = "night";
  }, 2000);

}, 4000);

// inicializa
updateUI();

</script>

</body>
</html>
