<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>✨ Garotas Mágicas vs Bruxas 🕸️</title>

<style>
body {
    background: #0f0f1a;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

#game {
    width: 90%;
    height: 400px;
    border: 2px solid #ff79c6;
    margin: 20px auto;
    position: relative;
    overflow: hidden;
    background: #050510;
}

.entity {
    position: absolute;
    font-size: 20px;
}

button, input {
    padding: 10px;
    margin: 5px;
}

#status {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>✨ Garotas Mágicas vs Bruxas 🕸️</h1>

<label>Quantidade inicial de garotas mágicas:</label>
<input type="number" id="initialMagical" value="10" min="1" max="50">

<br>
<button onclick="startGame()">Iniciar</button>

<div id="game"></div>

<p id="stats"></p>
<p id="status"></p>

<script>
let magicalGirls = 10;
let witches = 5;

let hungerTimer = [];
let running = false;
let stableTime = 0;

const game = document.getElementById("game");

const EAT_INTERVAL = 3;
const WITCH_GROWTH = 2;
const RECRUIT_RATE = 1;

function spawnEntity(symbol) {
    const el = document.createElement("div");
    el.classList.add("entity");
    el.innerText = symbol;

    el.style.left = Math.random() * 95 + "%";
    el.style.top = Math.random() * 90 + "%";

    game.appendChild(el);
}

function render() {
    game.innerHTML = "";

    for (let i = 0; i < Math.min(magicalGirls, 60); i++) {
        spawnEntity("✨");
    }

    for (let i = 0; i < Math.min(witches, 60); i++) {
        spawnEntity("🕸️");
    }
}

function updateSystem() {

    // Garotas tentam comer
    let fedGirls = 0;

    for (let i = 0; i < magicalGirls; i++) {
        if (witches > 0) {
            witches--;
            fedGirls++;
        } else {
            // vira bruxa
            witches++;
        }
    }

    magicalGirls = fedGirls;

    // Bruxas se multiplicam
    witches += Math.floor(witches * 0.2);

    // Organização recruta
    magicalGirls += RECRUIT_RATE;

    document.getElementById("stats").innerText =
        `✨ Garotas: ${magicalGirls} | 🕸️ Bruxas: ${witches}`;

    checkState();
    render();
}

function checkState() {
    const status = document.getElementById("status");

    if (magicalGirls === 0 || witches > 300) {
        status.innerText = "💀 Colapso: mundo dominado por bruxas!";
        running = false;
        setTimeout(startGame, 2500);
        return;
    }

    if (magicalGirls > 5 && magicalGirls < 50 && witches > 5 && witches < 80) {
        stableTime++;
    } else {
        stableTime = 0;
    }

    if (stableTime > 20) {
        status.innerText = "🏆 Equilíbrio alcançado!";
        running = false;
        return;
    }

    status.innerText = "⚖️ Sistema em evolução...";
}

function loop() {
    if (!running) return;

    updateSystem();
    setTimeout(loop, 1000);
}

function startGame() {
    magicalGirls = parseInt(document.getElementById("initialMagical").value);
    witches = Math.floor(Math.random() * 10 + 5);

    stableTime = 0;
    running = true;

    document.getElementById("status").innerText = "🔮 Novo ciclo iniciado";

    loop();
}
</script>

</body>
</html>
