<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#game {
  height:100%;
  display:flex;
  flex-direction:column;
  padding:10px;
  box-sizing:border-box;
}

.controls {
  display:flex;
}

button {
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
}

button:disabled { opacity:0.4; }

#chartContainer {
  overflow-x: auto;
  flex:1;
}

canvas {
  height:200px;
}

#log {
  height:60px;
  overflow:auto;
  font-size:12px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}
</style>
</head>

<body>
<div id="game">

<h3>🌿 EcoSim</h3>
<div>🐇 <span id="presas"></span> | 🐺 <span id="predadores"></span></div>
<div>Dia: <span id="dia"></span></div>

<div class="controls">
<button id="addPrey">+10 🐇</button>
<button id="addPred">+2 🐺</button>
<button id="huntPrey">-8 🐇</button>
</div>

<div id="chartContainer">
<canvas id="chart"></canvas>
</div>

<div id="log"></div>

</div>

<script>
let presas = 40;
let predadores = 9;
let dia = 1;

// parâmetros (instável por padrão)
const alpha = 0.06;
const beta = 0.0035;
const delta = 0.0012;
const gamma = 0.06;

const noiseLevel = 0.05;

let historyPrey = [];
let historyPred = [];

let cooldowns = {prey:0,pred:0,hunt:0};

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

let widthPerPoint = 6;

function resizeCanvas(){
  canvas.height = 200;
}
resizeCanvas();

function log(msg){
  let l=document.getElementById("log");
  l.innerHTML = msg+"<br>"+l.innerHTML;
}

function updateUI(){
  document.getElementById("presas").textContent = Math.round(presas);
  document.getElementById("predadores").textContent = Math.round(predadores);
  document.getElementById("dia").textContent = dia;

  document.getElementById("addPrey").disabled = cooldowns.prey>0;
  document.getElementById("addPred").disabled = cooldowns.pred>0;
  document.getElementById("huntPrey").disabled = cooldowns.hunt>0;
}

function drawChart(){

  canvas.width = historyPrey.length * widthPerPoint + 50;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let maxVal = Math.max(...historyPrey, ...historyPred, 50);

  function yScale(v){
    return canvas.height - (v/maxVal)*(canvas.height*0.8) - 20;
  }

  // linha crítica (extinção)
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(0, yScale(5));
  ctx.lineTo(canvas.width, yScale(5));
  ctx.stroke();

  // zona risco
  ctx.strokeStyle="yellow";
  ctx.beginPath();
  ctx.moveTo(0, yScale(15));
  ctx.lineTo(canvas.width, yScale(15));
  ctx.stroke();

  function drawLine(data,color){
    ctx.beginPath();
    ctx.strokeStyle=color;
    ctx.lineWidth=2;

    data.forEach((v,i)=>{
      let x = i*widthPerPoint;
      let y = yScale(v);

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    });

    ctx.stroke();
  }

  drawLine(historyPrey,"#22c55e");
  drawLine(historyPred,"#ef4444");
}

function nextTurn(){

  let birthPrey = alpha * presas;
  let deathPrey = beta * presas * predadores;

  let birthPred = delta * presas * predadores;
  let deathPred = gamma * predadores;

  let newPresas = presas + birthPrey - deathPrey;
  let newPred = predadores + birthPred - deathPred;

  newPresas *= (1-noiseLevel) + Math.random()*noiseLevel*2;
  newPred *= (1-noiseLevel) + Math.random()*noiseLevel*2;

  presas = Math.max(0,newPresas);
  predadores = Math.max(0,newPred);

  historyPrey.push(presas);
  historyPred.push(predadores);

  for(let k in cooldowns){
    if(cooldowns[k]>0) cooldowns[k]--;
  }

  // feedback discreto
  if(presas < 10 && predadores > 5){
    log("⚠️ Sistema em colapso");
  }

  if(presas > 30 && predadores > 5 && predadores < 20){
    log("✅ Sistema estabilizado");
  }

  dia++;
  updateUI();
  drawChart();
}

// ações
document.getElementById("addPrey").onclick=()=>{
  presas+=10;
  cooldowns.prey=2;
};

document.getElementById("addPred").onclick=()=>{
  predadores+=2;
  cooldowns.pred=2;
};

document.getElementById("huntPrey").onclick=()=>{
  presas=Math.max(0,presas-8);
  cooldowns.hunt=2;
};

// loop mais rápido
setInterval(nextTurn, 400);

updateUI();
drawChart();
</script>

</body>
</html>
