<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Function Puzzle</title>

<script src="https://unpkg.com/algebrite/dist/algebrite.bundle-for-browser.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
width:90%;
margin:auto;
}

.graph{
height:300px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}

#msg{
height:30px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<h2>Function Puzzle</h2>

<div class="container">

<h3>Current Function</h3>
<div id="funcAtual"></div>
<div id="graficoAtual" class="graph"></div>

<div>

<button onclick="acao('dx')">∂/∂x</button>
<button onclick="acao('dy')">∂/∂y</button>
<button onclick="acao('ix')">∫dx</button>
<button onclick="acao('iy')">∫dy</button>
<button onclick="desfazer()">Undo</button>

</div>

<div id="msg"></div>

<h3>Target Function</h3>
<div id="funcObjetivo"></div>
<div id="graficoObjetivo" class="graph"></div>

</div>

<script>

let funcAtual
let funcObjetivo
let historico=[]

function simplificar(f){
return Algebrite.run("simplify("+f+")")
}

function gerarFuncBase(){

let lista=[
"x^2+y^2",
"x*y",
"x^3+y",
"sin(x)+y",
"x^2+3*y"
]

return lista[Math.floor(Math.random()*lista.length)]

}

function gerarFase(){

funcAtual=gerarFuncBase()

let f=funcAtual

let passos=1+Math.floor(Math.random()*2)

for(let i=0;i<passos;i++){

let ops=["dx","dy","ix","iy"]
let op=ops[Math.floor(Math.random()*ops.length)]

if(op=="dx") f=Algebrite.run("d("+f+",x)")
if(op=="dy") f=Algebrite.run("d("+f+",y)")
if(op=="ix") f=Algebrite.run("integral("+f+",x)")
if(op=="iy") f=Algebrite.run("integral("+f+",y)")

}

funcObjetivo=simplificar(f)

historico=[funcAtual]

atualizarTela()

}

function acao(tipo){

let f=funcAtual

if(tipo=="dx") f=Algebrite.run("d("+f+",x)")
if(tipo=="dy") f=Algebrite.run("d("+f+",y)")
if(tipo=="ix") f=Algebrite.run("integral("+f+",x)")
if(tipo=="iy") f=Algebrite.run("integral("+f+",y)")

funcAtual=simplificar(f)

historico.push(funcAtual)

atualizarTela()

checarVitoria()

}

function desfazer(){

if(historico.length>1){

historico.pop()
funcAtual=historico[historico.length-1]

atualizarTela()

}

}

function checarVitoria(){

if(simplificar(funcAtual)==simplificar(funcObjetivo)){

document.getElementById("msg").innerText="✔ Function matched!"

setTimeout(()=>{

document.getElementById("msg").innerText=""
gerarFase()

},2500)

}

}

function atualizarTela(){

document.getElementById("funcAtual").innerText=funcAtual
document.getElementById("funcObjetivo").innerText=funcObjetivo

plotar(funcAtual,"graficoAtual")
plotar(funcObjetivo,"graficoObjetivo")

}

function plotar(func,id){

let x=[]
let y=[]
let z=[]

for(let i=-5;i<=5;i+=0.5){
x.push(i)
y.push(i)
}

for(let i=0;i<x.length;i++){

z[i]=[]

for(let j=0;j<y.length;j++){

try{

z[i][j]=math.evaluate(func,{x:x[i],y:y[j]})

}catch{

z[i][j]=NaN

}

}

}

let data=[{x:x,y:y,z:z,type:"surface"}]

Plotly.newPlot(id,data,{margin:{t:0}})

}

gerarFase()

</script>

</body>

</html>
