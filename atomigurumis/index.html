<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas Dinâmicas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f0f0f0;
    overflow: hidden;
}

#topbar {
    padding: 10px;
    background: #222;
    color: white;
}

#workspace {
    position: absolute;
    top: 60px;
    bottom: 120px;
    width: 100%;
    background: #fff;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #ddd;
    border-top: 2px solid #aaa;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    touch-action: none;
}

.H {
    width: 30px;
    height: 30px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: gray;
    color: white;
}

#info {
    position: absolute;
    top: 70px;
    right: 10px;
    background: #fff;
    padding: 10px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div id="topbar">
    H: <input type="number" id="hCount" value="4">
    C: <input type="number" id="cCount" value="1">
    <button onclick="start()">Criar Átomos</button>
</div>

<div id="workspace"></div>
<div id="info">Molécula: -</div>
<div id="shelf"></div>

<script>
let atoms = [];

const workspace = document.getElementById("workspace");
const shelf = document.getElementById("shelf");

const valence = { H: 1, C: 4 };
const radius = { H: 15, C: 25 };

function start() {
    atoms = [];
    workspace.innerHTML = "";
    shelf.innerHTML = "";

    let h = parseInt(hCount.value);
    let c = parseInt(cCount.value);

    for (let i = 0; i < h; i++) createAtom("H", i);
    for (let i = 0; i < c; i++) createAtom("C", i);
}

function createAtom(type, i) {
    let el = document.createElement("div");
    el.className = "atom " + type;
    el.innerText = type;

    let atom = {
        type,
        el,
        bonds: [],
        x: 50 + i * 40,
        y: 50
    };

    atoms.push(atom);
    shelf.appendChild(el);
    setPos(atom);
    drag(atom);
}

function setPos(a) {
    a.el.style.left = a.x + "px";
    a.el.style.top = a.y + "px";
}

function drag(atom) {
    let offX, offY, dragging=false;

    function start(x,y){
        dragging=true;
        offX=x-atom.x;
        offY=y-atom.y;
        workspace.appendChild(atom.el);
    }

    function move(x,y){
        if(!dragging) return;
        atom.x=x-offX;
        atom.y=y-offY;
        setPos(atom);
        check(atom);
    }

    function end(){
        dragging=false;
    }

    atom.el.onmousedown=e=>start(e.pageX,e.pageY);
    document.onmousemove=e=>move(e.pageX,e.pageY);
    document.onmouseup=end;

    atom.el.ontouchstart=e=>{
        let t=e.touches[0];
        start(t.pageX,t.pageY);
    };
    document.ontouchmove=e=>{
        let t=e.touches[0];
        move(t.pageX,t.pageY);
    };
    document.ontouchend=end;
}

function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function check(a){
    atoms.forEach(b=>{
        if(a===b) return;
        let d=dist(a,b);
        let target=radius[a.type]+radius[b.type];

        if(d<target+10 && canBond(a,b)){
            if(!a.bonds.includes(b)){
                a.bonds.push(b);
                b.bonds.push(a);
            }
        }
    });
}

function relax(){
    // força tipo mola
    atoms.forEach(a=>{
        a.bonds.forEach(b=>{
            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);
            let target=radius[a.type]+radius[b.type];

            let diff=d-target;
            let force=0.1*diff;

            if(d>0){
                let fx=(dx/d)*force;
                let fy=(dy/d)*force;

                a.x+=fx;
                a.y+=fy;
                b.x-=fx;
                b.y-=fy;
            }
        });
    });

    // repulsão global
    atoms.forEach(a=>{
        atoms.forEach(b=>{
            if(a===b) return;
            let dx=a.x-b.x;
            let dy=a.y-b.y;
            let d=Math.hypot(dx,dy);
            let min=radius[a.type]+radius[b.type];

            if(d<min){
                let push=(min-d)/2;
                if(d>0){
                    a.x+=(dx/d)*push;
                    a.y+=(dy/d)*push;
                }
            }
        });
    });

    atoms.forEach(setPos);
}

function loop(){
    relax();
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
