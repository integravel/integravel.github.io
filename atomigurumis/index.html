<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo das Moléculas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f7f7f7;
    overflow: hidden;
}

#topbar {
    background: #222;
    color: white;
    padding: 10px;
    text-align: center;
}

#workspace {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
    background: #fff;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

#feedback {
    position: absolute;
    top: 90px;
    right: 10px;
    background: white;
    padding: 10px;
    border: 1px solid #ccc;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    touch-action: none;
}

.H {
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: #666;
    color: white;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="challenge"></div>
    <button onclick="newGame()">Novo Desafio</button>
</div>

<div id="workspace"></div>
<div id="feedback">Monte a molécula</div>
<div id="shelf"></div>

<script>
let atoms = [];

const workspace = document.getElementById("workspace");
const shelf = document.getElementById("shelf");
const feedback = document.getElementById("feedback");
const challengeText = document.getElementById("challenge");

const valence = { H: 1, C: 4 };
const radius = { H: 14, C: 25 };

const challenges = [
    {name:"metano", c:1, h:4, type:"chain"},
    {name:"etano", c:2, h:6, type:"chain"},
    {name:"propano", c:3, h:8, type:"chain"},
    {name:"butano", c:4, h:10, type:"chain"},
    {name:"isobutano", c:4, h:10, type:"branched"}
];

let current;

function newGame(){
    atoms=[];
    workspace.innerHTML="";
    shelf.innerHTML="";

    current = challenges[Math.floor(Math.random()*challenges.length)];
    challengeText.innerText = "Monte: " + current.name;
    feedback.innerText="Monte a molécula";

    createShelfAtoms("H", current.h);
    createShelfAtoms("C", current.c);
}

function createShelfAtoms(type, count){
    for(let i=0;i<count;i++){
        let el=document.createElement("div");
        el.className="atom "+type;
        el.innerText=type;

        let atom={
            type,
            el,
            bonds:[],
            x:0,
            y:0,
            inWorkspace:false
        };

        atoms.push(atom);
        shelf.appendChild(el);
        el.style.position="relative";

        drag(atom);
    }
}

function drag(atom){
    let dragging=false;
    let offsetX=0, offsetY=0;

    function getPointer(e){
        return e.touches ? e.touches[0] : e;
    }

    function start(e){
        let p=getPointer(e);
        let rect=atom.el.getBoundingClientRect();

        offsetX = p.clientX - rect.left;
        offsetY = p.clientY - rect.top;

        dragging=true;

        workspace.appendChild(atom.el);

        atom.x = rect.left;
        atom.y = rect.top;
        atom.inWorkspace = true;

        atom.el.style.position="absolute";
        setPos(atom);
    }

    function move(e){
        if(!dragging) return;

        let p=getPointer(e);

        atom.x = p.clientX - offsetX;
        atom.y = p.clientY - offsetY;

        setPos(atom);
        connect(atom);
    }

    function end(){
        dragging=false;
        checkWin();
    }

    atom.el.addEventListener("mousedown", start);
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", end);

    atom.el.addEventListener("touchstart", start);
    document.addEventListener("touchmove", move, {passive:false});
    document.addEventListener("touchend", end);
}

function setPos(a){
    a.el.style.left = a.x + "px";
    a.el.style.top = a.y + "px";
}

function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a){
    atoms.forEach(b=>{
        if(a===b || !b.inWorkspace) return;

        let d=dist(a,b);
        let target=radius[a.type]+radius[b.type];

        if(d<target+10 && canBond(a,b)){
            if(!a.bonds.includes(b)){
                a.bonds.push(b);
                b.bonds.push(a);
            }
        }
    });
}

/* física corrigida */
function relax(){
    atoms.forEach(a=>{
        a.bonds.forEach(b=>{
            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);
            let target=radius[a.type]+radius[b.type];

            let diff=d-target;
            let force=0.15*diff;

            if(d>0){
                let fx=(dx/d)*force;
                let fy=(dy/d)*force;
                a.x+=fx;
                a.y+=fy;
                b.x-=fx;
                b.y-=fy;
            }
        });
    });

    atoms.forEach(a=>{
        atoms.forEach(b=>{
            if(a===b) return;

            let dx=a.x-b.x;
            let dy=a.y-b.y;
            let d=Math.hypot(dx,dy);
            let min=radius[a.type]+radius[b.type];

            // só repele se NÃO puder ligar
            if(d<min && !canBond(a,b)){
                let push=(min-d)/2;
                if(d>0){
                    a.x+=(dx/d)*push;
                    a.y+=(dy/d)*push;
                }
            }
        });
    });

    atoms.forEach(setPos);
}

function loop(){
    relax();
    requestAnimationFrame(loop);
}
loop();

/* validação robusta */
function allAtomsPlaced(){
    return atoms.every(a=>a.inWorkspace);
}

function allValencesSatisfied(){
    return atoms.every(a=>a.bonds.length === valence[a.type]);
}

function getCarbonGraph(){
    return atoms
        .filter(a=>a.type==="C")
        .map(c=>c.bonds.filter(b=>b.type==="C").length)
        .sort()
        .join(",");
}

function checkWin(){

    if(!allAtomsPlaced()) return;
    if(!allValencesSatisfied()) {
        feedback.innerText="Complete todas as ligações!";
        return;
    }

    let graph=getCarbonGraph();
    let win=false;

    if(current.type==="chain"){
        if(current.c===1) win=true;
        if(current.c===2) win=graph==="1,1";
        if(current.c===3) win=graph==="1,2,1";
        if(current.c===4) win=graph==="1,2,2,1";
    }

    if(current.type==="branched"){
        win = graph==="1,1,1,3";
    }

    feedback.innerText = win ? "✅ Correto!" : "❌ Estrutura incorreta!";
}

newGame();
</script>

</body>
</html>
