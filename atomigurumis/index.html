<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas (Espaço Preenchido)</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f0f0f0;
    overflow: hidden;
}

#topbar {
    padding: 10px;
    background: #222;
    color: white;
}

#workspace {
    position: absolute;
    top: 60px;
    bottom: 120px;
    width: 100%;
    background: #ffffff;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #ddd;
    border-top: 2px solid #aaa;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    touch-action: none;
    transition: transform 0.15s;
}

.H {
    width: 30px;
    height: 30px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: gray;
    color: white;
}

#info {
    position: absolute;
    top: 70px;
    right: 10px;
    background: #fff;
    padding: 10px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div id="topbar">
    H: <input type="number" id="hCount" value="4">
    C: <input type="number" id="cCount" value="1">
    <button onclick="start()">Criar Átomos</button>
</div>

<div id="workspace"></div>
<div id="info">Molécula: -<br>Total possíveis: -</div>
<div id="shelf"></div>

<script>
let atoms = [];

const workspace = document.getElementById("workspace");
const shelf = document.getElementById("shelf");
const hCount = document.getElementById("hCount");
const cCount = document.getElementById("cCount");

const valence = { H: 1, C: 4 };
const radius = { H: 15, C: 25 };

function start() {
    atoms = [];
    workspace.innerHTML = "";
    shelf.innerHTML = "";

    let h = parseInt(hCount.value);
    let c = parseInt(cCount.value);

    for (let i = 0; i < h; i++) createAtom("H", i);
    for (let i = 0; i < c; i++) createAtom("C", i);
}

function createAtom(type, index) {
    let el = document.createElement("div");
    el.className = "atom " + type;
    el.innerText = type;

    let atom = {
        type,
        el,
        bonds: [],
        x: 40 + index * 40,
        y: 40
    };

    atoms.push(atom);
    shelf.appendChild(el);
    setPosition(atom);
    makeDraggable(atom);
}

function setPosition(atom) {
    atom.el.style.left = atom.x + "px";
    atom.el.style.top = atom.y + "px";
}

function makeDraggable(atom) {
    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;

    function startDrag(x, y) {
        dragging = true;
        offsetX = x - atom.x;
        offsetY = y - atom.y;
        workspace.appendChild(atom.el);
    }

    function moveDrag(x, y) {
        if (!dragging) return;
        atom.x = x - offsetX;
        atom.y = y - offsetY;
        setPosition(atom);
        checkConnections(atom);
    }

    function endDrag() {
        dragging = false;
        updateMolecule();
    }

    atom.el.addEventListener("mousedown", e => startDrag(e.pageX, e.pageY));
    document.addEventListener("mousemove", e => moveDrag(e.pageX, e.pageY));
    document.addEventListener("mouseup", endDrag);

    atom.el.addEventListener("touchstart", e => {
        let t = e.touches[0];
        startDrag(t.pageX, t.pageY);
    });

    document.addEventListener("touchmove", e => {
        let t = e.touches[0];
        moveDrag(t.pageX, t.pageY);
    }, { passive: false });

    document.addEventListener("touchend", endDrag);
}

function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function canBond(a, b) {
    return a.bonds.length < valence[a.type] &&
           b.bonds.length < valence[b.type];
}

function checkConnections(atom) {
    atoms.forEach(other => {
        if (other === atom) return;

        let targetDist = radius[atom.type] + radius[other.type];
        let d = distance(atom, other);

        if (d < targetDist + 10 && canBond(atom, other)) {
            bondAtoms(atom, other, targetDist);
        } else if (d < targetDist && !canBond(atom, other)) {
            repel(atom, other);
        }
    });
}

function bondAtoms(a, b, targetDist) {
    if (!a.bonds.includes(b)) {
        a.bonds.push(b);
        b.bonds.push(a);
    }

    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let angle = Math.atan2(dy, dx);

    b.x = a.x + Math.cos(angle) * targetDist;
    b.y = a.y + Math.sin(angle) * targetDist;

    setPosition(b);
}

function repel(a, b) {
    let dx = a.x - b.x;
    let dy = a.y - b.y;
    let dist = Math.hypot(dx, dy);

    if (dist === 0) return;

    let force = 2;
    a.x += (dx / dist) * force;
    a.y += (dy / dist) * force;

    setPosition(a);
}

function updateMolecule() {
    let countH = atoms.filter(a => a.type === "H").length;
    let countC = atoms.filter(a => a.type === "C").length;

    let formula = "";
    if (countC > 0) formula += "C" + (countC > 1 ? countC : "");
    if (countH > 0) formula += "H" + (countH > 1 ? countH : "");

    let possible = estimateIsomers(countC, countH);

    document.getElementById("info").innerHTML =
        "Molécula: " + formula + "<br>Total possíveis: " + possible;
}

function estimateIsomers(c, h) {
    if (c === 1 && h === 4) return 1;
    if (c === 2 && h === 6) return 1;
    if (c === 3 && h === 8) return 1;
    if (c === 4 && h === 10) return 2;

    return "?";
}
</script>

</body>
</html>
