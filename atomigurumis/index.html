<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f7f7f7;
    overflow:hidden;
    transition:background 0.3s;
}

body.win {background:#c8f7c5;}

#topbar {
    background:#222;
    color:white;
    padding:10px;
    text-align:center;
}

#workspace {
    position:absolute;
    top:80px;
    bottom:120px;
    width:100%;
}

#svgLayer {
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

#shelf {
    position:absolute;
    bottom:0;
    height:120px;
    width:100%;
    background:#e0e0e0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.template {
    width:60px;height:60px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;cursor:pointer;
}

.H {background:white;border:2px solid black;}
.C {background:#666;color:white;}
.O {background:red;color:white;}
.N {background:blue;color:white;}

.atom {
    position:absolute;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="topbar">
<div id="challenge"></div>
<div id="feedback"></div>
</div>

<div id="workspace">
<svg id="svgLayer"></svg>
</div>

<div id="shelf">
<div class="template H">H</div>
<div class="template C">C</div>
<div class="template O">O</div>
<div class="template N">N</div>
</div>

<script>
let atoms=[], bonds=[];
let draggingAtom=null;
let holdTimer=null;
let level=0;

const valence={H:1,C:4,O:2,N:3};
const radius={H:14,C:25,O:20,N:22};

const challenges=[
    {name:"H₂",req:{H:2}},
    {name:"H₂O",req:{H:2,O:1}},
    {name:"NH₃",req:{N:1,H:3}},
    {name:"CO₂",req:{C:1,O:2}},
    {name:"H₂O₂",req:{H:2,O:2}},
    {name:"metano",req:{C:1,H:4}},
    {name:"etano",req:{C:2,H:6}}
];

const workspace=document.getElementById("workspace");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

function newGame(){
    atoms=[]; bonds=[];
    svg.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    challengeText.innerText="Fase "+(level+1)+": "+challenges[level].name;
    feedback.innerText="";
    document.body.classList.remove("win");
}

/* DESCONEXÃO */
function disconnect(atom){
    bonds = bonds.filter(b=>{
        if(b.a===atom || b.b===atom){
            b.a.bonds=b.a.bonds.filter(x=>x!==b.b);
            b.b.bonds=b.b.bonds.filter(x=>x!==b.a);
            return false;
        }
        return true;
    });
}

/* CRIAR */
function createAtom(type,x,y){
    let rect=workspace.getBoundingClientRect();

    let atom={
        type,
        el:document.createElement("div"),
        bonds:[],
        x:x-rect.left-radius[type],
        y:y-rect.top-radius[type]
    };

    atom.el.className="atom "+type;
    atom.el.innerText=type;

    atoms.push(atom);
    workspace.appendChild(atom.el);

    atom.el.addEventListener("mousedown",startHold);
    atom.el.addEventListener("touchstart",startHold);

    setPos(atom);
    draggingAtom=atom;
}

function startHold(e){
    e.stopPropagation();

    let atom=atoms.find(a=>a.el===e.currentTarget);

    holdTimer=setTimeout(()=>disconnect(atom),300);
    draggingAtom=atom;
}

/* TEMPLATE */
document.querySelectorAll(".template").forEach(t=>{
    t.addEventListener("mousedown",e=>{
        createAtom(t.innerText,e.clientX,e.clientY);
    });

    t.addEventListener("touchstart",e=>{
        let p=e.touches[0];
        createAtom(t.innerText,p.clientX,p.clientY);
    });
});

/* DRAG */
function getP(e){return e.touches?e.touches[0]:e;}

document.addEventListener("mousemove",e=>{
    if(!draggingAtom) return;
    clearTimeout(holdTimer);

    let p=getP(e);
    let rect=workspace.getBoundingClientRect();

    draggingAtom.x=p.clientX-rect.left-radius[draggingAtom.type];
    draggingAtom.y=p.clientY-rect.top-radius[draggingAtom.type];

    setPos(draggingAtom);
});

document.addEventListener("touchmove",e=>{
    if(!draggingAtom) return;
    e.preventDefault();
    clearTimeout(holdTimer);

    let p=getP(e);
    let rect=workspace.getBoundingClientRect();

    draggingAtom.x=p.clientX-rect.left-radius[draggingAtom.type];
    draggingAtom.y=p.clientY-rect.top-radius[draggingAtom.type];

    setPos(draggingAtom);
},{passive:false});

document.addEventListener("mouseup",endDrag);
document.addEventListener("touchend",endDrag);

function endDrag(){
    clearTimeout(holdTimer);

    if(!draggingAtom) return;

    let atom=draggingAtom;
    draggingAtom=null;

    tryConnect(atom);
    checkWin();
}

/* CONEXÃO */
function tryConnect(a){
    atoms.forEach(b=>{
        if(a===b) return;

        let ax=a.x+radius[a.type];
        let ay=a.y+radius[a.type];
        let bx=b.x+radius[b.type];
        let by=b.y+radius[b.type];

        let d=Math.hypot(ax-bx,ay-by);
        let limit=radius[a.type]+radius[b.type];

        if(d<=limit && canBond(a,b)){
            connect(a,b);
        }
    });
}

function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a,b){
    if(bonds.some(x =>
        (x.a===a && x.b===b)||(x.a===b && x.b===a)
    )) return;

    bonds.push({a,b});
    a.bonds.push(b);
    b.bonds.push(a);
}

/* VALIDAÇÃO GENÉRICA */
function checkWin(){
    let req=challenges[level].req;

    // contar átomos
    for(let k in req){
        let count=atoms.filter(a=>a.type===k).length;
        if(count!==req[k]) return;
    }

    // valência correta
    if(!atoms.every(a=>a.bonds.length===valence[a.type])) return;

    // tudo conectado
    let visited=new Set();
    function dfs(a){
        visited.add(a);
        a.bonds.forEach(b=>{
            if(!visited.has(b)) dfs(b);
        });
    }
    dfs(atoms[0]);

    if(visited.size!==atoms.length) return;

    // vitória
    feedback.innerText="🎉 Correto!";
    document.body.classList.add("win");

    if(navigator.vibrate) navigator.vibrate(200);

    level++;
    if(level>=challenges.length){
        feedback.innerText="🏆 Finalizado!";
        level=0;
    }

    setTimeout(newGame,1500);
}

/* DESENHO */
function draw(){
    svg.innerHTML="";
    bonds.forEach(b=>{
        let x1=b.a.x+radius[b.a.type];
        let y1=b.a.y+radius[b.a.type];
        let x2=b.b.x+radius[b.b.type];
        let y2=b.b.y+radius[b.b.type];

        let line=document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1",x1);
        line.setAttribute("y1",y1);
        line.setAttribute("x2",x2);
        line.setAttribute("y2",y2);
        line.setAttribute("stroke","black");
        line.setAttribute("stroke-width","5");
        svg.appendChild(line);
    });
    requestAnimationFrame(draw);
}
draw();

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

newGame();
</script>

</body>
</html>
