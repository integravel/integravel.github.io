<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f7f7f7;
    overflow: hidden;
}

#topbar {
    background: #222;
    color: white;
    padding: 10px;
    text-align: center;
}

#workspace {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
}

#svgLayer {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.H {
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: #666;
    color: white;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="challenge"></div>
    <div id="feedback"></div>
</div>

<div id="workspace">
    <svg id="svgLayer"></svg>
</div>

<div id="shelf"></div>

<script>
let atoms=[], bonds=[], preview=null;
let level=0;

const workspace=document.getElementById("workspace");
const shelf=document.getElementById("shelf");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

const valence={H:1,C:4};
const radius={H:14,C:25};

const challenges=[
    {name:"metano",c:1,h:4,type:"chain"},
    {name:"etano",c:2,h:6,type:"chain"},
    {name:"propano",c:3,h:8,type:"chain"},
    {name:"butano",c:4,h:10,type:"chain"},
    {name:"isobutano",c:4,h:10,type:"branched"}
];

function newGame(){
    atoms=[]; bonds=[]; preview=null;
    svg.innerHTML=""; shelf.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    let c=challenges[level];
    challengeText.innerText="Fase "+(level+1)+": "+c.name;
    feedback.innerText="Arraste e conecte";

    createAtoms("C",c.c);
    createAtoms("H",c.h);
}

function createAtoms(type,count){
    for(let i=0;i<count;i++){
        let el=document.createElement("div");
        el.className="atom "+type;
        el.innerText=type;

        let atom={
            type,el,bonds:[],
            x:0,y:0,
            vx:0,vy:0,
            inWorkspace:false
        };

        atoms.push(atom);
        shelf.appendChild(el);
        el.style.position="relative";
        drag(atom);
    }
}

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

/* DRAG */
function drag(atom){
    let dragging=false;

    function getP(e){return e.touches?e.touches[0]:e;}

    atom.el.addEventListener("mousedown",start);
    atom.el.addEventListener("touchstart",start);

    document.addEventListener("mousemove",move);
    document.addEventListener("touchmove",move,{passive:false});
    document.addEventListener("mouseup",end);
    document.addEventListener("touchend",end);

    function start(e){
        e.preventDefault();
        let p=getP(e);
        let rect=workspace.getBoundingClientRect();

        workspace.appendChild(atom.el);
        atom.inWorkspace=true;
        atom.el.style.position="absolute";

        atom.x=p.clientX-rect.left-radius[atom.type];
        atom.y=p.clientY-rect.top-radius[atom.type];
        atom.vx=0;
        atom.vy=0;

        setPos(atom);
        dragging=true;
    }

    function move(e){
        if(!dragging) return;
        e.preventDefault();

        let p=getP(e);
        let rect=workspace.getBoundingClientRect();

        atom.x=p.clientX-rect.left-radius[atom.type];
        atom.y=p.clientY-rect.top-radius[atom.type];
        atom.vx=0;
        atom.vy=0;

        setPos(atom);
        previewBond(atom);
    }

    function end(){
        if(!dragging) return;
        dragging=false;

        if(preview){
            connect(preview.a,preview.b);
            preview=null;
        }

        checkWin();
    }
}

/* PREVIEW */
function previewBond(a){
    preview=null;
    atoms.forEach(b=>{
        if(a===b||!b.inWorkspace) return;

        let d=Math.hypot(a.x-b.x,a.y-b.y);
        let target=radius[a.type]+radius[b.type];

        if(d<target+30 && canBond(a,b)){
            preview={a,b};
        }
    });
}

/* CONECTAR */
function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a,b){
    if(a.bonds.includes(b)) return;
    if(!canBond(a,b)) return;

    bonds.push({a,b});
    a.bonds.push(b);
    b.bonds.push(a);
}

/* FÍSICA REAL */
function relax(){

    // forças das ligações
    bonds.forEach(b=>{
        let dx=b.b.x-b.a.x;
        let dy=b.b.y-b.a.y;
        let d=Math.hypot(dx,dy);

        let target=radius[b.a.type]+radius[b.b.type]+10;

        if(d===0) return;

        let force=(d-target)*0.05;

        let fx=(dx/d)*force;
        let fy=(dy/d)*force;

        b.a.vx += fx;
        b.a.vy += fy;
        b.b.vx -= fx;
        b.b.vy -= fy;
    });

    // repulsão
    atoms.forEach(a=>{
        atoms.forEach(b=>{
            if(a===b) return;

            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);

            let min=radius[a.type]+radius[b.type];

            if(d<min && d>0){
                let push=(min-d)*0.02;

                a.vx -= dx/d*push;
                a.vy -= dy/d*push;
                b.vx += dx/d*push;
                b.vy += dy/d*push;
            }
        });
    });

    // aplicar movimento + atrito real
    atoms.forEach(a=>{
        a.vx *= 0.9;
        a.vy *= 0.9;

        if(Math.abs(a.vx)<0.001) a.vx=0;
        if(Math.abs(a.vy)<0.001) a.vy=0;

        a.x += a.vx;
        a.y += a.vy;

        setPos(a);
    });

    requestAnimationFrame(relax);
}
relax();

/* DESENHO */
function draw(){
    svg.innerHTML="";

    bonds.forEach(b=>{
        let x1=b.a.x+radius[b.a.type];
        let y1=b.a.y+radius[b.a.type];
        let x2=b.b.x+radius[b.b.type];
        let y2=b.b.y+radius[b.b.type];

        let dx=x2-x1;
        let dy=y2-y1;
        let len=Math.hypot(dx,dy);

        let sx=x1+dx/len*radius[b.a.type];
        let sy=y1+dy/len*radius[b.a.type];
        let ex=x2-dx/len*radius[b.b.type];
        let ey=y2-dy/len*radius[b.b.type];

        let line=document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1",sx);
        line.setAttribute("y1",sy);
        line.setAttribute("x2",ex);
        line.setAttribute("y2",ey);
        line.setAttribute("stroke","black");
        line.setAttribute("stroke-width","6");
        svg.appendChild(line);
    });

    requestAnimationFrame(draw);
}
draw();

/* VALIDAÇÃO */
function checkWin(){
    let carbons=atoms.filter(a=>a.type==="C");

    let visited=new Set();
    function dfs(a){
        visited.add(a);
        a.bonds.forEach(b=>{
            if(b.type==="C" && !visited.has(b)) dfs(b);
        });
    }
    dfs(carbons[0]);

    if(visited.size!==carbons.length) return;
    if(!atoms.every(a=>a.bonds.length===valence[a.type])) return;

    let degrees=carbons.map(c=>c.bonds.filter(b=>b.type==="C").length).sort().join(",");

    let c=challenges[level];
    let win=false;

    if(c.type==="chain"){
        if(c.c===1) win=true;
        if(c.c===2) win=degrees==="1,1";
        if(c.c===3) win=degrees==="1,2,1";
        if(c.c===4) win=degrees==="1,2,2,1";
    }

    if(c.type==="branched"){
        win=degrees==="1,1,1,3";
    }

    if(win){
        feedback.innerText="🎉 Correto!";
        level++;
        if(level>=challenges.length){
            feedback.innerText="🏆 Finalizado!";
            level=0;
        }
        setTimeout(newGame,2000);
    }else{
        feedback.innerText="❌ Estrutura incorreta";
    }
}

newGame();
</script>

</body>
</html>
