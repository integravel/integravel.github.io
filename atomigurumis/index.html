<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {margin:0;font-family:sans-serif;background:#f7f7f7;overflow:hidden;}
#topbar {background:#222;color:white;padding:10px;text-align:center;}
#workspace {position:absolute;top:80px;bottom:120px;width:100%;}
#svgLayer {position:absolute;width:100%;height:100%;pointer-events:none;}
#shelf {position:absolute;bottom:0;height:120px;width:100%;background:#e0e0e0;display:flex;justify-content:center;align-items:center;gap:10px;}

.atom {
    position:absolute;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;
}

.H {width:28px;height:28px;background:white;border:2px solid black;}
.C {width:50px;height:50px;background:#666;color:white;}
</style>
</head>

<body>

<div id="topbar">
<div id="challenge"></div>
<div id="feedback"></div>
</div>

<div id="workspace">
<svg id="svgLayer"></svg>
</div>

<div id="shelf"></div>

<script>
let atoms=[], bonds=[], preview=null;
let level=0;
let anchor=null;

const workspace=document.getElementById("workspace");
const shelf=document.getElementById("shelf");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

const valence={H:1,C:4};
const radius={H:14,C:25};

const challenges=[
    {name:"metano",c:1,h:4,type:"chain"},
    {name:"etano",c:2,h:6,type:"chain"},
    {name:"propano",c:3,h:8,type:"chain"},
    {name:"butano",c:4,h:10,type:"chain"},
    {name:"isobutano",c:4,h:10,type:"branched"}
];

function newGame(){
    atoms=[]; bonds=[]; preview=null; anchor=null;
    svg.innerHTML=""; shelf.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    let c=challenges[level];
    challengeText.innerText="Fase "+(level+1)+": "+c.name;
    feedback.innerText="Arraste e conecte";

    createAtoms("C",c.c);
    createAtoms("H",c.h);
}

function createAtoms(type,count){
    for(let i=0;i<count;i++){
        let el=document.createElement("div");
        el.className="atom "+type;
        el.innerText=type;

        let atom={
            type,el,bonds:[],
            x:0,y:0,
            vx:0,vy:0,
            inWorkspace:false,
            isAnchor:false
        };

        atoms.push(atom);
        shelf.appendChild(el);
        el.style.position="relative";
        drag(atom);
    }
}

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

/* DRAG */
function drag(atom){
    let dragging=false;
    let holdTimer=null;
    let startX=0, startY=0;

    function getP(e){return e.touches?e.touches[0]:e;}

    atom.el.addEventListener("mousedown",start);
    atom.el.addEventListener("touchstart",start);

    document.addEventListener("mousemove",move);
    document.addEventListener("touchmove",move,{passive:false});
    document.addEventListener("mouseup",end);
    document.addEventListener("touchend",end);

    function start(e){
        e.preventDefault();

        let p=getP(e);
        let rect=workspace.getBoundingClientRect();

        startX=p.clientX;
        startY=p.clientY;

        workspace.appendChild(atom.el);
        atom.inWorkspace=true;
        atom.el.style.position="absolute";

        atom.x=p.clientX-rect.left-radius[atom.type];
        atom.y=p.clientY-rect.top-radius[atom.type];

        atom.vx=0; atom.vy=0;
        setPos(atom);

        if(!anchor){
            anchor=atom;
            atom.isAnchor=true;
        }

        holdTimer=setTimeout(()=>disconnect(atom),300);

        dragging=true;
    }

    function move(e){
        if(!dragging) return;
        e.preventDefault();

        let p=getP(e);

        let dist=Math.hypot(p.clientX-startX,p.clientY-startY);
        if(dist>10) clearTimeout(holdTimer);

        let rect=workspace.getBoundingClientRect();

        atom.x=p.clientX-rect.left-radius[atom.type];
        atom.y=p.clientY-rect.top-radius[atom.type];

        atom.vx=0; atom.vy=0;

        setPos(atom);
        previewBond(atom);
    }

    function end(){
        if(!dragging) return;
        dragging=false;

        clearTimeout(holdTimer);

        if(preview){
            connect(preview.a,preview.b);
            preview=null;
        }

        checkWin();
    }
}

/* PREVIEW */
function previewBond(a){
    preview=null;
    atoms.forEach(b=>{
        if(a===b||!b.inWorkspace) return;

        let d=Math.hypot(a.x-b.x,a.y-b.y);
        let target=radius[a.type]+radius[b.type];

        if(d<target+30 && canBond(a,b)){
            preview={a,b};
        }
    });
}

/* REGRAS */
function canBond(a,b){
    if(a.type==="H" && b.type==="H") return false;

    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a,b){
    if(bonds.some(x =>
        (x.a===a && x.b===b) ||
        (x.a===b && x.b===a)
    )) return;

    if(!canBond(a,b)) return;

    bonds.push({a,b});

    if(!a.bonds.includes(b)) a.bonds.push(b);
    if(!b.bonds.includes(a)) b.bonds.push(a);
}

/* DESFAZER */
function disconnect(atom){
    bonds=bonds.filter(b=>{
        if(b.a===atom||b.b===atom){
            b.a.bonds=b.a.bonds.filter(x=>x!==b.b);
            b.b.bonds=b.b.bonds.filter(x=>x!==b.a);
            return false;
        }
        return true;
    });
}

/* VALIDAÇÃO INTELIGENTE */

// cadeia linear real
function isLinearChain(carbons){
    if(carbons.length === 1) return true;

    let ends = carbons.filter(c =>
        c.bonds.filter(b=>b.type==="C").length === 1
    );

    if(ends.length !== 2) return false;

    let visited=new Set();

    function walk(c){
        visited.add(c);
        c.bonds.forEach(b=>{
            if(b.type==="C" && !visited.has(b)){
                walk(b);
            }
        });
    }

    walk(ends[0]);

    return visited.size===carbons.length;
}

// ramificação real (isobutano)
function isBranched(carbons){
    return carbons.some(c =>
        c.bonds.filter(b=>b.type==="C").length === 3
    );
}

/* FÍSICA */
function relax(){

    bonds.forEach(b=>{
        let dx=b.b.x-b.a.x;
        let dy=b.b.y-b.a.y;
        let d=Math.hypot(dx,dy);

        let target=radius[b.a.type]+radius[b.b.type]+20;
        if(d===0) return;

        let force=(d-target)*0.05;

        let fx=(dx/d)*force;
        let fy=(dy/d)*force;

        if(!b.a.isAnchor){
            b.a.vx+=fx;
            b.a.vy+=fy;
        }

        if(!b.b.isAnchor){
            b.b.vx-=fx;
            b.b.vy-=fy;
        }
    });

    atoms.forEach(a=>{
        let n=a.bonds.length;
        if(n<2) return;

        a.bonds.forEach((b,i)=>{
            let angle=(i/n)*Math.PI*2;

            let tx=a.x+Math.cos(angle)*80;
            let ty=a.y+Math.sin(angle)*80;

            if(!b.isAnchor){
                b.vx += (tx-b.x)*0.01;
                b.vy += (ty-b.y)*0.01;
            }
        });
    });

    atoms.forEach(a=>{
        if(a.isAnchor){
            a.vx=0;
            a.vy=0;
            return;
        }

        a.vx*=0.85;
        a.vy*=0.85;

        if(Math.abs(a.vx)<0.001) a.vx=0;
        if(Math.abs(a.vy)<0.001) a.vy=0;

        a.x+=a.vx;
        a.y+=a.vy;

        setPos(a);
    });

    requestAnimationFrame(relax);
}
relax();

/* DESENHO */
function draw(){
    svg.innerHTML="";

    bonds.forEach(b=>{
        let x1=b.a.x+radius[b.a.type];
        let y1=b.a.y+radius[b.a.type];
        let x2=b.b.x+radius[b.b.type];
        let y2=b.b.y+radius[b.b.type];

        let dx=x2-x1;
        let dy=y2-y1;
        let len=Math.hypot(dx,dy);

        let sx=x1+dx/len*radius[b.a.type];
        let sy=y1+dy/len*radius[b.a.type];
        let ex=x2-dx/len*radius[b.b.type];
        let ey=y2-dy/len*radius[b.b.type];

        let line=document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1",sx);
        line.setAttribute("y1",sy);
        line.setAttribute("x2",ex);
        line.setAttribute("y2",ey);
        line.setAttribute("stroke","black");
        line.setAttribute("stroke-width","6");
        svg.appendChild(line);
    });

    requestAnimationFrame(draw);
}
draw();

/* CHECK FINAL */
function checkWin(){
    let carbons=atoms.filter(a=>a.type==="C");

    if(!atoms.every(a=>a.bonds.length===valence[a.type])) return;

    let c=challenges[level];
    let win=false;

    if(c.type==="chain"){
        win = isLinearChain(carbons);
    }

    if(c.type==="branched"){
        win = isBranched(carbons);
    }

    if(win){
        feedback.innerText="🎉 Correto!";
        level++;
        if(level>=challenges.length){
            feedback.innerText="🏆 Finalizado!";
            level=0;
        }
        setTimeout(newGame,2000);
    }else{
        feedback.innerText="❌ Estrutura incorreta";
    }
}

newGame();
</script>

</body>
</html>
