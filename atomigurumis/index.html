<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f7f7f7;
    overflow: hidden;
}

#topbar {
    background: #222;
    color: white;
    padding: 10px;
    text-align: center;
}

#challenge {
    font-size: 18px;
}

#feedback {
    font-size: 14px;
    color: #4caf50;
}

#workspace {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
}

#svgLayer {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    transition: transform 0.15s, box-shadow 0.1s;
}

.atom.holding {
    transform: scale(1.2);
}

.atom.highlight {
    box-shadow: 0 0 10px #2196f3;
}

.H {
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: #666;
    color: white;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="challenge"></div>
    <div id="feedback">Arraste e conecte</div>
</div>

<div id="workspace">
    <svg id="svgLayer"></svg>
</div>

<div id="shelf"></div>

<script>
let atoms=[];
let bonds=[];
let preview=null;

const workspace=document.getElementById("workspace");
const shelf=document.getElementById("shelf");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

const valence={H:1,C:4};
const radius={H:14,C:25};

const challenges=[
    {name:"metano",c:1,h:4,type:"chain"},
    {name:"etano",c:2,h:6,type:"chain"},
    {name:"propano",c:3,h:8,type:"chain"},
    {name:"butano",c:4,h:10,type:"chain"},
    {name:"isobutano",c:4,h:10,type:"branched"}
];

let current;

/* RESET */
function newGame(){
    atoms=[];
    bonds=[];
    preview=null;
    svg.innerHTML="";
    shelf.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    current=challenges[Math.random()*challenges.length|0];
    challengeText.innerText=current.name;

    createAtoms("C",current.c);
    createAtoms("H",current.h);
}

/* CRIAR */
function createAtoms(type,count){
    for(let i=0;i<count;i++){
        let el=document.createElement("div");
        el.className="atom "+type;
        el.innerText=type;

        let atom={
            type,el,
            bonds:[],
            x:0,y:0,
            inWorkspace:false
        };

        atoms.push(atom);
        shelf.appendChild(el);
        el.style.position="relative";

        drag(atom);
    }
}

/* POSIÇÃO */
function setPos(a){
    a.el.style.left = a.x + "px";
    a.el.style.top = a.y + "px";
}

/* DRAG + HOLD */
function drag(atom){
    let dragging=false;
    let holdTimer=null;
    let startX=0, startY=0;

    function getP(e){return e.touches?e.touches[0]:e;}

    atom.el.addEventListener("mousedown",start);
    atom.el.addEventListener("touchstart",start);

    document.addEventListener("mousemove",move);
    document.addEventListener("touchmove",move,{passive:false});

    document.addEventListener("mouseup",end);
    document.addEventListener("touchend",end);

    function start(e){
        e.preventDefault();

        let p=getP(e);
        const rect = workspace.getBoundingClientRect();

        workspace.appendChild(atom.el);
        atom.inWorkspace=true;
        atom.el.style.position="absolute";

        atom.x = p.clientX - rect.left - radius[atom.type];
        atom.y = p.clientY - rect.top - radius[atom.type];

        startX = p.clientX;
        startY = p.clientY;

        setPos(atom);

        // HOLD para desconectar
        holdTimer = setTimeout(()=>{
            disconnect(atom);
            atom.el.classList.add("holding");
        },300);

        dragging=true;
    }

    function move(e){
        if(!dragging) return;
        e.preventDefault();

        let p=getP(e);
        const rect = workspace.getBoundingClientRect();

        // se mexeu muito → cancela hold
        if(Math.hypot(p.clientX-startX,p.clientY-startY)>10){
            clearTimeout(holdTimer);
            atom.el.classList.remove("holding");
        }

        atom.x = p.clientX - rect.left - radius[atom.type];
        atom.y = p.clientY - rect.top - radius[atom.type];

        setPos(atom);
        previewBond(atom);
    }

    function end(){
        if(!dragging) return;

        dragging=false;
        clearTimeout(holdTimer);
        atom.el.classList.remove("holding");

        if(preview){
            connect(preview.a,preview.b);
            snap(preview.a,preview.b);
            preview=null;
        }

        checkWin();
    }
}

/* SNAP */
function snap(a,b){
    let dx=b.x-a.x;
    let dy=b.y-a.y;
    let d=Math.hypot(dx,dy);
    let target=radius[a.type]+radius[b.type];

    if(d===0) return;

    let nx=dx/d;
    let ny=dy/d;

    let midX=(a.x+b.x)/2;
    let midY=(a.y+b.y)/2;

    a.x=midX-nx*target/2;
    a.y=midY-ny*target/2;

    b.x=midX+nx*target/2;
    b.y=midY+ny*target/2;
}

/* PREVIEW */
function previewBond(a){
    preview=null;
    atoms.forEach(b=>{
        if(a===b||!b.inWorkspace) return;

        let d=Math.hypot(a.x-b.x,a.y-b.y);
        let target=radius[a.type]+radius[b.type];

        if(d<target+30 && canBond(a,b)){
            preview={a,b};
            b.el.classList.add("highlight");
        }else{
            b.el.classList.remove("highlight");
        }
    });
}

/* CONECTAR */
function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a,b){
    if(a.bonds.includes(b)) return;

    a.bonds.push(b);
    b.bonds.push(a);
    bonds.push({a,b});
}

/* DESCONEXÃO */
function disconnect(atom){
    bonds=bonds.filter(b=>{
        if(b.a===atom||b.b===atom){
            b.a.bonds=b.a.bonds.filter(x=>x!==b.b);
            b.b.bonds=b.b.bonds.filter(x=>x!==b.a);
            return false;
        }
        return true;
    });
}

/* FÍSICA */
function relax(){
    bonds.forEach(b=>{
        let dx=b.b.x-b.a.x;
        let dy=b.b.y-b.a.y;
        let d=Math.hypot(dx,dy);
        let target=radius[b.a.type]+radius[b.b.type];

        let force=(d-target)*0.1;

        if(d>0){
            let fx=(dx/d)*force;
            let fy=(dy/d)*force;
            b.a.x+=fx;
            b.a.y+=fy;
            b.b.x-=fx;
            b.b.y-=fy;
        }
    });

    // repulsão
    atoms.forEach(a=>{
        atoms.forEach(b=>{
            if(a===b) return;

            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);
            let min=radius[a.type]+radius[b.type];

            if(d<min && d>0){
                let push=(min-d)*0.2;
                a.x-=dx/d*push;
                a.y-=dy/d*push;
            }
        });
    });

    atoms.forEach(setPos);
    requestAnimationFrame(relax);
}
relax();

/* DESENHO */
function draw(){
    svg.innerHTML="";

    bonds.forEach(b=>{
        drawLine(b.a,b.b,"black");
    });

    if(preview){
        drawLine(preview.a,preview.b,"#2196f3",true);
    }

    requestAnimationFrame(draw);
}

function drawLine(a,b,color,dashed=false){
    let x1=a.x+radius[a.type];
    let y1=a.y+radius[a.type];
    let x2=b.x+radius[b.type];
    let y2=b.y+radius[b.type];

    let line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",x1);
    line.setAttribute("y1",y1);
    line.setAttribute("x2",x2);
    line.setAttribute("y2",y2);
    line.setAttribute("stroke",color);
    line.setAttribute("stroke-width","3");

    if(dashed) line.setAttribute("stroke-dasharray","5,5");

    svg.appendChild(line);
}
draw();

/* VALIDAÇÃO */
function allPlaced(){
    return atoms.every(a=>a.inWorkspace);
}

function fullValence(){
    return atoms.every(a=>a.bonds.length===valence[a.type]);
}

function carbonShape(){
    return atoms
        .filter(a=>a.type==="C")
        .map(c=>c.bonds.filter(b=>b.type==="C").length)
        .sort()
        .join(",");
}

function checkWin(){
    if(!allPlaced()||!fullValence()) return;

    let g=carbonShape();
    let win=false;

    if(current.type==="chain"){
        if(current.c===1) win=true;
        if(current.c===2) win=g==="1,1";
        if(current.c===3) win=g==="1,2,1";
        if(current.c===4) win=g==="1,2,2,1";
    }

    if(current.type==="branched"){
        win=g==="1,1,1,3";
    }

    if(win){
        feedback.innerText="🎉 Parabéns!";
        setTimeout(newGame,3000);
    }else{
        feedback.innerText="❌ Estrutura incorreta";
    }
}

newGame();
</script>

</body>
</html>
