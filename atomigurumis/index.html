<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f7f7f7;
    overflow:hidden;
}

#topbar {
    background:#222;
    color:white;
    padding:10px;
    text-align:center;
}

#workspace {
    position:absolute;
    top:80px;
    bottom:120px;
    width:100%;
}

#svgLayer {
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

#shelf {
    position:absolute;
    bottom:0;
    height:120px;
    width:100%;
    background:#e0e0e0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
}

.template {
    width:60px;height:60px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;cursor:pointer;
}

.template.H { background:white; border:2px solid black; }
.template.C { background:#666; color:white; }
.template.O { background:red; color:white; }
.template.N { background:blue; color:white; }

.atom {
    position:absolute;
    border-radius:50%;
    aspect-ratio:1/1;
}

.atom.H { width:28px; background:white; border:2px solid black; }
.atom.C { width:50px; background:#666; }
.atom.O { width:40px; background:red; }
.atom.N { width:44px; background:blue; }
</style>
</head>

<body>

<div id="topbar">
<div id="challenge"></div>
<div id="feedback"></div>
</div>

<div id="workspace">
<svg id="svgLayer"></svg>
</div>

<div id="shelf">
<div class="template H">H</div>
<div class="template C">C</div>
<div class="template O">O</div>
<div class="template N">N</div>
</div>

<script>
let atoms=[], bonds=[];
let dragging=null, holdTimer=null;
let level=0;

const valence={H:1,C:4,O:2,N:3};
const radius={H:14,C:25,O:20,N:22};

const challenges=[
    {name:"Gás hidrogênio",req:{H:2}, type:"H2"},
    {name:"Água",req:{H:2,O:1}},
    {name:"Amônia",req:{N:1,H:3}},
    {name:"Dióxido de carbono",req:{C:1,O:2}, type:"CO2"}
];

const workspace=document.getElementById("workspace");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

function newGame(){
    atoms=[]; bonds=[];
    svg.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    challengeText.innerText="Fase "+(level+1)+": "+challenges[level].name;
    feedback.innerText="";
}

/* CRIAR */
function createAtom(type,x,y){
    let rect=workspace.getBoundingClientRect();

    let atom={
        type,
        bonds:[],
        el:document.createElement("div"),
        x:x-rect.left-radius[type],
        y:y-rect.top-radius[type]
    };

    atom.el.className="atom "+type;

    atoms.push(atom);
    workspace.appendChild(atom.el);

    atom.el.addEventListener("mousedown",e=>startDrag(e,atom));
    atom.el.addEventListener("touchstart",e=>startDrag(e,atom));

    setPos(atom);

    return atom; // ⭐ IMPORTANTE
}

function startDrag(e,atom){
    e.stopPropagation();
    dragging=atom;

    holdTimer=setTimeout(()=>disconnect(atom),300);
}

/* TEMPLATE (CORRIGIDO) */
document.querySelectorAll(".template").forEach(t=>{
    t.addEventListener("mousedown",e=>{
        let atom=createAtom(t.innerText,e.clientX,e.clientY);
        dragging=atom; // ⭐ inicia drag
    });

    t.addEventListener("touchstart",e=>{
        let p=e.touches[0];
        let atom=createAtom(t.innerText,p.clientX,p.clientY);
        dragging=atom; // ⭐ inicia drag
    });
});

/* DRAG */
function getP(e){return e.touches?e.touches[0]:e;}

document.addEventListener("mousemove",e=>{
    if(!dragging) return;
    clearTimeout(holdTimer);

    let p=getP(e);
    let rect=workspace.getBoundingClientRect();

    dragging.x=p.clientX-rect.left-radius[dragging.type];
    dragging.y=p.clientY-rect.top-radius[dragging.type];

    setPos(dragging);
});

document.addEventListener("touchmove",e=>{
    if(!dragging) return;
    e.preventDefault();
    clearTimeout(holdTimer);

    let p=getP(e);
    let rect=workspace.getBoundingClientRect();

    dragging.x=p.clientX-rect.left-radius[dragging.type];
    dragging.y=p.clientY-rect.top-radius[dragging.type];

    setPos(dragging);
},{passive:false});

document.addEventListener("mouseup",endDrag);
document.addEventListener("touchend",endDrag);

function endDrag(){
    clearTimeout(holdTimer);
    if(!dragging) return;

    tryConnect(dragging);
    dragging=null;
    checkWin();
}

/* CONEXÃO */
function tryConnect(a){
    atoms.forEach(b=>{
        if(a===b) return;

        let ax=a.x+radius[a.type];
        let ay=a.y+radius[a.type];
        let bx=b.x+radius[b.type];
        let by=b.y+radius[b.type];

        let d=Math.hypot(ax-bx,ay-by);
        let limit=radius[a.type]+radius[b.type];

        if(d<=limit && canBond(a,b)){
            bonds.push({a,b});
            a.bonds.push(b);
            b.bonds.push(a);
        }
    });
}

function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

/* DESCONEXÃO */
function disconnect(atom){
    bonds = bonds.filter(b=>{
        if(b.a===atom || b.b===atom){
            b.a.bonds=b.a.bonds.filter(x=>x!==b.b);
            b.b.bonds=b.b.bonds.filter(x=>x!==b.a);
            return false;
        }
        return true;
    });
}

/* VALIDAÇÃO */
function checkWin(){
    let c=challenges[level];

    for(let k in c.req){
        let count=atoms.filter(a=>a.type===k).length;
        if(count!==c.req[k]) return;
    }

    if(!atoms.every(a=>a.bonds.length===valence[a.type])) return;

    feedback.innerText="🎉 Correto!";
    level++;
    setTimeout(newGame,1500);
}

/* DESENHO */
function draw(){
    svg.innerHTML="";
    bonds.forEach(b=>drawLine(b.a,b.b));
    requestAnimationFrame(draw);
}

function drawLine(a,b){
    let x1=a.x+radius[a.type];
    let y1=a.y+radius[a.type];
    let x2=b.x+radius[b.type];
    let y2=b.y+radius[b.type];

    let line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",x1);
    line.setAttribute("y1",y1);
    line.setAttribute("x2",x2);
    line.setAttribute("y2",y2);
    line.setAttribute("stroke","black");
    line.setAttribute("stroke-width","4");

    svg.appendChild(line);
}

draw();

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

newGame();
</script>

</body>
</html>
