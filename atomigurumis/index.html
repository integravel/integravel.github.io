<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moléculas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f7f7f7;
    overflow: hidden;
}

#topbar {
    background: #222;
    color: white;
    padding: 10px;
    text-align: center;
}

#challenge {
    font-size: 18px;
}

#feedback {
    font-size: 15px;
    color: #4caf50;
}

#workspace {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
}

#svgLayer {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.H {
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: #666;
    color: white;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="challenge"></div>
    <div id="feedback">Arraste e conecte os átomos</div>
</div>

<div id="workspace">
    <svg id="svgLayer"></svg>
</div>

<div id="shelf"></div>

<script>
let atoms=[];
let bonds=[];

let isInteracting = false;

const workspace=document.getElementById("workspace");
const shelf=document.getElementById("shelf");
const svg=document.getElementById("svgLayer");
const challengeText=document.getElementById("challenge");
const feedback=document.getElementById("feedback");

const valence={H:1,C:4};
const radius={H:14,C:25};

const challenges=[
    {name:"metano",c:1,h:4,type:"chain"},
    {name:"etano",c:2,h:6,type:"chain"},
    {name:"propano",c:3,h:8,type:"chain"},
    {name:"butano",c:4,h:10,type:"chain"},
    {name:"isobutano",c:4,h:10,type:"branched"}
];

let current;

/* RESET */
function newGame(){
    atoms=[];
    bonds=[];
    svg.innerHTML="";
    shelf.innerHTML="";
    workspace.querySelectorAll(".atom").forEach(e=>e.remove());

    current=challenges[Math.floor(Math.random()*challenges.length)];
    challengeText.innerText=current.name;
    feedback.innerText="Arraste e conecte os átomos";

    createAtoms("C",current.c);
    createAtoms("H",current.h);
}

/* CRIAÇÃO */
function createAtoms(type,count){
    for(let i=0;i<count;i++){
        let el=document.createElement("div");
        el.className="atom "+type;
        el.innerText=type;

        let atom={
            type,el,
            bonds:[],
            x:0,y:0,
            inWorkspace:false
        };

        atoms.push(atom);
        shelf.appendChild(el);
        el.style.position="relative";

        drag(atom);
    }
}

/* DRAG + SEGURAR */
function drag(atom){
    let dragging=false;
    let holdTimer=null;
    let offsetX=0,offsetY=0;

    function getP(e){return e.touches?e.touches[0]:e;}

    atom.el.addEventListener("mousedown",start);
    document.addEventListener("mousemove",move);
    document.addEventListener("mouseup",end);

    atom.el.addEventListener("touchstart",start);
    document.addEventListener("touchmove",move);
    document.addEventListener("touchend",end);

    function start(e){
        isInteracting = true;

        let p=getP(e);
        let rect=atom.el.getBoundingClientRect();

        offsetX=p.clientX-rect.left;
        offsetY=p.clientY-rect.top;

        holdTimer=setTimeout(()=>{
            disconnect(atom);
        },300);

        workspace.appendChild(atom.el);

        atom.x=rect.left;
        atom.y=rect.top;
        atom.inWorkspace=true;

        atom.el.style.position="absolute";
    }

    function move(e){
        if(!dragging) dragging=true;
        clearTimeout(holdTimer);

        let p=getP(e);

        atom.x=p.clientX-offsetX;
        atom.y=p.clientY-offsetY;

        setPos(atom);
        connect(atom);
    }

    function end(){
        dragging=false;
        clearTimeout(holdTimer);
        isInteracting = false;
        checkWin();
    }
}

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

/* CONEXÃO */
function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a){
    atoms.forEach(b=>{
        if(a===b||!b.inWorkspace) return;

        let dx=a.x-b.x;
        let dy=a.y-b.y;
        let d=Math.hypot(dx,dy);
        let target=radius[a.type]+radius[b.type];

        if(d<target+10 && canBond(a,b)){
            if(!a.bonds.includes(b)){
                a.bonds.push(b);
                b.bonds.push(a);
                bonds.push({a,b});
            }
        }
    });
}

/* DESFAZER */
function disconnect(atom){
    bonds = bonds.filter(b=>{
        if(b.a===atom || b.b===atom){
            b.a.bonds=b.a.bonds.filter(x=>x!==b.b);
            b.b.bonds=b.b.bonds.filter(x=>x!==b.a);
            return false;
        }
        return true;
    });
}

/* DISTRIBUIÇÃO SUAVE */
function spread(){
    if(isInteracting) return;

    atoms.forEach(c=>{
        if(c.type!=="C") return;

        let neighbors=c.bonds;
        let n=neighbors.length;

        neighbors.forEach((b,i)=>{
            let angle=(i/n)*Math.PI*2;
            let targetDist=radius[c.type]+radius[b.type]+20;

            let tx=c.x+Math.cos(angle)*targetDist;
            let ty=c.y+Math.sin(angle)*targetDist;

            // movimento suave
            b.x += (tx - b.x) * 0.05;
            b.y += (ty - b.y) * 0.05;
        });
    });
}

/* DESENHO */
function draw(){
    svg.innerHTML="";

    bonds.forEach(b=>{
        let x1=b.a.x+radius[b.a.type];
        let y1=b.a.y+radius[b.a.type];
        let x2=b.b.x+radius[b.b.type];
        let y2=b.b.y+radius[b.b.type];

        let line=document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1",x1);
        line.setAttribute("y1",y1);
        line.setAttribute("x2",x2);
        line.setAttribute("y2",y2);
        line.setAttribute("stroke","black");
        line.setAttribute("stroke-width","3");

        svg.appendChild(line);
    });

    requestAnimationFrame(draw);
}
draw();

/* FÍSICA */
function relax(){
    bonds.forEach(b=>{
        let dx=b.b.x-b.a.x;
        let dy=b.b.y-b.a.y;
        let d=Math.hypot(dx,dy);
        let target=radius[b.a.type]+radius[b.b.type];

        let diff=d-target;
        let force=0.1*diff;

        if(d>0){
            let fx=(dx/d)*force;
            let fy=(dy/d)*force;
            b.a.x+=fx;
            b.a.y+=fy;
            b.b.x-=fx;
            b.b.y-=fy;
        }
    });

    spread();

    atoms.forEach(setPos);
    requestAnimationFrame(relax);
}
relax();

/* VALIDAÇÃO */
function allPlaced(){
    return atoms.every(a=>a.inWorkspace);
}

function fullValence(){
    return atoms.every(a=>a.bonds.length===valence[a.type]);
}

function carbonShape(){
    return atoms
        .filter(a=>a.type==="C")
        .map(c=>c.bonds.filter(b=>b.type==="C").length)
        .sort()
        .join(",");
}

function checkWin(){
    if(!allPlaced()||!fullValence()) return;

    let g=carbonShape();
    let win=false;

    if(current.type==="chain"){
        if(current.c===1) win=true;
        if(current.c===2) win=g==="1,1";
        if(current.c===3) win=g==="1,2,1";
        if(current.c===4) win=g==="1,2,2,1";
    }

    if(current.type==="branched"){
        win=g==="1,1,1,3";
    }

    if(win){
        feedback.innerText="🎉 Parabéns!";
        setTimeout(newGame,3000);
    } else {
        feedback.innerText="❌ Estrutura incorreta!";
    }
}

newGame();
</script>

</body>
</html>
