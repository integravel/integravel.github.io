<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo das Moléculas</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f7f7f7;
    overflow: hidden;
}

/* topo */
#topbar {
    background: #222;
    color: white;
    padding: 10px;
    text-align: center;
}

/* desafio */
#challenge {
    font-size: 18px;
    margin-top: 5px;
}

/* área */
#workspace {
    position: absolute;
    top: 80px;
    bottom: 120px;
    width: 100%;
    background: #ffffff;
}

/* prateleira */
#shelf {
    position: absolute;
    bottom: 0;
    height: 120px;
    width: 100%;
    background: #e0e0e0;
}

/* info */
#feedback {
    position: absolute;
    top: 90px;
    right: 10px;
    background: white;
    padding: 10px;
    border: 1px solid #ccc;
}

/* átomos */
.atom {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    touch-action: none;
}

.H {
    width: 28px;
    height: 28px;
    background: white;
    border: 2px solid black;
}

.C {
    width: 50px;
    height: 50px;
    background: #666;
    color: white;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="challenge"></div>
    <button onclick="newGame()">Novo Desafio</button>
</div>

<div id="workspace"></div>
<div id="feedback">Monte a molécula</div>
<div id="shelf"></div>

<script>
let atoms = [];

const workspace = document.getElementById("workspace");
const shelf = document.getElementById("shelf");
const feedback = document.getElementById("feedback");
const challengeText = document.getElementById("challenge");

const valence = { H: 1, C: 4 };
const radius = { H: 14, C: 25 };

/* desafios */
const challenges = [
    {name:"metano", c:1, h:4, type:"chain"},
    {name:"etano", c:2, h:6, type:"chain"},
    {name:"propano", c:3, h:8, type:"chain"},
    {name:"butano", c:4, h:10, type:"chain"},
    {name:"isobutano", c:4, h:10, type:"branched"}
];

let current;

/* iniciar jogo */
function newGame(){
    atoms=[];
    workspace.innerHTML="";
    shelf.innerHTML="";

    current = challenges[Math.floor(Math.random()*challenges.length)];
    challengeText.innerText = "Monte: " + current.name;

    for(let i=0;i<current.h;i++) createAtom("H",i);
    for(let i=0;i<current.c;i++) createAtom("C",i);

    feedback.innerText="Monte a molécula";
}

/* criar átomo */
function createAtom(type,i){
    let el=document.createElement("div");
    el.className="atom "+type;
    el.innerText=type;

    let atom={
        type,
        el,
        bonds:[],
        x:40+i*40,
        y:40
    };

    atoms.push(atom);
    shelf.appendChild(el);
    setPos(atom);
    drag(atom);
}

function setPos(a){
    a.el.style.left=a.x+"px";
    a.el.style.top=a.y+"px";
}

/* drag */
function drag(atom){
    let offX,offY,drag=false;

    function start(x,y){
        drag=true;
        offX=x-atom.x;
        offY=y-atom.y;
        workspace.appendChild(atom.el);
    }

    function move(x,y){
        if(!drag) return;
        atom.x=x-offX;
        atom.y=y-offY;
        setPos(atom);
        connect(atom);
    }

    function end(){
        drag=false;
        checkWin();
    }

    atom.el.onmousedown=e=>start(e.pageX,e.pageY);
    document.onmousemove=e=>move(e.pageX,e.pageY);
    document.onmouseup=end;

    atom.el.ontouchstart=e=>{
        let t=e.touches[0];
        start(t.pageX,t.pageY);
    };

    document.ontouchmove=e=>{
        let t=e.touches[0];
        move(t.pageX,t.pageY);
    };

    document.ontouchend=end;
}

/* ligação */
function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function canBond(a,b){
    return a.bonds.length<valence[a.type] &&
           b.bonds.length<valence[b.type];
}

function connect(a){
    atoms.forEach(b=>{
        if(a===b) return;
        let d=dist(a,b);
        let target=radius[a.type]+radius[b.type];

        if(d<target+10 && canBond(a,b)){
            if(!a.bonds.includes(b)){
                a.bonds.push(b);
                b.bonds.push(a);
            }
        }
    });
}

/* relaxamento */
function relax(){
    atoms.forEach(a=>{
        a.bonds.forEach(b=>{
            let dx=b.x-a.x;
            let dy=b.y-a.y;
            let d=Math.hypot(dx,dy);
            let target=radius[a.type]+radius[b.type];

            let diff=d-target;
            let force=0.1*diff;

            if(d>0){
                let fx=(dx/d)*force;
                let fy=(dy/d)*force;
                a.x+=fx;
                a.y+=fy;
                b.x-=fx;
                b.y-=fy;
            }
        });
    });

    atoms.forEach(a=>{
        atoms.forEach(b=>{
            if(a===b) return;
            let dx=a.x-b.x;
            let dy=a.y-b.y;
            let d=Math.hypot(dx,dy);
            let min=radius[a.type]+radius[b.type];

            if(d<min){
                let push=(min-d)/2;
                if(d>0){
                    a.x+=(dx/d)*push;
                    a.y+=(dy/d)*push;
                }
            }
        });
    });

    atoms.forEach(setPos);
}

/* loop */
function loop(){
    relax();
    requestAnimationFrame(loop);
}
loop();

/* validação */
function getCarbonGraph(){
    let carbons=atoms.filter(a=>a.type==="C");
    return carbons.map(c=>c.bonds.filter(b=>b.type==="C").length);
}

function checkWin(){
    let carbons=getCarbonGraph();

    if(carbons.length!==current.c) return;

    let sorted=carbons.sort().join(",");

    let win=false;

    if(current.type==="chain"){
        // cadeia linear
        win = sorted === "1,2,2,1".slice(0,sorted.length);
    }

    if(current.type==="branched"){
        // isobutano: 3,1,1,1
        win = sorted==="1,1,1,3";
    }

    if(win){
        feedback.innerText="✅ Correto!";
    } else {
        feedback.innerText="❌ Tente novamente";
    }
}

/* iniciar */
newGame();
</script>

</body>
</html>
