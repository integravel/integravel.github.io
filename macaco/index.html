<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slide Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:Arial;background:#f5f5f5}#topBar{height:60px;display:flex;justify-content:space-around;align-items:center;background:#222;color:#fff} #grid{ position:relative; width:100vw; height:calc(100vh - 120px); /* topo + bottom */ touch-action:none; overflow:hidden; } #bottomBar{ position:fixed; bottom:0; left:0; width:100%; height:60px; background:#ddd; display:flex; justify-content:center; align-items:center; gap:20px; z-index:10; }

.cell{position:absolute;border:1px solid rgba(0,0,0,0.15)} .wall{background:#333} .player,.goal{position:absolute;border-radius:6px} .player{background:#2ecc71} .goal{background:#e74c3c}

.tool{width:40px;height:40px;border:2px solid #333;border-radius:6px;display:flex;align-items:center;justify-content:center} .selected{outline:3px solid #2ecc71} .dotted{border-style:dashed} .black{background:#333}

#menu{position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;color:#fff;display:none;flex-wrap:wrap;align-content:flex-start;overflow:auto;padding:10px} .levelBtn{width:60px;height:60px;margin:6px;background:#444;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px} </style>

</head>
<body><div id="topBar">
 <span id="levelText"></span>
 <button onclick="openMenu()">Níveis</button>
 <button onclick="restartLevel()">Reiniciar</button>
</div><div id="grid"></div><div id="bottomBar">
 <div id="removeTool" class="tool dotted"></div>
 <div id="addTool" class="tool black"></div>
</div><div id="menu"></div><script>
const gridEl=document.getElementById('grid')
const menu=document.getElementById('menu')
const removeTool=document.getElementById('removeTool')
const addTool=document.getElementById('addTool')

let levels=[],currentLevel=0
let grid,player,goal,originalState
let size=8,cellSize
let tool=null,usedAdd=false,usedRemove=false
let moves=0,minMoves=5
let playerEl

// ===== STORAGE =====
function save(){
 localStorage.setItem('gameData',JSON.stringify({levels,currentLevel}))
}
function load(){
 let d=localStorage.getItem('gameData')
 if(!d) return false
 d=JSON.parse(d)
 levels=d.levels;currentLevel=d.currentLevel
 loadLevel(currentLevel)
 return true
}

removeTool.onclick=()=>selectTool('remove')
addTool.onclick=()=>selectTool('add')

function selectTool(t){
 if(tool===t){tool=null;removeTool.classList.remove('selected');addTool.classList.remove('selected');return}
 tool=t
 removeTool.classList.remove('selected');addTool.classList.remove('selected')
 if(t==='remove') removeTool.classList.add('selected')
 if(t==='add') addTool.classList.add('selected')
}

// ===== LEVEL =====
function newLevel(){
 let valid=false
 let difficulty = 5 + Math.floor(levels.length/3)

 while(!valid){
  grid=[]
  for(let y=0;y<size;y++){let r=[];for(let x=0;x<size;x++) r.push(Math.random()<0.25?1:0);grid.push(r)}
  player=randomEmpty();goal=randomEmpty()
  let m=calcMinMoves()
  if(m>=difficulty){minMoves=m;valid=true}
 }

 levels.push({grid:JSON.parse(JSON.stringify(grid)),player:{...player},goal:{...goal},stars:0})
 currentLevel=levels.length-1
 loadLevel(currentLevel)
 save()
}

function loadLevel(i){
 let l=levels[i]
 grid=JSON.parse(JSON.stringify(l.grid))
 player={...l.player};goal={...l.goal}
 originalState=JSON.stringify({grid,player})
 usedAdd=false;usedRemove=false;moves=0;tool=null
 draw();updateUI()
}

function restartLevel(){
 let s=JSON.parse(originalState)
 grid=s.grid;player=s.player
 usedAdd=false;usedRemove=false;moves=0;tool=null
 draw();updateUI()
}

function updateUI(){
 document.getElementById('levelText').innerText='Nível '+(currentLevel+1)
}

function randomEmpty(){let x,y;do{x=Math.floor(Math.random()*size);y=Math.floor(Math.random()*size)}while(grid[y][x]);return{x,y}}

// ===== DRAW =====
function draw(){
 gridEl.innerHTML=''
 cellSize=Math.floor(gridEl.clientHeight/size) /* força preencher verticalmente */

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   let c=document.createElement('div')
   c.className='cell'
   c.style.width=cellSize+'px';c.style.height=cellSize+'px'
   c.style.left=x*cellSize+'px';c.style.top=y*cellSize+'px'
   if(grid[y][x]) c.classList.add('wall')

   c.onclick=()=>{
    if(!tool) return
    if(tool==='add' && !usedAdd){grid[y][x]=1;usedAdd=true}
    if(tool==='remove' && !usedRemove){grid[y][x]=0;usedRemove=true}
    draw();save()
   }

   gridEl.appendChild(c)
  }
 }

 playerEl=piece('player',player)
 goalEl=piece('goal',goal)
}

function piece(cls,o){
 let el=document.createElement('div')
 el.className=cls
 el.style.width=cellSize+'px'
 el.style.height=cellSize+'px'
 el.style.left=o.x*cellSize+'px'
 el.style.top=o.y*cellSize+'px'
 el.style.transition='left 0.15s linear, top 0.15s linear'
 gridEl.appendChild(el)
 return el
}

// ===== MOVE =====
function slide(p,dir){
 let dx=0,dy=0
 if(dir==='up')dy=-1
 if(dir==='down')dy=1
 if(dir==='left')dx=-1
 if(dir==='right')dx=1

 let x=p.x,y=p.y
 let path=[]

 while(true){
  let nx=x+dx,ny=y+dy
  if(nx<0||ny<0||nx>=size||ny>=size) break
  if(grid[ny][nx]) break
  x=nx;y=ny
  path.push({x,y})
  if(x===goal.x&&y===goal.y) break
 }
 return{pos:{x,y},path}
}

function animate(path,cb){
 let i=0
 function step(){
  if(i>=path.length){cb();return}
  playerEl.style.left=path[i].x*cellSize+'px'
  playerEl.style.top=path[i].y*cellSize+'px'
  i++
  setTimeout(step,80)
 }
 step()
}

function move(dir){
 if(tool) return
 let r=slide(player,dir)
 if(!r.path.length) return
 moves++

 animate(r.path,()=>{
  player=r.pos
  if(player.x===goal.x&&player.y===goal.y){finishLevel()}
  save()
 })
}

function finishLevel(){
 let stars=1
 if(moves===minMoves) stars=2
 if(moves<minMoves) stars=3

 levels[currentLevel].stars=Math.max(levels[currentLevel].stars,stars)

 if(currentLevel===levels.length-1) newLevel()
 else loadLevel(currentLevel)

 save()

 // abre menu automaticamente
 setTimeout(()=>openMenu(),300)
}

// ===== PATHFIND =====
function calcMinMoves(){
 let visited=new Set();let q=[{x:player.x,y:player.y,d:0}]
 while(q.length){let n=q.shift();let k=n.x+','+n.y;if(visited.has(k))continue;visited.add(k)
 if(n.x===goal.x&&n.y===goal.y) return n.d
 for(let d of ['up','down','left','right']){
  let r=slide(n,d)
  q.push({x:r.pos.x,y:r.pos.y,d:n.d+1})
 }
 }
 return 0
}

// ===== MENU =====
function openMenu(){
 menu.style.display='flex'
 menu.innerHTML=''
 levels.forEach((l,i)=>{
  let b=document.createElement('div')
  b.className='levelBtn'
  b.innerHTML=i+1+'<br>'+('⭐'.repeat(l.stars))
  b.onclick=()=>{menu.style.display='none';currentLevel=i;loadLevel(i)}
  menu.appendChild(b)
 })
}

// swipe
let startTouch=null
gridEl.addEventListener('touchstart',e=>startTouch=e.touches[0])
gridEl.addEventListener('touchend',e=>{
 if(!startTouch)return
 let dx=e.changedTouches[0].clientX-startTouch.clientX
 let dy=e.changedTouches[0].clientY-startTouch.clientY
 if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left')
 else move(dy>0?'down':'up')
 startTouch=null
})

if(!load()) newLevel()
</script></body>
</html>
