<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slide Grid Game</title><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#f5f5f5;font-family:Arial}

#topBar{
 height:60px;display:flex;justify-content:space-around;align-items:center;
 background:#222;color:#fff;
}

#grid{
 position:relative;
 width:100vw;
 height:calc(100vh - 60px);
 touch-action:none;
}

.cell{
 position:absolute;
 border:1px solid rgba(0,0,0,0.15);
}
.wall{background:#333}

.player,.goal{
 position:absolute;border-radius:6px;
}
.player{background:#2ecc71}
.goal{background:#ff3b3b}

.line{
 position:absolute;
 background:#888;
 opacity:0.6;
}

.solution{
 background:#2ecc71 !important;
 opacity:1;
}

button{
 padding:6px 10px;border:none;background:#555;color:#fff;border-radius:4px;
}
</style></head>
<body><div id="topBar">
 <span id="level">Nível: 1</span>
 <button onclick="newLevel()">Novo</button>
 <button onclick="startSearch()">Procurar solução</button>
</div><div id="grid"></div><script>
const gridEl=document.getElementById("grid")

let size,grid,player,goal,level
let cellSize,startTouch=null,animating=false

function saveGame(){
 localStorage.setItem("slideGame",JSON.stringify({size,grid,player,goal,level}))
}

function loadGame(){
 let d=localStorage.getItem("slideGame")
 if(!d) return false
 d=JSON.parse(d)
 size=d.size;grid=d.grid;player=d.player;goal=d.goal;level=d.level
 document.getElementById("level").innerText="Nível: "+level
 draw();return true
}

function createGrid(){
 grid=[]
 for(let y=0;y<size;y++){
  let r=[]
  for(let x=0;x<size;x++) r.push(Math.random()<0.2?1:0)
  grid.push(r)
 }
}

function randomEmpty(){
 let x,y
 do{
  x=Math.floor(Math.random()*size)
  y=Math.floor(Math.random()*size)
 }while(grid[y][x]===1)
 return{x,y}
}

function placeEntities(){
 player=randomEmpty()
 goal=randomEmpty()
}

function draw(){
 gridEl.innerHTML=""
 cellSize=Math.floor(Math.min(gridEl.clientWidth,gridEl.clientHeight)/size)

 for(let y=0;y<size;y++){
  for(let x=0;x<size;x++){
   let c=document.createElement("div")
   c.className="cell"
   c.style.width=cellSize+"px"
   c.style.height=cellSize+"px"
   c.style.left=x*cellSize+"px"
   c.style.top=y*cellSize+"px"
   if(grid[y][x]===1) c.classList.add("wall")
   gridEl.appendChild(c)
  }
 }

 playerEl=piece("player",player)
 goalEl=piece("goal",goal)
}

function piece(cls,o){
 let el=document.createElement("div")
 el.className=cls
 el.style.width=cellSize+"px"
 el.style.height=cellSize+"px"
 el.style.left=o.x*cellSize+"px"
 el.style.top=o.y*cellSize+"px"
 gridEl.appendChild(el)
 return el
}

let playerEl,goalEl

function slide(entity,dir){
 let dx=0,dy=0
 if(dir==="up")dy=-1
 if(dir==="down")dy=1
 if(dir==="left")dx=-1
 if(dir==="right")dx=1

 let x=entity.x,y=entity.y
 let path=[]

 while(true){
  let nx=x+dx,ny=y+dy
  if(nx<0||ny<0||nx>=size||ny>=size) break
  if(grid[ny][nx]===1) break
  x=nx;y=ny
  path.push({x,y})
  if(x===goal.x&&y===goal.y) break
 }
 return{pos:{x,y},path}
}

function animateMove(el,path,cb){
 let i=0
 animating=true
 function step(){
  if(i>=path.length){animating=false;cb&&cb();return}
  el.style.left=path[i].x*cellSize+"px"
  el.style.top=path[i].y*cellSize+"px"
  i++;setTimeout(step,60)
 }
 step()
}

function move(dir){
 if(animating) return
 let r=slide(player,dir)
 animateMove(playerEl,r.path,()=>{
  player=r.pos
  if(player.x===goal.x&&player.y===goal.y){level++;newLevel()}
  saveGame()
 })
}

// ===== BUSCA VISUAL =====

function startSearch(){
 let dirs=["up","down","left","right"]
 let visited=new Set()
 let queue=[{x:player.x,y:player.y,path:[]}]
 let lines=[]

 function key(x,y){return x+","+y}
 visited.add(key(player.x,player.y))

 function drawLine(p){
  let el=document.createElement("div")
  el.className="line"
  el.style.width=cellSize+"px"
  el.style.height=cellSize+"px"
  el.style.left=p.x*cellSize+"px"
  el.style.top=p.y*cellSize+"px"
  gridEl.appendChild(el)
  lines.push(el)
 }

 function expand(){
  if(!queue.length){
   alert("Sem solução")
   setTimeout(()=>newLevel(),500)
   return
  }

  let next=[]

  queue.forEach(node=>{
   for(let d of dirs){
    let r=slide(node,d)
    let k=key(r.pos.x,r.pos.y)

    if(!visited.has(k)){
     visited.add(k)

     let fullPath=[...node.path,...r.path]

     r.path.forEach(p=>drawLine(p))

     if(r.pos.x===goal.x&&r.pos.y===goal.y){
      // limpar tudo e desenhar só solução
      gridEl.querySelectorAll(".line").forEach(e=>e.remove())

      fullPath.forEach(p=>{
       let el=document.createElement("div")
       el.className="line solution"
       el.style.width=cellSize+"px"
       el.style.height=cellSize+"px"
       el.style.left=p.x*cellSize+"px"
       el.style.top=p.y*cellSize+"px"
       gridEl.appendChild(el)
      })
      return
     }

     next.push({x:r.pos.x,y:r.pos.y,path:fullPath})
    }
   }
  })

  queue=next
  setTimeout(expand,80)
 }

 expand()
}

function newLevel(){
 size=Math.floor(window.innerWidth/35)
 createGrid();placeEntities()
 document.getElementById("level").innerText="Nível: "+level
 draw();saveGame()
}

// swipe

gridEl.addEventListener("touchstart",e=>startTouch=e.touches[0])

gridEl.addEventListener("touchend",e=>{
 if(!startTouch) return
 let dx=e.changedTouches[0].clientX-startTouch.clientX
 let dy=e.changedTouches[0].clientY-startTouch.clientY
 if(Math.abs(dx)<20&&Math.abs(dy)<20)return
 if(Math.abs(dx)>Math.abs(dy)) move(dx>0?"right":"left")
 else move(dy>0?"down":"up")
 startTouch=null
})

if(!loadGame()){level=1;newLevel()}
</script></body>
</html>
