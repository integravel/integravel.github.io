<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Grid Game</title><style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    display:flex;
    flex-direction:column;
    height:100vh;
    background:#111;
    color:white;
    font-family:sans-serif;
}

#topBar {
    padding:10px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background:#222;
}

#grid {
    flex:1;
    display:grid;
    touch-action:none;
}

.cell {
    border:1px solid #222;
    position:relative;
}

.wall { background:#444; }
.goal { background:#e91e63; }

.player, .clone {
    position:absolute;
    width:100%;
    height:100%;
    transition: transform 0.2s linear;
}

.player { background:#4caf50; }
.clone { background:#00bcd4; }

button {
    padding:10px;
    font-size:16px;
    background:#333;
    color:white;
    border:none;
    border-radius:6px;
}
</style></head><body><div id="topBar">
    <span id="level">Nível: 1</span>
    <button onclick="newLevel(true)">Novo nível</button>
    <button onclick="spawnClones()">Criar clones</button>
    <button onclick="clearClones()">Limpar clones</button>
</div><div id="grid"></div><script>
const gridEl = document.getElementById("grid");

let size, grid, player, goal, clones, level, solutionFound;
let startTouch = null;

function saveGame() {
    localStorage.setItem("slideGame", JSON.stringify({
        size, grid, player, goal, clones, level, solutionFound
    }));
}

function loadGame() {
    let data = localStorage.getItem("slideGame");
    if (!data) return false;

    let d = JSON.parse(data);
    size = d.size;
    grid = d.grid;
    player = d.player;
    goal = d.goal;
    clones = d.clones;
    level = d.level;
    solutionFound = d.solutionFound;

    document.getElementById("level").innerText = "Nível: " + level;
    draw();
    return true;
}

function createGrid() {
    grid = [];
    gridEl.innerHTML = "";
    gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    gridEl.style.gridTemplateRows = `repeat(${size}, 1fr)`;

    for (let y=0;y<size;y++){
        let row = [];
        for (let x=0;x<size;x++){
            let cell = document.createElement("div");
            cell.classList.add("cell");

            if (Math.random() < 0.2) {
                cell.classList.add("wall");
                row.push(1);
            } else row.push(0);

            gridEl.appendChild(cell);
        }
        grid.push(row);
    }
}

function randomEmpty() {
    let x,y;
    do {
        x = Math.floor(Math.random()*size);
        y = Math.floor(Math.random()*size);
    } while (grid[y][x] === 1);
    return {x,y};
}

function placeEntities() {
    player = randomEmpty();
    goal = randomEmpty();
    clones = [];
}

function draw() {
    const cells = gridEl.children;

    for (let i=0;i<cells.length;i++){
        cells[i].innerHTML = "";
        cells[i].className = "cell";
    }

    for (let y=0;y<size;y++){
        for (let x=0;x<size;x++){
            let i = y*size+x;
            if (grid[y][x] === 1) cells[i].classList.add("wall");
        }
    }

    function createPiece(cls, x, y) {
        let el = document.createElement("div");
        el.className = cls;
        el.style.transform = `translate(${x*100}%, ${y*100}%)`;
        gridEl.appendChild(el);
        return el;
    }

    createPiece("player", player.x, player.y);
    createPiece("goal", goal.x, goal.y);

    clones.forEach(c=>{
        createPiece("clone", c.x, c.y);
    });
}

function slide(entity, dir) {
    let dx=0, dy=0;
    if (dir==="up") dy=-1;
    if (dir==="down") dy=1;
    if (dir==="left") dx=-1;
    if (dir==="right") dx=1;

    let x = entity.x;
    let y = entity.y;

    while (true) {
        let nx = x + dx;
        let ny = y + dy;

        if (nx<0||ny<0||nx>=size||ny>=size) break;
        if (grid[ny][nx] === 1) break;

        x = nx;
        y = ny;

        if (x===goal.x && y===goal.y) break;
    }

    return {x,y};
}

function move(dir) {
    if (solutionFound) return;

    player = slide(player, dir);

    if (player.x===goal.x && player.y===goal.y) {
        alert("Você venceu!");
        level++;
        newLevel(false);
    }

    saveGame();
    draw();
}

function cloneStep() {
    if (solutionFound) return;

    clones.forEach(c=>{
        let dirs = ["up","down","left","right"];
        let d = dirs[Math.floor(Math.random()*4)];
        let pos = slide(c, d);
        c.x = pos.x;
        c.y = pos.y;

        if (c.x===goal.x && c.y===goal.y) {
            solutionFound = true;
            alert("Clone encontrou solução!");
            clearClones();
        }
    });

    saveGame();
    draw();
}

setInterval(cloneStep, 300);

function spawnClones() {
    if (solutionFound) return;
    for (let i=0;i<5;i++) clones.push({...player});
    saveGame();
}

function clearClones() {
    clones = [];
    saveGame();
    draw();
}

function newLevel(resetLevel) {
    solutionFound = false;
    if (!resetLevel) level = level;

    size = 10 + Math.min(level,10);
    createGrid();
    placeEntities();

    document.getElementById("level").innerText = "Nível: " + level;

    saveGame();
    draw();
}

// Gestos

gridEl.addEventListener("touchstart", e=>{
    startTouch = e.touches[0];
});

gridEl.addEventListener("touchend", e=>{
    if (!startTouch) return;

    let dx = e.changedTouches[0].clientX - startTouch.clientX;
    let dy = e.changedTouches[0].clientY - startTouch.clientY;

    if (Math.abs(dx) > Math.abs(dy)) {
        move(dx>0 ? "right" : "left");
    } else {
        move(dy>0 ? "down" : "up");
    }

    startTouch = null;
});

// Inicialização
if (!loadGame()) {
    level = 1;
    newLevel(true);
}
</script></body>
</html>
