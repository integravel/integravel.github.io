<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slide Grid Game</title><style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

#topBar {
    height:60px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background:#222;
    color:white;
}

#grid {
    position:relative;
    width:100vw;
    height:calc(100vh - 60px);
    background:#fafafa;
    touch-action:none;
}

.cell {
    position:absolute;
    border:1px solid rgba(0,0,0,0.2);
}

.wall { background:#333; }

.goal, .player, .clone {
    position:absolute;
    border-radius:6px;
}

.player { background:#2ecc71; }
.clone { background:#3498db; }
.goal { background:#ff3b3b; }

button {
    padding:6px 10px;
    border:none;
    background:#555;
    color:white;
    border-radius:4px;
}
</style></head><body><div id="topBar">
    <span id="level">Nível: 1</span>
    <button onclick="newLevel(true)">Novo</button>
    <button onclick="spawnClones()">Clones</button>
    <button onclick="clearClones()">Limpar</button>
</div><div id="grid"></div><script>
const gridEl = document.getElementById("grid");

let size, grid, player, goal, clones, level, solutionFound;
let cellSize;
let startTouch = null;
let animating = false;

function saveGame(){
    localStorage.setItem("slideGame", JSON.stringify({size,grid,player,goal,clones,level,solutionFound}));
}

function loadGame(){
    let data = localStorage.getItem("slideGame");
    if(!data) return false;

    let d = JSON.parse(data);
    size=d.size; grid=d.grid; player=d.player; goal=d.goal;
    clones=d.clones; level=d.level; solutionFound=d.solutionFound;

    document.getElementById("level").innerText="Nível: "+level;
    draw();
    return true;
}

function createGrid(){
    grid=[];
    for(let y=0;y<size;y++){
        let row=[];
        for(let x=0;x<size;x++){
            row.push(Math.random()<0.2?1:0);
        }
        grid.push(row);
    }
}

function randomEmpty(){
    let x,y;
    do{
        x=Math.floor(Math.random()*size);
        y=Math.floor(Math.random()*size);
    }while(grid[y][x]===1);
    return {x,y};
}

function placeEntities(){
    player=randomEmpty();
    goal=randomEmpty();
    clones=[];
}

function draw(){
    gridEl.innerHTML="";

    cellSize = Math.floor(Math.min(gridEl.clientWidth, gridEl.clientHeight) / size);

    for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
            let c=document.createElement("div");
            c.className="cell";
            c.style.width=cellSize+"px";
            c.style.height=cellSize+"px";
            c.style.left=(x*cellSize)+"px";
            c.style.top=(y*cellSize)+"px";

            if(grid[y][x]===1) c.classList.add("wall");

            gridEl.appendChild(c);
        }
    }

    function piece(cls,obj){
        let el=document.createElement("div");
        el.className=cls;
        el.style.width=cellSize+"px";
        el.style.height=cellSize+"px";
        el.style.left=(obj.x*cellSize)+"px";
        el.style.top=(obj.y*cellSize)+"px";
        el.style.transition="left 0.1s linear, top 0.1s linear";
        gridEl.appendChild(el);
        return el;
    }

    playerEl = piece("player",player);
    goalEl = piece("goal",goal);

    cloneEls=[];
    clones.forEach(c=> cloneEls.push(piece("clone",c)));
}

let playerEl, cloneEls=[], goalEl;

function slide(entity, dir){
    let dx=0,dy=0;
    if(dir==="up") dy=-1;
    if(dir==="down") dy=1;
    if(dir==="left") dx=-1;
    if(dir==="right") dx=1;

    let x=entity.x, y=entity.y;
    let path=[];

    while(true){
        let nx=x+dx;
        let ny=y+dy;

        if(nx<0||ny<0||nx>=size||ny>=size) break;
        if(grid[ny][nx]===1) break;

        x=nx; y=ny;
        path.push({x,y});

        if(x===goal.x && y===goal.y) break;
    }

    return {pos:{x,y}, path};
}

function animate(el, path, onEnd, speed=80){
    let i=0;
    animating = true;

    function step(){
        if(i>=path.length){
            animating = false;
            if(onEnd) onEnd();
            return;
        }
        el.style.left=(path[i].x*cellSize)+"px";
        el.style.top=(path[i].y*cellSize)+"px";
        i++;
        setTimeout(step, speed);
    }
    step();
}

function move(dir){
    if(animating) return;

    let res=slide(player,dir);

    animate(playerEl,res.path,()=>{
        player=res.pos;

        if(player.x===goal.x && player.y===goal.y){
            alert("Você venceu!");
            level++; newLevel(false);
        }

        saveGame();
    });
}

function cloneStep(){
    if(solutionFound || animating) return;

    clones.forEach((c,i)=>{
        let dirs=["up","down","left","right"];
        let d=dirs[Math.floor(Math.random()*4)];
        let res=slide(c,d);

        animate(cloneEls[i],res.path,null,60);
        c.x=res.pos.x;
        c.y=res.pos.y;

        if(c.x===goal.x && c.y===goal.y){
            solutionFound=true;
            alert("Existe solução!");
            clearClones();
        }
    });

    saveGame();
}

setInterval(cloneStep,500);

function spawnClones(){
    if(solutionFound) return;
    for(let i=0;i<5;i++) clones.push({...player});
    draw(); saveGame();
}

function clearClones(){
    clones=[];
    solutionFound = false; // libera jogador novamente
    draw(); saveGame();
}

function newLevel(){
    solutionFound=false;

    size=Math.floor(window.innerWidth/35);

    createGrid();
    placeEntities();

    document.getElementById("level").innerText="Nível: "+level;

    draw(); saveGame();
}

// swipe
gridEl.addEventListener("touchstart",e=> startTouch=e.touches[0]);

gridEl.addEventListener("touchend",e=>{
    if(!startTouch) return;

    let dx=e.changedTouches[0].clientX-startTouch.clientX;
    let dy=e.changedTouches[0].clientY-startTouch.clientY;

    if(Math.abs(dx)<20 && Math.abs(dy)<20) return;

    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?"right":"left");
    else move(dy>0?"down":"up");

    startTouch=null;
});

if(!loadGame()){
    level=1;
    newLevel();
}
</script></body>
</html>
