<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slide Grid Game</title><style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

#topBar {
    height:60px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    background:#222;
    color:white;
}

#grid {
    position:relative;
    width:100vw;
    height:calc(100vh - 60px);
    background:#fafafa;
    touch-action:none;
}

.cell {
    position:absolute;
    border:1px solid rgba(0,0,0,0.2);
}

.wall { background:#333; }

.player, .goal {
    position:absolute;
    border-radius:6px;
}

.player { background:#2ecc71; }
.goal { background:#ff3b3b; }

.path {
    position:absolute;
    background:rgba(0,0,0,0.2);
}

button {
    padding:6px 10px;
    border:none;
    background:#555;
    color:white;
    border-radius:4px;
}
</style></head><body><div id="topBar">
    <span id="level">Nível: 1</span>
    <button onclick="newLevel()">Novo</button>
    <button onclick="findSolution()">Procurar solução</button>
</div><div id="grid"></div><script>
const gridEl = document.getElementById("grid");

let size, grid, player, goal, level;
let cellSize;
let startTouch = null;
let animating = false;

function saveGame(){
    localStorage.setItem("slideGame", JSON.stringify({size,grid,player,goal,level}));
}

function loadGame(){
    let data = localStorage.getItem("slideGame");
    if(!data) return false;

    let d = JSON.parse(data);
    size=d.size; grid=d.grid; player=d.player; goal=d.goal; level=d.level;

    document.getElementById("level").innerText="Nível: "+level;
    draw();
    return true;
}

function createGrid(){
    grid=[];
    for(let y=0;y<size;y++){
        let row=[];
        for(let x=0;x<size;x++){
            row.push(Math.random()<0.2?1:0);
        }
        grid.push(row);
    }
}

function randomEmpty(){
    let x,y;
    do{
        x=Math.floor(Math.random()*size);
        y=Math.floor(Math.random()*size);
    }while(grid[y][x]===1);
    return {x,y};
}

function placeEntities(){
    player=randomEmpty();
    goal=randomEmpty();
}

function draw(){
    gridEl.innerHTML="";

    cellSize = Math.floor(Math.min(gridEl.clientWidth, gridEl.clientHeight) / size);

    for(let y=0;y<size;y++){
        for(let x=0;x<size;x++){
            let c=document.createElement("div");
            c.className="cell";
            c.style.width=cellSize+"px";
            c.style.height=cellSize+"px";
            c.style.left=(x*cellSize)+"px";
            c.style.top=(y*cellSize)+"px";

            if(grid[y][x]===1) c.classList.add("wall");

            gridEl.appendChild(c);
        }
    }

    playerEl = createPiece("player",player);
    goalEl = createPiece("goal",goal);
}

function createPiece(cls,obj){
    let el=document.createElement("div");
    el.className=cls;
    el.style.width=cellSize+"px";
    el.style.height=cellSize+"px";
    el.style.left=(obj.x*cellSize)+"px";
    el.style.top=(obj.y*cellSize)+"px";
    el.style.transition="left 0.1s linear, top 0.1s linear";
    gridEl.appendChild(el);
    return el;
}

let playerEl, goalEl;

function slide(entity, dir){
    let dx=0,dy=0;
    if(dir==="up") dy=-1;
    if(dir==="down") dy=1;
    if(dir==="left") dx=-1;
    if(dir==="right") dx=1;

    let x=entity.x, y=entity.y;

    while(true){
        let nx=x+dx;
        let ny=y+dy;

        if(nx<0||ny<0||nx>=size||ny>=size) break;
        if(grid[ny][nx]===1) break;

        x=nx; y=ny;

        if(x===goal.x && y===goal.y) break;
    }

    return {x,y};
}

function move(dir){
    if(animating) return;

    let res=slide(player,dir);
    animating=true;

    playerEl.style.left=(res.x*cellSize)+"px";
    playerEl.style.top=(res.y*cellSize)+"px";

    setTimeout(()=>{
        player=res;
        animating=false;

        if(player.x===goal.x && player.y===goal.y){
            level++; newLevel();
        }

        saveGame();
    },120);
}

function findSolution(){
    let dirs=["up","down","left","right"];
    let visited=new Set();
    let queue=[{x:player.x,y:player.y,path:[]}];

    function key(x,y){ return x+","+y; }

    visited.add(key(player.x,player.y));

    while(queue.length){
        let cur=queue.shift();

        if(cur.x===goal.x && cur.y===goal.y){
            drawPath(cur.path);
            return;
        }

        for(let d of dirs){
            let res=slide(cur,d);
            let k=key(res.x,res.y);

            if(!visited.has(k)){
                visited.add(k);
                queue.push({x:res.x,y:res.y,path:[...cur.path,res]});
            }
        }
    }

    alert("Sem solução!");
    setTimeout(()=> newLevel(),500);
}

function drawPath(path){
    path.forEach(p=>{
        let el=document.createElement("div");
        el.className="path";
        el.style.width=cellSize+"px";
        el.style.height=cellSize+"px";
        el.style.left=(p.x*cellSize)+"px";
        el.style.top=(p.y*cellSize)+"px";
        gridEl.appendChild(el);
    });
}

function newLevel(){
    size=Math.floor(window.innerWidth/35);
    createGrid();
    placeEntities();

    document.getElementById("level").innerText="Nível: "+level;

    draw(); saveGame();
}

// swipe
gridEl.addEventListener("touchstart",e=> startTouch=e.touches[0]);

gridEl.addEventListener("touchend",e=>{
    if(!startTouch) return;

    let dx=e.changedTouches[0].clientX-startTouch.clientX;
    let dy=e.changedTouches[0].clientY-startTouch.clientY;

    if(Math.abs(dx)<20 && Math.abs(dy)<20) return;

    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?"right":"left");
    else move(dy>0?"down":"up");

    startTouch=null;
});

if(!loadGame()){
    level=1;
    newLevel();
}
</script></body>
</html>
