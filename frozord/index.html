<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo das Letras</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

.letter {
  position:absolute;
  font-size:32px;
  font-weight:bold;
}

.frozen {
  color:#dff6ff;
  text-shadow:0 0 10px #aeeaff;
}

#freezeBtn {
  position:absolute;
  top:20px;
  right:20px;
  font-size:24px;
  padding:10px;
  border-radius:50%;
  background:#8fe3ff;
  border:none;
}

/* MENU MELHORADO */
#inputPanel {
  position: fixed;
  bottom: -220px;
  left: 0;
  width: 100%;
  height: 140px;
  background: linear-gradient(to top, #111827, #1f2937);
  padding: 20px;
  box-sizing: border-box;
  transition: bottom 0.4s;
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
}

#inputPanel.active {
  bottom: 0;
}

#answer {
  flex: 1;
  padding: 15px;
  font-size: 24px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-transform: uppercase;
}

button.submit {
  padding: 15px 20px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  background: #8fe3ff;
  cursor: pointer;
}

#message {
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  opacity:0;
  transition:0.5s;
  font-size:22px;
}

#message.show { opacity:1; }
</style>
</head>

<body>

<button id="freezeBtn">❄️</button>
<div id="message"></div>

<div id="inputPanel">
  <input id="answer" placeholder="Digite a palavra...">
  <button class="submit">OK</button>
</div>

<script>

// =========================
// BANCO DE PALAVRAS
// =========================
const WORDS = {
3:["SOL","MAR","LUZ","PAZ","RIO","DIA","ARU","NOI","FLU","RUA"],
4:["CASA","GATO","BOLA","VIDA","FOTO","MESA","LUAR","CAMA","FACA","VENT"],
5:["PEDRA","TEMPO","MUNDO","VERDE","FALAR","COMER","ANDAR","PULAR","NORTE","SULAS"],
6:["AMIGOS","FLORES","LIVROS","NOITES","TEMPOS","CASAIS","SONHOS","PLANOS","CANTOS","DANCAR"],
7:["CAMINHO","AMIGOSO","BRILHAR","SONHAR","ESTUDAR","CANTAR","DORMIR","VIVERES","AMOROSA","FLOREAR"],
8:["FLORESTA","AMIZADES","CAMINHAR","BRILHANTE","SONHADOR","ESTUDIOSO","CANTORIA","DORMINDO","VIVENDO","TRABALHO"],
9:["MARAVILHA","CAMINHADA","BRILHANTE","SONHADORA","ESTUDANTE","CANTADOR","VIVENCIA","TRABALHAR","FELICIDADE","DORMINDOS"],
10:["FELICIDADE","CAMINHANDO","BRILHANTES","SONHADORES","ESTUDANTES","TRABALHOS","LIBERDADE","CRIATIVOS","DIVERTIDOS","IMAGINAR"],
11:["COMPLICADO","DESAFIADOR","INTERESSAR","CAMINHANTES","BRILHANTEAR","SONHADORAS","ESTUDANTADO","TRABALHADOR","LIBERDARES","CRIATIVIDADE"],
12:["MARAVILHOSO","DESENVOLVER","INTERESSANTE","CAMINHANTES","BRILHANTISMO","SONHADORISMO","ESTUDANTISMO","TRABALHADORES","LIBERDADES","CRIATIVIDADE"],
13:["EXTRAORDINARIO","DESENVOLVIMENTO","INTERESSANTISSIMO","CAMINHANTISSIMO","BRILHANTISSIMO","SONHADORISSIMO","ESTUDANTISSIMO","TRABALHADORISSIMO","LIBERDADISSIMO","CRIATIVISSIMO"]
};

// =========================
// ESTADO
// =========================
let level = 3;
let currentWord = "";
let attempts = 0;
let letters = [];
let mouse = {x:innerWidth/2,y:innerHeight/2};
let frozen=false;

const usedWords = JSON.parse(localStorage.getItem("usedWords")||"{}");

// =========================
// ESCOLHER PALAVRA
// =========================
function getWord(size){
  if(!usedWords[size]) usedWords[size]=[];

  let available = WORDS[size].filter(w=>!usedWords[size].includes(w));

  if(available.length===0){
    level++;
    return getWord(level);
  }

  const word = available[Math.floor(Math.random()*available.length)];
  usedWords[size].push(word);
  localStorage.setItem("usedWords",JSON.stringify(usedWords));

  return word;
}

// =========================
// START
// =========================
function startGame(){
  frozen=false;
  attempts=0;

  document.body.style.overflow="hidden";
  document.getElementById("inputPanel").classList.remove("active");

  letters.forEach(l=>l.el.remove());
  letters=[];

  currentWord = getWord(level);

  for(let i=0;i<currentWord.length;i++){
    const el=document.createElement("div");
    el.className="letter";
    el.innerText=currentWord[i];
    document.body.appendChild(el);

    letters.push({
      el,
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight,
      order:i,
      baseSpeed:0.015 + ((currentWord.length-i)*0.005),
      variance:0.02,
      offset:Math.random()*1000,
      floatOffset:Math.random()*1000,
      jitter:Math.random()*0.8
    });
  }
}

// =========================
// UPDATE
// =========================
function update(time=0){
  if(!frozen){
    letters.forEach((l,i)=>{

      let speed = l.baseSpeed +
        Math.sin(time*0.002 + l.offset)*l.variance;

      speed = Math.max(0.005,speed);

      const floatX=Math.sin(time*0.001+l.floatOffset)*20;
      const floatY=Math.cos(time*0.0015+l.floatOffset)*20;

      const jitterX=(Math.random()-0.5)*8*l.jitter;
      const jitterY=(Math.random()-0.5)*8*l.jitter;

      const tx=mouse.x+floatX+jitterX;
      const ty=mouse.y+floatY+jitterY;

      l.x+=(tx-l.x)*speed;
      l.y+=(ty-l.y)*speed;

      letters.forEach((o,j)=>{
        if(i!==j){
          const dx=l.x-o.x;
          const dy=l.y-o.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<45){
            l.x+=dx*0.03;
            l.y+=dy*0.03;
          }
        }
      });

      l.el.style.transform=`translate(${l.x}px,${l.y}px)`;
    });
  }

  requestAnimationFrame(update);
}

// =========================
// RESPOSTA
// =========================
function checkAnswer(){
  const val=document.getElementById("answer").value.toUpperCase();
  attempts++;

  if(val===currentWord){

    if(level===13 && attempts===1){
      document.getElementById("message").innerText="🏆 Você concluiu o jogo!";
      document.getElementById("message").classList.add("show");
      return;
    }

    if(attempts===1) level++;
    else if(attempts===2) level=level;
    else level=Math.max(3,level-1);

    document.getElementById("message").innerText="🎉 Acertou!";
    document.getElementById("message").classList.add("show");

    setTimeout(()=>{
      document.getElementById("message").classList.remove("show");
      startGame();
    },1500);
  }
}

// =========================
// FREEZE
// =========================
document.getElementById("freezeBtn").onclick=()=>{
  frozen=true;

  document.body.style.overflow="auto";
  document.getElementById("inputPanel").classList.add("active");

  const input = document.getElementById("answer");
  input.value = "";
  input.focus();

  letters.forEach(l=>l.el.classList.add("frozen"));
};

// ENTER
document.getElementById("answer").addEventListener("keydown", e=>{
  if(e.key==="Enter") checkAnswer();
});

// CONTROLES
window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

window.addEventListener("touchmove",e=>{
  mouse.x=e.touches[0].clientX;
  mouse.y=e.touches[0].clientY;
});

// iniciar
startGame();
update();

</script>

</body>
</html>
