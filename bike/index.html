<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Way The Bicycle Go?</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    touch-action:none;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    display:block;
    background:#151515;
}

#hud{

    position:fixed;

    top:12px;
    left:12px;

    background:rgba(0,0,0,0.55);

    border:1px solid rgba(255,255,255,0.08);

    padding:10px 14px;

    border-radius:12px;

    color:white;

    font-size:14px;

    line-height:1.6;

    backdrop-filter: blur(5px);

    z-index:10;
}

#result{

    position:fixed;

    bottom:20px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(0,0,0,0.65);

    color:white;

    padding:10px 18px;

    border-radius:12px;

    font-size:15px;

    opacity:0;

    transition:0.25s;

    pointer-events:none;
}

#result.show{
    opacity:1;
}

</style>
</head>
<body>

<div id="hud">

    Rodadas:
    <span id="rounds">0</span>
    <br>

    Acertos de roda:
    <span id="wheelHits">0</span>
    <br>

    Acertos de trajeto:
    <span id="directionHits">0</span>
    <br>

    Acertos completos:
    <span id="perfectHits">0</span>

</div>

<div id="result"></div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){

    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

/* =========================================================
   HUD
========================================================= */

const roundsEl = document.getElementById("rounds");
const wheelHitsEl = document.getElementById("wheelHits");
const directionHitsEl = document.getElementById("directionHits");
const perfectHitsEl = document.getElementById("perfectHits");

const resultEl = document.getElementById("result");

/* =========================================================
   CONFIG
========================================================= */

const BIKE_LENGTH = 52;

const TRACK_COLOR = "#f2f2f2";

const TRACK_WIDTH = 4;

const HIGHLIGHT_COLOR = "#00ffff";

/* =========================================================
   ESTADO
========================================================= */

let currentData = null;

let phase = "chooseTrack";

let selectedTrack = null;

let selectedDirection = null;

let rounds = 0;

let wheelHits = 0;

let directionHits = 0;

let perfectHits = 0;

/* =========================================================
   UTIL
========================================================= */

function random(min,max){

    return Math.random()*(max-min)+min;
}

function clamp(v,min,max){

    return Math.max(min,Math.min(max,v));
}

function lerp(a,b,t){

    return a + (b-a)*t;
}

function catmullRom(p0,p1,p2,p3,t){

    return 0.5 * (
        (2*p1) +
        (-p0+p2)*t +
        (2*p0-5*p1+4*p2-p3)*t*t +
        (-p0+3*p1-3*p2+p3)*t*t*t
    );
}

function updateHUD(){

    roundsEl.textContent = rounds;

    wheelHitsEl.textContent = wheelHits;

    directionHitsEl.textContent = directionHits;

    perfectHitsEl.textContent = perfectHits;
}

/* =========================================================
   TRAJETÓRIA PARAMÉTRICA
========================================================= */

function generateFrontWheelPath(){

    const outside = Math.max(W,H) * 0.18;

    const safeX = W * 0.16;

    const safeY = H * 0.16;

    const side = Math.floor(random(0,4));

    let startX,startY;
    let endX,endY;

    if(side === 0){

        startX = -outside;
        startY = random(safeY,H-safeY);

        endX = W + outside;
        endY = random(safeY,H-safeY);
    }
    else if(side === 1){

        startX = W + outside;
        startY = random(safeY,H-safeY);

        endX = -outside;
        endY = random(safeY,H-safeY);
    }
    else if(side === 2){

        startX = random(safeX,W-safeX);
        startY = -outside;

        endX = random(safeX,W-safeX);
        endY = H + outside;
    }
    else{

        startX = random(safeX,W-safeX);
        startY = H + outside;

        endX = random(safeX,W-safeX);
        endY = -outside;
    }

    const controls = [];

    controls.push({
        x:startX,
        y:startY
    });

    const segments = 7;

    for(let i=1;i<=segments;i++){

        const t = i/(segments+1);

        let x = lerp(startX,endX,t);

        let y = lerp(startY,endY,t);

        const poly = (t-0.5)*(t-0.5);

        x +=
            Math.sin(t*Math.PI*2 + random(-1,1))
            * W * 0.12
            * (1-poly);

        y +=
            Math.cos(t*Math.PI*2 + random(-1,1))
            * H * 0.12
            * (1-poly);

        x +=
            (t-0.5)*(t-0.5)*(t-0.5)
            * W * 0.08;

        x = clamp(x,safeX,W-safeX);

        y = clamp(y,safeY,H-safeY);

        controls.push({x,y});
    }

    controls.push({
        x:endX,
        y:endY
    });

    const path = [];

    for(let i=0;i<controls.length-1;i++){

        const p0 = controls[Math.max(0,i-1)];

        const p1 = controls[i];

        const p2 = controls[i+1];

        const p3 = controls[
            Math.min(controls.length-1,i+2)
        ];

        for(let t=0;t<1;t+=0.012){

            const x = catmullRom(
                p0.x,p1.x,p2.x,p3.x,t
            );

            const y = catmullRom(
                p0.y,p1.y,p2.y,p3.y,t
            );

            path.push({x,y});
        }
    }

    return path;
}

/* =========================================================
   RODA TRASEIRA
========================================================= */

function generateBikeTracks(frontPath){

    const rear = [];

    rear.push({

        x: frontPath[0].x - BIKE_LENGTH,

        y: frontPath[0].y
    });

    for(let i=1;i<frontPath.length;i++){

        const front = frontPath[i];

        const prevRear = rear[i-1];

        const dx = front.x - prevRear.x;

        const dy = front.y - prevRear.y;

        const dist = Math.hypot(dx,dy);

        const nx = dx / dist;

        const ny = dy / dist;

        rear.push({

            x: front.x - nx*BIKE_LENGTH,

            y: front.y - ny*BIKE_LENGTH
        });
    }

    return {

        front: frontPath,

        rear
    };
}

/* =========================================================
   DESENHO
========================================================= */

function drawPath(points,color,width){

    ctx.beginPath();

    for(let i=0;i<points.length;i++){

        const p = points[i];

        if(i===0){

            ctx.moveTo(p.x,p.y);
        }
        else{

            ctx.lineTo(p.x,p.y);
        }
    }

    ctx.strokeStyle = color;

    ctx.lineWidth = width;

    ctx.lineCap = "round";

    ctx.lineJoin = "round";

    ctx.stroke();
}

function redraw(){

    ctx.clearRect(0,0,W,H);

    drawPath(
        currentData.trackA,
        TRACK_COLOR,
        TRACK_WIDTH
    );

    drawPath(
        currentData.trackB,
        TRACK_COLOR,
        TRACK_WIDTH
    );

    if(selectedTrack){

        const path =
            selectedTrack === "A"
            ? currentData.trackA
            : currentData.trackB;

        drawPath(
            path,
            HIGHLIGHT_COLOR,
            10
        );

        drawPath(
            path,
            TRACK_COLOR,
            TRACK_WIDTH
        );
    }
}

/* =========================================================
   NOVA RODADA
========================================================= */

function nextRound(){

    selectedTrack = null;

    selectedDirection = null;

    phase = "chooseTrack";

    let frontPath = generateFrontWheelPath();

    const direction =
        Math.random() < 0.5
        ? "forward"
        : "backward";

    if(direction === "backward"){

        frontPath.reverse();
    }

    const bike = generateBikeTracks(frontPath);

    const swap = Math.random() < 0.5;

    currentData = {

        direction,

        /*
            Track A e B são embaralhadas
        */

        trackA:
            swap
            ? bike.front
            : bike.rear,

        trackB:
            swap
            ? bike.rear
            : bike.front,

        correctTrack:
            swap
            ? "A"
            : "B"
    };

    redraw();
}

/* =========================================================
   DETECÇÃO
========================================================= */

function nearestTrack(mx,my){

    const tracks = [

        {
            name:"A",
            points:currentData.trackA
        },

        {
            name:"B",
            points:currentData.trackB
        }
    ];

    let best = null;

    let bestDist = Infinity;

    for(const track of tracks){

        for(const p of track.points){

            const d = Math.hypot(
                mx-p.x,
                my-p.y
            );

            if(d < bestDist){

                bestDist = d;

                best = track.name;
            }
        }
    }

    if(bestDist < 24){

        return best;
    }

    return null;
}

/* =========================================================
   INPUT
========================================================= */

canvas.addEventListener("click",(e)=>{

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;

    const my = e.clientY - rect.top;

    /*
        ESCOLHA DA RODA
    */

    if(phase === "chooseTrack"){

        const track = nearestTrack(mx,my);

        if(track){

            selectedTrack = track;

            redraw();

            phase = "chooseDirection";
        }
    }

    /*
        ESCOLHA DA DIREÇÃO
        Critério:
        clicar no lado de onde a bicicleta VEIO
    */

    else if(phase === "chooseDirection"){

        selectedDirection =
            mx < W/2
            ? "left"
            : "right";

        evaluate();
    }
});

/* =========================================================
   RESULTADO
========================================================= */

function evaluate(){

    rounds++;

    const firstPoint =
        currentData.trackA[0];

    let cameFrom;

    /*
        Detecta origem do trajeto
    */

    if(firstPoint.x < 0){

        cameFrom = "left";
    }
    else if(firstPoint.x > W){

        cameFrom = "right";
    }
    else if(firstPoint.y < 0){

        cameFrom = "top";
    }
    else{

        cameFrom = "bottom";
    }

    /*
        Para celular:
        esquerda da tela = veio da esquerda/topo
        direita da tela = veio da direita/baixo
    */

    const correctDirection =
        (
            selectedDirection === "left" &&
            (
                cameFrom === "left" ||
                cameFrom === "top"
            )
        )
        ||
        (
            selectedDirection === "right" &&
            (
                cameFrom === "right" ||
                cameFrom === "bottom"
            )
        );

    const correctWheel =
        selectedTrack === currentData.correctTrack;

    if(correctWheel){

        wheelHits++;
    }

    if(correctDirection){

        directionHits++;
    }

    if(correctWheel && correctDirection){

        perfectHits++;

        showResult("✅ Acertou ambos");
    }
    else if(correctWheel){

        showResult("✅ Roda certa");
    }
    else if(correctDirection){

        showResult("✅ Direção certa");
    }
    else{

        showResult("❌ Errou");
    }

    updateHUD();

    setTimeout(nextRound,850);
}

/* =========================================================
   FEEDBACK
========================================================= */

function showResult(text){

    resultEl.textContent = text;

    resultEl.classList.add("show");

    setTimeout(()=>{

        resultEl.classList.remove("show");

    },600);
}

/* =========================================================
   START
========================================================= */

updateHUD();

nextRound();

</script>

</body>
</html>
