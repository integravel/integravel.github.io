<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Way The Bicycle Go?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#101010;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    display:block;
    background:#161616;
}

#ui{
    position:fixed;
    top:15px;
    left:15px;
    z-index:10;

    width:280px;

    background:rgba(0,0,0,0.65);
    border:1px solid #444;
    border-radius:14px;

    padding:14px;
    backdrop-filter: blur(6px);
}

#ui h1{
    font-size:20px;
    margin-bottom:10px;
}

#stats{
    line-height:1.7;
    font-size:14px;
    margin-bottom:12px;
}

#message{
    margin-top:10px;
    min-height:60px;
    line-height:1.4;
    font-size:14px;
}

button{
    width:100%;
    margin-top:12px;
    padding:11px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#444;
}

.legend{
    margin-top:10px;
    font-size:13px;
    opacity:0.85;
}

.dot{
    width:11px;
    height:11px;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
}

</style>
</head>

<body>

<div id="ui">

    <h1>Which Way The Bicycle Go?</h1>

    <div id="stats">
        Trajetos: <span id="rounds">0</span><br>
        Acertos: <span id="hits">0</span><br>
        Erros: <span id="misses">0</span><br>
        Precisão: <span id="accuracy">0%</span>
    </div>

    <div class="legend">
        <span class="dot" style="background:red"></span>Uma roda<br>
        <span class="dot" style="background:#2aa8ff"></span>Outra roda
    </div>

    <div id="message"></div>

    <button id="nextBtn" style="display:none;">
        Próximo trajeto
    </button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const roundsEl = document.getElementById("rounds");
const hitsEl = document.getElementById("hits");
const missesEl = document.getElementById("misses");
const accuracyEl = document.getElementById("accuracy");
const messageEl = document.getElementById("message");
const nextBtn = document.getElementById("nextBtn");

let rounds = 0;
let hits = 0;
let misses = 0;

let state = "guessFront";

let currentTracks = null;
let frontTrackIndex = 0;
let realDirection = "forward";

let selectedTrack = null;
let selectedDirection = null;

const wheelDistance = 40;

function updateStats(){

    roundsEl.textContent = rounds;
    hitsEl.textContent = hits;
    missesEl.textContent = misses;

    const acc = rounds === 0
        ? 0
        : Math.round((hits / rounds) * 100);

    accuracyEl.textContent = acc + "%";
}

function rand(min,max){
    return Math.random() * (max-min) + min;
}

function lerp(a,b,t){
    return a + (b-a)*t;
}

function distance(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

/* ======================================================
   GERA CAMINHO SUAVE E NATURAL
====================================================== */

function generateSmoothPath(){

    const points = [];

    let x = rand(W*0.25, W*0.75);
    let y = rand(H*0.25, H*0.75);

    let angle = rand(0,Math.PI*2);

    points.push({x,y});

    for(let i=0;i<8;i++){

        angle += rand(-1.1,1.1);

        const length = rand(180,320);

        x += Math.cos(angle)*length;
        y += Math.sin(angle)*length;

        x = Math.max(120,Math.min(W-120,x));
        y = Math.max(120,Math.min(H-120,y));

        points.push({x,y});
    }

    return smoothCurve(points,18);
}

/* ======================================================
   SUAVIZA CURVA
====================================================== */

function smoothCurve(points,subdivisions){

    const result = [];

    for(let i=0;i<points.length-1;i++){

        const p0 = points[Math.max(i-1,0)];
        const p1 = points[i];
        const p2 = points[i+1];
        const p3 = points[Math.min(i+2,points.length-1)];

        for(let t=0;t<subdivisions;t++){

            const s = t/subdivisions;

            const x = catmullRom(
                p0.x,p1.x,p2.x,p3.x,s
            );

            const y = catmullRom(
                p0.y,p1.y,p2.y,p3.y,s
            );

            result.push({x,y});
        }
    }

    return result;
}

function catmullRom(p0,p1,p2,p3,t){

    return 0.5 * (
        (2*p1) +
        (-p0+p2)*t +
        (2*p0-5*p1+4*p2-p3)*t*t +
        (-p0+3*p1-3*p2+p3)*t*t*t
    );
}

/* ======================================================
   CRIA RASTROS DAS RODAS
====================================================== */

function createBikeTracks(centerPath){

    const left = [];
    const right = [];

    for(let i=0;i<centerPath.length-1;i++){

        const p1 = centerPath[i];
        const p2 = centerPath[i+1];

        const dx = p2.x-p1.x;
        const dy = p2.y-p1.y;

        const len = Math.hypot(dx,dy);

        const nx = -dy/len;
        const ny = dx/len;

        left.push({
            x:p1.x + nx*wheelDistance/2,
            y:p1.y + ny*wheelDistance/2
        });

        right.push({
            x:p1.x - nx*wheelDistance/2,
            y:p1.y - ny*wheelDistance/2
        });
    }

    return {left,right};
}

/* ======================================================
   DESENHA LINHA
====================================================== */

function drawPath(points,color,width=5){

    ctx.beginPath();

    for(let i=0;i<points.length;i++){

        const p = points[i];

        if(i===0){
            ctx.moveTo(p.x,p.y);
        }else{
            ctx.lineTo(p.x,p.y);
        }
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
}

/* ======================================================
   NOVA RODADA
====================================================== */

function newRound(){

    ctx.clearRect(0,0,W,H);

    selectedTrack = null;
    selectedDirection = null;

    state = "guessTrack";

    const centerPath = generateSmoothPath();

    currentTracks = createBikeTracks(centerPath);

    frontTrackIndex = Math.random()<0.5 ? 0 : 1;

    realDirection = Math.random()<0.5
        ? "forward"
        : "backward";

    const frontTrack =
        frontTrackIndex===0
        ? currentTracks.left
        : currentTracks.right;

    const backTrack =
        frontTrackIndex===0
        ? currentTracks.right
        : currentTracks.left;

    drawPath(frontTrack,"red");
    drawPath(backTrack,"#2aa8ff");

    messageEl.innerHTML =
        "1) Clique na trilha que você acha que pertence à roda da frente.";

    nextBtn.style.display = "none";
}

/* ======================================================
   DETECTA CLIQUE NA TRILHA
====================================================== */

function nearestTrack(mx,my){

    const arr = [
        currentTracks.left,
        currentTracks.right
    ];

    let bestTrack = null;
    let bestDist = Infinity;

    for(let t=0;t<2;t++){

        for(const p of arr[t]){

            const d = Math.hypot(mx-p.x,my-p.y);

            if(d<bestDist){

                bestDist = d;
                bestTrack = t;
            }
        }
    }

    if(bestDist < 22){
        return bestTrack;
    }

    return null;
}

/* ======================================================
   DESTACA ESCOLHA
====================================================== */

function redrawSelected(){

    ctx.clearRect(0,0,W,H);

    drawPath(currentTracks.left,"red");
    drawPath(currentTracks.right,"#2aa8ff");

    const chosen =
        selectedTrack===0
        ? currentTracks.left
        : currentTracks.right;

    drawPath(chosen,"white",10);

    drawPath(
        chosen,
        selectedTrack===0 ? "red" : "#2aa8ff",
        5
    );
}

/* ======================================================
   AVALIA
====================================================== */

function evaluate(){

    rounds++;

    const correctTrack =
        selectedTrack === frontTrackIndex;

    const correctDirection =
        selectedDirection === realDirection;

    const success =
        correctTrack && correctDirection;

    if(success){

        hits++;

        messageEl.innerHTML =
            "✅ Acertou a roda da frente e a direção!";
    }
    else{

        misses++;

        const realFront =
            frontTrackIndex===0
            ? "VERMELHA"
            : "AZUL";

        const realDir =
            realDirection==="forward"
            ? "início → fim"
            : "fim → início";

        messageEl.innerHTML =
            "❌ Você errou.<br><br>" +
            "Roda da frente: <b>"+realFront+"</b><br>" +
            "Direção: <b>"+realDir+"</b>";
    }

    updateStats();

    nextBtn.style.display = "block";

    state = "result";
}

/* ======================================================
   INPUT
====================================================== */

canvas.addEventListener("click",(e)=>{

    if(state==="result") return;

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(state==="guessTrack"){

        const track = nearestTrack(mx,my);

        if(track!==null){

            selectedTrack = track;

            redrawSelected();

            state = "guessDirection";

            messageEl.innerHTML =
                "2) Agora escolha a direção.<br><br>" +
                "Clique na metade ESQUERDA da tela para:<br>" +
                "<b>fim → início</b><br><br>" +
                "Clique na metade DIREITA para:<br>" +
                "<b>início → fim</b>";
        }
    }
    else if(state==="guessDirection"){

        selectedDirection =
            mx < W/2
            ? "backward"
            : "forward";

        evaluate();
    }

});

nextBtn.addEventListener("click",newRound);

updateStats();
newRound();

</script>
</body>
</html>
