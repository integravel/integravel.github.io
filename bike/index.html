<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Way The Bicycle Go?</title>

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:#111;
    width:100%;
    height:100%;
    touch-action:none;
}

canvas{
    display:block;
    background:#151515;
}

</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){

    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

/* =========================================================
   CONFIGURAÇÃO DA BICICLETA
========================================================= */

const BIKE_LENGTH = 46;
const TRACK_COLOR = "#f5f5f5";
const TRACK_WIDTH = 4;

/* =========================================================
   ESTADO
========================================================= */

let rounds = 0;
let hits = 0;

let currentData = null;

let phase = "chooseTrack";

let selectedTrack = null;
let selectedDirection = null;

/* =========================================================
   GERA TRAJETÓRIA PARAMÉTRICA DA RODA DIANTEIRA
========================================================= */

function generateFrontWheelPath(){

    const points = [];

    const cx = W * 0.5;
    const cy = H * 0.5;

    const ax = random(140,260);
    const ay = random(140,260);

    const bx = random(20,90);
    const by = random(20,90);

    const phase1 = random(0,Math.PI*2);
    const phase2 = random(0,Math.PI*2);

    for(let t=0; t<Math.PI*2; t+=0.015){

        /*
            Trajetória polinomial + trigonométrica
        */

        const poly = 0.015 * Math.pow(t-3,3);

        const x =
            cx +
            ax*Math.cos(t + phase1) +
            bx*Math.sin(3*t) +
            poly*120;

        const y =
            cy +
            ay*Math.sin(t + phase2) +
            by*Math.cos(2*t);

        points.push({x,y});
    }

    return smooth(points,2);
}

/* =========================================================
   RODA TRASEIRA SEGUE A FRENTE
========================================================= */

function generateBikeTracks(frontPath){

    const rearPath = [];

    rearPath.push({
        x: frontPath[0].x - BIKE_LENGTH,
        y: frontPath[0].y
    });

    for(let i=1;i<frontPath.length;i++){

        const front = frontPath[i];

        const prevRear = rearPath[i-1];

        const dx = front.x - prevRear.x;
        const dy = front.y - prevRear.y;

        const dist = Math.hypot(dx,dy);

        const nx = dx / dist;
        const ny = dy / dist;

        /*
            Mantém distância fixa do quadro
        */

        const rear = {
            x: front.x - nx * BIKE_LENGTH,
            y: front.y - ny * BIKE_LENGTH
        };

        rearPath.push(rear);
    }

    return {
        front: frontPath,
        rear: rearPath
    };
}

/* =========================================================
   SUAVIZAÇÃO
========================================================= */

function smooth(points,passes){

    let pts = points;

    for(let p=0;p<passes;p++){

        const out = [];

        for(let i=0;i<pts.length-1;i++){

            const a = pts[i];
            const b = pts[i+1];

            out.push(a);

            out.push({
                x:(a.x+b.x)/2,
                y:(a.y+b.y)/2
            });
        }

        out.push(pts[pts.length-1]);

        pts = out;
    }

    return pts;
}

/* =========================================================
   DESENHO
========================================================= */

function drawTrack(points){

    ctx.beginPath();

    for(let i=0;i<points.length;i++){

        const p = points[i];

        if(i===0){
            ctx.moveTo(p.x,p.y);
        }
        else{
            ctx.lineTo(p.x,p.y);
        }
    }

    ctx.strokeStyle = TRACK_COLOR;
    ctx.lineWidth = TRACK_WIDTH;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
}

function redraw(){

    ctx.clearRect(0,0,W,H);

    drawTrack(currentData.front);
    drawTrack(currentData.rear);

    if(selectedTrack !== null){

        const path =
            selectedTrack === "front"
            ? currentData.front
            : currentData.rear;

        ctx.beginPath();

        for(let i=0;i<path.length;i++){

            const p = path[i];

            if(i===0){
                ctx.moveTo(p.x,p.y);
            }else{
                ctx.lineTo(p.x,p.y);
            }
        }

        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 10;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        drawTrack(path);
    }
}

/* =========================================================
   NOVA RODADA
========================================================= */

function nextRound(){

    phase = "chooseTrack";

    selectedTrack = null;
    selectedDirection = null;

    const direction =
        Math.random() < 0.5
        ? "forward"
        : "backward";

    let front = generateFrontWheelPath();

    if(direction === "backward"){
        front.reverse();
    }

    const bike = generateBikeTracks(front);

    const frontIsFirst =
        Math.random() < 0.5;

    currentData = {

        direction,

        /*
            Embaralha qual trilha pertence à frente
        */

        front:
            frontIsFirst
            ? bike.front
            : bike.rear,

        rear:
            frontIsFirst
            ? bike.rear
            : bike.front,

        frontTrack:
            frontIsFirst
            ? "front"
            : "rear"
    };

    redraw();
}

/* =========================================================
   DETECÇÃO
========================================================= */

function nearestTrack(mx,my){

    const tracks = [
        {
            name:"front",
            points:currentData.front
        },
        {
            name:"rear",
            points:currentData.rear
        }
    ];

    let best = null;
    let bestDist = Infinity;

    for(const track of tracks){

        for(const p of track.points){

            const d = Math.hypot(
                mx-p.x,
                my-p.y
            );

            if(d < bestDist){

                bestDist = d;
                best = track.name;
            }
        }
    }

    if(bestDist < 20){
        return best;
    }

    return null;
}

/* =========================================================
   CLIQUES
========================================================= */

canvas.addEventListener("click",(e)=>{

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(phase === "chooseTrack"){

        const track = nearestTrack(mx,my);

        if(track){

            selectedTrack = track;

            redraw();

            phase = "chooseDirection";
        }
    }
    else if(phase === "chooseDirection"){

        selectedDirection =
            mx < W/2
            ? "backward"
            : "forward";

        evaluate();
    }
});

/* =========================================================
   RESULTADO
========================================================= */

function evaluate(){

    rounds++;

    const correctTrack =
        selectedTrack === currentData.frontTrack;

    const correctDirection =
        selectedDirection === currentData.direction;

    if(correctTrack && correctDirection){
        hits++;
    }

    setTimeout(nextRound,700);
}

/* =========================================================
   UTIL
========================================================= */

function random(min,max){
    return Math.random()*(max-min)+min;
}

/* =========================================================
   START
========================================================= */

nextRound();

</script>

</body>
</html>
