<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditado Musical</title>

<style>
body{
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button,input{
  font-size:16px;
  margin:5px;
}
</style>
</head>

<body>

<div id="ui">
BPM <input type="number" id="bpm" value="80">
<button onclick="startGame()">Iniciar</button>
<p>Pontos: <span id="score">0</span></p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== CONFIG =====
const notes = [
"C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5"
];

const freq = {
"C4":261,"D4":294,"E4":329,"F4":349,"G4":392,
"A4":440,"B4":494,"C5":523,"D5":587,"E5":659,"F5":698
};

let sequence = [];
let playerNotes = [];
let correctNotes = [];

let playing = false;
let score = 0;
let showCorrection = false;

// linha vertical
let cursorX = 150;
let cursorSpeed = 0;
let noteIndexPlaying = 0;

// ===== ÁUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playNote(f){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = f;
  osc.type = "triangle";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
  osc.stop(audioCtx.currentTime+0.5);
}

// ===== POSIÇÕES =====
function getYFromNote(n){
  let mid = H/2;
  let step = 35/2;
  return mid - (n-5)*step;
}

function getNoteFromY(y){
  let mid = H/2;
  let step = 35/2;

  let raw = (mid - y)/step + 5;
  let index = Math.round(raw);

  return Math.max(0, Math.min(10, index));
}

// ===== SEQUÊNCIA =====
function newSequence(){
  sequence = [];
  for(let i=0;i<5;i++){
    sequence.push(Math.floor(Math.random()*notes.length));
  }

  correctNotes = sequence.map((n,i)=>({
    x:150 + i*120,
    y:getYFromNote(n),
    note:n,
    played:false
  }));
}

// ===== TOCAR COM CURSOR =====
function startPlayback(){

  let bpm = document.getElementById("bpm").value;
  let tempo = 60000/bpm;

  cursorX = 150;
  cursorSpeed = 120 / (tempo/16); // controla velocidade

  noteIndexPlaying = 0;
  playing = true;

  correctNotes.forEach(n=>n.played=false);
}

// ===== LOOP =====
function update(){

  if(playing){

    cursorX += cursorSpeed;

    // tocar notas quando cruzar
    correctNotes.forEach((n,i)=>{
      if(!n.played && cursorX >= n.x){
        playNote(freq[notes[n.note]]);
        n.played = true;
      }
    });

    // fim
    if(cursorX > 150 + 5*120){
      playing = false;
    }
  }
}

// ===== INPUT =====
canvas.addEventListener("touchstart",e=>{
  if(playing) return;
  if(playerNotes.length >= 5) return;
  if(showCorrection) return;

  let t = e.touches[0];

  let x = t.clientX;
  let y = t.clientY;

  let noteIndex = getNoteFromY(y);

  playerNotes.push({
    x:x,
    y:getYFromNote(noteIndex),
    note:noteIndex
  });

  playNote(freq[notes[noteIndex]]);

  if(playerNotes.length === 5){
    evaluate();
  }
});

// ===== AVALIAÇÃO =====
function evaluate(){

  let total = 0;

  for(let i=0;i<5;i++){
    let dx = playerNotes[i].x - correctNotes[i].x;
    let dy = playerNotes[i].y - correctNotes[i].y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let points = Math.max(0, 100 - dist * 2);
    total += points;
  }

  score += Math.round(total);
  document.getElementById("score").innerText = score;

  showCorrection = true;

  setTimeout(()=>{
    showCorrection = false;
    playerNotes = [];

    newSequence();
    startPlayback();
  },2000);
}

// ===== DESENHO =====
function drawStaff(){

  let mid = H/2;
  let space = 35;

  ctx.lineWidth=2;

  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(50, mid + i*space);
    ctx.lineTo(W-50, mid + i*space);
    ctx.stroke();
  }

  ctx.font="90px serif";
  ctx.fillText("𝄞", 60, mid+30);
}

function drawNotes(){

  // jogador
  playerNotes.forEach(n=>{
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.ellipse(n.x,n.y,14,10,0,0,Math.PI*2);
    ctx.fill();
  });

  // correção
  if(showCorrection){
    correctNotes.forEach(n=>{
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.ellipse(n.x,n.y,14,10,0,0,Math.PI*2);
      ctx.fill();
    });
  }
}

function drawCursor(){
  if(playing){
    ctx.strokeStyle="green";
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(cursorX, 0);
    ctx.lineTo(cursorX, H);
    ctx.stroke();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  drawStaff();
  drawNotes();
  drawCursor();
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== START =====
function startGame(){
  score=0;
  document.getElementById("score").innerText = score;

  playerNotes=[];
  showCorrection=false;

  newSequence();
  startPlayback();
}
</script>

</body>
</html>
