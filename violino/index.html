<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partitura Real - Violino</title>

<style>
body {
  margin: 0;
  background: #fafafa;
  font-family: serif;
  overflow: hidden;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button, input {
  font-size: 16px;
  margin: 5px;
}

#menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  border: 1px solid #ccc;
  padding: 20px;
  display: none;
  flex-direction: column;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<div id="ui">
  BPM: <input type="number" id="bpm" value="90">
  <button onclick="start()">Iniciar</button>
  <button onclick="stop()">Parar</button>
</div>

<canvas id="canvas"></canvas>

<div id="menu">
  <button onclick="restart()">Reiniciar</button>
  <button onclick="playComposition()">Ouvir</button>
  <button onclick="savePDF()">Salvar PDF</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Configuração musical
const notesMap = [
  "E4","F4","G4","A4","B4",
  "C5","D5","E5","F5","G5",
  "A5","B5","C6"
];

const freqMap = {
  "E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
  "C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
  "A5":880,"B5":988,"C6":1046
};

let lineSpacing, staffTop;

// Estado
let notes = [];
let running = false;
let startTime;
let speed;
let beatWidth = 80;
let beatsPerMeasure = 4;

// Toque
let touchStartTime = 0;
let currentNote = null;

// Áudio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function play(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.type = "sine";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.stop(audioCtx.currentTime + duration);
}

// Converter posição em nota musical real
function getNote(y){
  let index = Math.round((y - staffTop) / (lineSpacing/2));
  index = Math.max(0, Math.min(notesMap.length-1, index));
  return notesMap[index];
}

function getY(note){
  let index = notesMap.indexOf(note);
  return staffTop + index*(lineSpacing/2);
}

// Determinar duração musical
function getDuration(ms){
  if(ms < 150) return "colcheia";
  if(ms < 350) return "seminima";
  if(ms < 700) return "minima";
  return "semibreve";
}

// Desenho
function drawStaff(){
  lineSpacing = height/12;
  staffTop = height/2 - (2*lineSpacing);

  ctx.strokeStyle = "black";
  for(let i=0;i<5;i++){
    let y = staffTop + i*lineSpacing;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(width,y);
    ctx.stroke();
  }

  // clave de sol
  ctx.font = `${lineSpacing*4}px serif`;
  ctx.fillText("𝄞", 20, staffTop + lineSpacing*3);

  // barras de compasso
  ctx.strokeStyle = "#999";
  for(let i=0;i<width;i+=beatWidth*beatsPerMeasure){
    ctx.beginPath();
    ctx.moveTo(i, staffTop);
    ctx.lineTo(i, staffTop + 4*lineSpacing);
    ctx.stroke();
  }
}

function drawNote(n){
  let y = getY(n.note);

  ctx.fillStyle = "black";

  // semibreve
  if(n.type === "semibreve"){
    ctx.beginPath();
    ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // mínima
  else if(n.type === "minima"){
    ctx.beginPath();
    ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(n.x+10, y);
    ctx.lineTo(n.x+10, y-35);
    ctx.stroke();
  }

  // semínima
  else if(n.type === "seminima"){
    ctx.beginPath();
    ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(n.x+10, y);
    ctx.lineTo(n.x+10, y-35);
    ctx.stroke();
  }

  // colcheia
  else{
    ctx.beginPath();
    ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(n.x+10, y);
    ctx.lineTo(n.x+10, y-35);
    ctx.stroke();

    // bandeirinha
    ctx.beginPath();
    ctx.moveTo(n.x+10, y-35);
    ctx.quadraticCurveTo(n.x+25, y-25, n.x+10, y-15);
    ctx.stroke();
  }

  // linhas suplementares
  if(y < staffTop || y > staffTop + 4*lineSpacing){
    ctx.beginPath();
    ctx.moveTo(n.x-12, y);
    ctx.lineTo(n.x+12, y);
    ctx.stroke();
  }
}

// Loop
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,width,height);

  drawStaff();

  notes.forEach(n=>{
    n.x -= speed;
    drawNote(n);
  });

  requestAnimationFrame(loop);
}

// Controle
function start(){
  notes = [];
  running = true;
  startTime = performance.now();
  speed = parseInt(bpm.value)/60 * 2;
  loop();
}

function stop(){
  running = false;
  menu.style.display = "flex";
}

function restart(){
  notes = [];
  menu.style.display = "none";
}

// Reprodução
function playComposition(){
  let t = audioCtx.currentTime;

  notes.forEach(n=>{
    let dur = {
      colcheia:0.2,
      seminima:0.4,
      minima:0.8,
      semibreve:1.6
    }[n.type];

    play(freqMap[n.note], dur);
    t += dur;
  });
}

// PDF
function savePDF(){
  window.print();
}

// Toque
canvas.addEventListener("touchstart", e=>{
  if(!running) return;

  let y = e.touches[0].clientY;
  touchStartTime = performance.now();

  let note = getNote(y);

  currentNote = {
    x: width-60,
    note: note,
    type: "seminima"
  };

  notes.push(currentNote);
});

canvas.addEventListener("touchend", e=>{
  if(!currentNote) return;

  let dur = performance.now() - touchStartTime;
  currentNote.type = getDuration(dur);

  play(freqMap[currentNote.note], dur/1000);

  currentNote = null;
});

// orientação
function checkOrientation(){
  if(window.innerHeight > window.innerWidth){
    alert("Use na horizontal");
  }
}
checkOrientation();
window.addEventListener("resize", checkOrientation);

</script>

</body>
</html>
