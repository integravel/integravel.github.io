<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Musical - Violino</title>

<style>
body {
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button,input{
  font-size:16px;
  margin:5px;
}
</style>
</head>

<body>

<div id="ui">
BPM <input type="number" id="bpm" value="90">
<button onclick="start()">Iniciar</button>
<button onclick="playAll()">Ouvir</button>
<button onclick="savePDF()">Salvar PDF</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== CONFIG =====
const COLS = 8;
const ROWS = 12;
let grid = [];
let cellW, cellH;

// ===== NOTAS =====
const notesMap = [
"E4","F4","G4","A4","B4",
"C5","D5","E5","F5","G5",
"A5","B5"
];

const freqMap = {
"E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
"C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
"A5":880,"B5":988
};

// ===== ÁUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function play(freq){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.5);
  osc.stop(audioCtx.currentTime+0.5);
}

// ===== PEÇAS =====
const shapes = [
  [[0,0],[1,0],[2,0],[3,0],[4,0]], // linha
  [[0,0],[0,1],[1,1],[2,1],[2,2]],
  [[1,0],[0,1],[1,1],[2,1],[1,2]]
];

let current;

// ===== JOGO =====
function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=Array(COLS).fill(null);
  }
}

function spawnPiece(){
  let shape = shapes[Math.floor(Math.random()*shapes.length)];

  current = {
    shape,
    x: Math.floor(COLS/2),
    y: 0,
    pitch: 5
  };
}

function canMove(dx,dy){
  return current.shape.every(p=>{
    let x = current.x + p[0] + dx;
    let y = current.y + p[1] + dy;
    return x>=0 && x<COLS && y<ROWS && (!grid[y] || !grid[y][x]);
  });
}

function merge(){
  current.shape.forEach(p=>{
    let x=current.x+p[0];
    let y=current.y+p[1];
    grid[y][x] = current.pitch;
    play(freqMap[notesMap[current.pitch]]);
  });

  clearLines();
  spawnPiece();
}

function clearLines(){
  for(let c=0;c<COLS;c++){
    let full=true;
    for(let r=0;r<ROWS;r++){
      if(!grid[r][c]) full=false;
    }

    if(full){
      for(let r=0;r<ROWS;r++){
        grid[r][c]=null;
      }
    }
  }
}

// ===== CONTROLE =====
canvas.addEventListener("touchmove",e=>{
  if(!current) return;

  let y=e.touches[0].clientY;
  current.pitch = Math.floor((y/H)*notesMap.length);
});

// ===== LOOP =====
let lastDrop=0;
let speed=500;
let running=false;

function loop(t){
  if(!running) return;

  if(t-lastDrop>speed){
    if(canMove(0,1)){
      current.y++;
    }else{
      merge();
    }
    lastDrop=t;
  }

  draw();
  requestAnimationFrame(loop);
}

// ===== DESENHO =====
function draw(){
  ctx.clearRect(0,0,W,H);

  cellW = W/COLS;
  cellH = H/ROWS;

  // grid
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]!=null){
        drawNote(c,r,grid[r][c]);
      }
    }
  }

  // peça atual
  current.shape.forEach(p=>{
    drawNote(current.x+p[0], current.y+p[1], current.pitch);
  });
}

function drawNote(c,r,pitch){
  let x=c*cellW;
  let y=r*cellH;

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.ellipse(x+cellW/2,y+cellH/2,8,6,0,0,Math.PI*2);
  ctx.fill();
}

// ===== CONTROLES =====
function start(){
  initGrid();
  spawnPiece();
  running=true;
  loop(0);
}

function playAll(){
  grid.forEach(col=>{
    col.forEach(p=>{
      if(p!=null){
        play(freqMap[notesMap[p]]);
      }
    });
  });
}

function savePDF(){
  window.print();
}

</script>

</body>
</html>
