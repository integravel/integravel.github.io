<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partitura Violino</title>

<style>
body {
  margin: 0;
  background: #fafafa;
  overflow: hidden;
  font-family: serif;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button, input {
  font-size: 16px;
  margin: 5px;
}

#menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border: 1px solid #ccc;
  display: none;
}
</style>
</head>

<body>

<div id="ui">
  BPM: <input type="number" id="bpm" value="90">
  <button onclick="start()">Iniciar</button>
  <button onclick="stop()">Parar</button>
</div>

<canvas id="canvas"></canvas>

<div id="menu">
  <button onclick="restart()">Reiniciar</button>
  <button onclick="playComposition()">Ouvir</button>
  <button onclick="savePDF()">Salvar PDF</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Notas reais
const notesMap = [
  "E4","F4","G4","A4","B4",
  "C5","D5","E5","F5","G5",
  "A5","B5","C6"
];

const freqMap = {
  "E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
  "C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
  "A5":880,"B5":988,"C6":1046
};

let lineSpacing, staffTop;

// Estado
let notes = [];
let running = false;
let startTime;
let speed;
let bpmVal = 90;

// Toque
let currentNote = null;
let touchStartTime = 0;

// Áudio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Conversões
function getNote(y){
  let idx = Math.round((y - staffTop)/(lineSpacing/2));
  idx = Math.max(0, Math.min(notesMap.length-1, idx));
  return notesMap[idx];
}

function getY(note){
  return staffTop + notesMap.indexOf(note)*(lineSpacing/2);
}

// Áudio contínuo (para slide)
function startOsc(freq){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.value = 0.3;

  osc.start();

  return {osc, gain};
}

// Desenho
function drawStaff(offset){
  lineSpacing = height/12;
  staffTop = height/2 - 2*lineSpacing;

  ctx.strokeStyle = "black";

  for(let i=0;i<5;i++){
    let y = staffTop + i*lineSpacing;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(width,y);
    ctx.stroke();
  }

  // clave de sol móvel
  ctx.font = `${lineSpacing*4}px serif`;
  ctx.fillText("𝄞", 40 - offset, staffTop + lineSpacing*3);
}

function drawNote(n){
  let y = getY(n.note);

  ctx.fillStyle = "black";

  ctx.beginPath();
  ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(n.x+10, y);
  ctx.lineTo(n.x+10, y-35);
  ctx.stroke();

  if(n.slidePath){
    ctx.beginPath();
    ctx.moveTo(n.x, n.slidePath[0]);
    ctx.lineTo(n.x+15, n.slidePath[1]);
    ctx.stroke();
  }

  // linhas suplementares
  if(y < staffTop || y > staffTop + 4*lineSpacing){
    ctx.beginPath();
    ctx.moveTo(n.x-12, y);
    ctx.lineTo(n.x+12, y);
    ctx.stroke();
  }
}

// Loop
function loop(){
  if(!running) return;

  let time = performance.now() - startTime;
  let offset = time * speed;

  ctx.clearRect(0,0,width,height);

  drawStaff(offset);

  notes.forEach(n=>{
    n.x = width - (offset - n.startX);
    drawNote(n);
  });

  requestAnimationFrame(loop);
}

// Controle
function start(){
  notes = [];
  running = true;
  startTime = performance.now();
  bpmVal = parseInt(bpm.value);
  speed = bpmVal/60 * 100;
  loop();
}

function stop(){
  running = false;
  menu.style.display = "block";
}

function restart(){
  notes = [];
  menu.style.display = "none";
}

// Playback correto
function playComposition(){
  let beatDur = 60 / bpmVal;

  notes.forEach(n=>{
    let start = n.startTime/1000;
    let dur = n.duration/1000;

    setTimeout(()=>{
      playTone(freqMap[n.note], dur);
    }, start*1000);
  });
}

function playTone(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

// PDF
function savePDF(){
  window.print();
}

// Toque
canvas.addEventListener("touchstart", e=>{
  if(!running) return;

  let t = e.touches[0];
  let y = t.clientY;

  touchStartTime = performance.now();

  let note = getNote(y);
  let freq = freqMap[note];

  let oscObj = startOsc(freq);

  currentNote = {
    note,
    startTime: performance.now() - startTime,
    duration: 0,
    startX: (performance.now() - startTime) * speed,
    oscObj,
    slidePath: [y,y]
  };

  notes.push(currentNote);
});

canvas.addEventListener("touchmove", e=>{
  if(!currentNote) return;

  let y = e.touches[0].clientY;
  let note = getNote(y);

  currentNote.note = note;
  currentNote.slidePath[1] = y;

  currentNote.oscObj.osc.frequency.value = freqMap[note];
});

canvas.addEventListener("touchend", e=>{
  if(!currentNote) return;

  currentNote.duration = performance.now() - touchStartTime;

  currentNote.oscObj.gain.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime + 0.2
  );

  currentNote = null;
});

// orientação
function checkOrientation(){
  if(window.innerHeight > window.innerWidth){
    alert("Use na horizontal");
  }
}
checkOrientation();
window.addEventListener("resize", checkOrientation);

</script>

</body>
</html>
