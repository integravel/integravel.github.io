<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditado Musical</title>

<style>
body{
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button,input{
  font-size:16px;
  margin:5px;
}
</style>
</head>

<body>

<div id="ui">
BPM <input type="number" id="bpm" value="80">
<button onclick="startGame()">Iniciar</button>
<button onclick="repeatSequence()">Repetir</button>
<p>Precisão: <span id="accuracy">0%</span></p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== CONFIG =====
const notes = ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5"];

const freq = {
"C4":261,"D4":294,"E4":329,"F4":349,"G4":392,
"A4":440,"B4":494,"C5":523,"D5":587,"E5":659,"F5":698
};

const noteSteps = {
"C4":-2,"D4":-1,"E4":0,"F4":1,"G4":2,
"A4":3,"B4":4,"C5":5,"D5":6,"E5":7,"F5":8
};

let sequence = [];
let playerNotes = [];
let correctNotes = [];

let playing = false;
let showCorrection = false;

let totalAccuracy = 0;
let totalNotes = 0;

let cursorX = 180;
let cursorSpeed = 0;

// ===== ÁUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playNote(f){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = f;
  osc.type = "triangle";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.6);

  osc.stop(audioCtx.currentTime+0.6);
}

// ===== POSIÇÃO DAS NOTAS =====
function getYFromNote(note){
  let mid = H/2;
  let space = 32;
  let bottomLineY = mid + 2*space;
  let step = space/2;
  return bottomLineY - (noteSteps[note]*step);
}

function getNoteFromY(y){
  let mid = H/2;
  let space = 32;
  let bottomLineY = mid + 2*space;
  let step = space/2;

  let raw = (bottomLineY - y)/step;
  let index = Math.round(raw);

  let best = "C4";
  let minDiff = Infinity;

  for(let k in noteSteps){
    let diff = Math.abs(noteSteps[k] - index);
    if(diff < minDiff){
      minDiff = diff;
      best = k;
    }
  }

  return best;
}

// ===== SEQUÊNCIA =====
function newSequence(){
  sequence = [];
  for(let i=0;i<5;i++){
    sequence.push(notes[Math.floor(Math.random()*notes.length)]);
  }

  correctNotes = sequence.map((n,i)=>({
    x:180 + i*120,
    y:getYFromNote(n),
    note:n,
    played:false
  }));
}

// ===== PLAYBACK =====
function startPlayback(){
  let bpm = document.getElementById("bpm").value;
  let tempo = 60000/bpm;

  cursorX = 180;
  cursorSpeed = 120 / (tempo/16);

  playing = true;
  correctNotes.forEach(n=>n.played=false);
}

function repeatSequence(){
  if(playing || showCorrection) return;
  playerNotes = [];
  startPlayback();
}

// ===== LOOP =====
function update(){
  if(playing){
    cursorX += cursorSpeed;

    correctNotes.forEach(n=>{
      if(!n.played && cursorX >= n.x){
        playNote(freq[n.note]);
        n.played = true;
      }
    });

    if(cursorX > 180 + 5*120){
      playing = false;
    }
  }
}

// ===== INPUT =====
canvas.addEventListener("touchstart",e=>{
  if(playing) return;
  if(playerNotes.length >= 5) return;
  if(showCorrection) return;

  let t = e.touches[0];

  let x = t.clientX;
  let y = t.clientY;

  let noteName = getNoteFromY(y);

  playerNotes.push({
    x:x,
    y:getYFromNote(noteName),
    note:noteName
  });

  playNote(freq[noteName]);

  if(playerNotes.length === 5){
    evaluate();
  }
});

// ===== AVALIAÇÃO =====
function evaluate(){
  let maxDist = 200;
  let tolerance = maxDist * 0.1;

  for(let i=0;i<5;i++){
    let dx = playerNotes[i].x - correctNotes[i].x;
    let dy = playerNotes[i].y - correctNotes[i].y;

    let dist = Math.sqrt(dx*dx + dy*dy);
    let acc = dist <= tolerance ? 100 : Math.max(0, 100 - (dist/maxDist)*100);

    totalAccuracy += acc;
    totalNotes++;
  }

  let avg = Math.round(totalAccuracy / totalNotes);
  document.getElementById("accuracy").innerText = avg + "%";

  showCorrection = true;

  setTimeout(()=>{
    showCorrection = false;
    playerNotes = [];
    newSequence();
    startPlayback();
  },2000);
}

// ===== CLAVE PERFEITA =====
function drawTrebleClef(x, y, scale){

  ctx.lineWidth = 3;
  ctx.strokeStyle = "black";

  ctx.beginPath();

  // espiral central (ALINHADA NA LINHA DO SOL)
  ctx.arc(x, y, 12*scale, 0, Math.PI*2);

  // haste
  ctx.moveTo(x, y - 60*scale);
  ctx.bezierCurveTo(
    x - 20*scale, y - 30*scale,
    x + 20*scale, y + 20*scale,
    x, y + 80*scale
  );

  // curva inferior
  ctx.bezierCurveTo(
    x - 30*scale, y + 60*scale,
    x + 10*scale, y + 40*scale,
    x, y + 20*scale
  );

  ctx.stroke();
}

// ===== DESENHO =====
function drawStaff(){

  let mid = H/2;
  let space = 32;

  ctx.lineWidth = 2;

  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(80, mid + i*space);
    ctx.lineTo(W-50, mid + i*space);
    ctx.stroke();
  }

  // linha do SOL (referência absoluta)
  let solLineY = mid + space;

  drawTrebleClef(110, solLineY, 1);
}

// ===== NOTAS =====
function drawNotes(){
  playerNotes.forEach(n=>{
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.ellipse(n.x,n.y,14,10,0,0,Math.PI*2);
    ctx.fill();
  });

  if(showCorrection){
    correctNotes.forEach(n=>{
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.ellipse(n.x,n.y,14,10,0,0,Math.PI*2);
      ctx.fill();
    });
  }
}

function drawCursor(){
  if(playing){
    ctx.strokeStyle="green";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cursorX,0);
    ctx.lineTo(cursorX,H);
    ctx.stroke();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawStaff();
  drawNotes();
  drawCursor();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== START =====
function startGame(){
  totalAccuracy = 0;
  totalNotes = 0;

  document.getElementById("accuracy").innerText = "0%";

  playerNotes=[];
  showCorrection=false;

  newSequence();
  startPlayback();
}
</script>

</body>
</html>
