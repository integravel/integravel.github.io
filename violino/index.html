<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partitura Violino</title>

<style>
body {
  margin: 0;
  background: #fafafa;
  overflow: hidden;
  font-family: serif;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

button, input {
  font-size: 16px;
  margin: 5px;
}

#menu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border: 1px solid #ccc;
  display: none;
}
</style>
</head>

<body>

<div id="ui">
  BPM: <input type="number" id="bpm" value="90">
  <button onclick="start()">Iniciar</button>
  <button onclick="stop()">Parar</button>
</div>

<canvas id="canvas"></canvas>

<div id="menu">
  <button onclick="restart()">Reiniciar</button>
  <button onclick="playComposition()">Ouvir</button>
  <button onclick="savePDF()">Salvar PDF</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width, height;
function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// notas
const notesMap = [
  "E4","F4","G4","A4","B4",
  "C5","D5","E5","F5","G5",
  "A5","B5","C6"
];

const freqMap = {
  "E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
  "C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
  "A5":880,"B5":988,"C6":1046
};

let lineSpacing, staffTop;

// estado
let notes = [];
let running = false;
let speed;
let timeStart;

// playhead (linha do arco)
const playX = 120;

// áudio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// util
function getNote(y){
  let idx = Math.round((y - staffTop)/(lineSpacing/2));
  idx = Math.max(0, Math.min(notesMap.length-1, idx));
  return notesMap[idx];
}

function getY(note){
  return staffTop + notesMap.indexOf(note)*(lineSpacing/2);
}

function play(freq, duration=0.3){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

// desenho
function drawStaff(){
  lineSpacing = height/12;
  staffTop = height/2 - 2*lineSpacing;

  ctx.strokeStyle = "black";

  for(let i=0;i<5;i++){
    let y = staffTop + i*lineSpacing;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(width,y);
    ctx.stroke();
  }
}

// clave
function drawClef(offset){
  ctx.font = `${lineSpacing*4}px serif`;
  ctx.fillText("𝄞", offset, staffTop + lineSpacing*3);
}

// nota
function drawNote(n){
  let y = getY(n.note);

  ctx.beginPath();
  ctx.ellipse(n.x, y, 10, 7, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(n.x+10, y);
  ctx.lineTo(n.x+10, y-30);
  ctx.stroke();

  if(n.slideY){
    ctx.beginPath();
    ctx.moveTo(n.x, y);
    ctx.lineTo(n.x+15, n.slideY);
    ctx.stroke();
  }

  if(y < staffTop || y > staffTop + 4*lineSpacing){
    ctx.beginPath();
    ctx.moveTo(n.x-12, y);
    ctx.lineTo(n.x+12, y);
    ctx.stroke();
  }
}

// loop
function loop(){
  if(!running) return;

  let time = performance.now() - timeStart;

  ctx.clearRect(0,0,width,height);

  drawStaff();

  // linha do arco (playhead)
  ctx.strokeStyle = "red";
  ctx.beginPath();
  ctx.moveTo(playX, 0);
  ctx.lineTo(playX, height);
  ctx.stroke();

  // clave
  drawClef(200 - time*speed);

  notes.forEach(n=>{
    n.x -= speed;

    // tocar quando cruza a linha
    if(!n.played && n.x <= playX){
      play(freqMap[n.note], n.duration/1000 || 0.3);
      n.played = true;
    }

    drawNote(n);
  });

  requestAnimationFrame(loop);
}

// controle
function start(){
  notes = [];
  running = true;
  timeStart = performance.now();
  speed = parseInt(bpm.value)/60 * 2;
  loop();
}

function stop(){
  running = false;
  menu.style.display = "block";
}

function restart(){
  notes = [];
  menu.style.display = "none";
}

// playback separado
function playComposition(){
  let t = 0;
  notes.forEach(n=>{
    setTimeout(()=>{
      play(freqMap[n.note], n.duration/1000 || 0.3);
    }, t);
    t += (n.duration || 200);
  });
}

// PDF
function savePDF(){
  window.print();
}

// toque
let currentNote = null;
let startTouchTime = 0;

canvas.addEventListener("touchstart", e=>{
  if(!running) return;

  let y = e.touches[0].clientY;
  startTouchTime = performance.now();

  let note = getNote(y);

  currentNote = {
    x: width,
    note,
    duration: 0
  };

  notes.push(currentNote);
});

canvas.addEventListener("touchmove", e=>{
  if(!currentNote) return;

  let y = e.touches[0].clientY;
  currentNote.note = getNote(y);
  currentNote.slideY = y;
});

canvas.addEventListener("touchend", e=>{
  if(!currentNote) return;

  currentNote.duration = performance.now() - startTouchTime;
  currentNote = null;
});

// orientação
function checkOrientation(){
  if(window.innerHeight > window.innerWidth){
    alert("Use na horizontal");
  }
}
checkOrientation();
window.addEventListener("resize", checkOrientation);

</script>

</body>
</html>
