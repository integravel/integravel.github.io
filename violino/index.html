<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditado Musical - Violino</title>

<style>
body {
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button,input{
  font-size:16px;
  margin:5px;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<div id="ui">
BPM <input type="number" id="bpm" value="80">
<button onclick="startGame()">Iniciar</button>
<p>Pontos: <span id="score">0</span></p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== CONFIG =====
const notes = [
"E4","F4","G4","A4","B4",
"C5","D5","E5","F5","G5",
"A5"
];

const freq = {
"E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
"C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
"A5":880
};

let sequence = [];
let playerInput = [];
let playing = false;
let score = 0;

// ===== ÁUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playNote(f){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = f;
  osc.type = "sine";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.6);
  osc.stop(audioCtx.currentTime+0.6);
}

// ===== GERAR SEQUÊNCIA =====
function newSequence(){
  sequence = [];
  for(let i=0;i<5;i++){
    let n = Math.floor(Math.random()*notes.length);
    sequence.push(n);
  }
}

// ===== TOCAR SEQUÊNCIA =====
async function playSequence(){
  playing = true;
  let bpm = document.getElementById("bpm").value;
  let tempo = 60000/bpm;

  for(let n of sequence){
    playNote(freq[notes[n]]);
    await new Promise(r=>setTimeout(r,tempo));
  }

  // som de reinício
  playNote(200);
  playing = false;
}

// ===== INPUT =====
canvas.addEventListener("touchstart",e=>{
  if(playing) return;

  let y = e.touches[0].clientY;
  let noteIndex = Math.floor((y/H)*notes.length);

  playerInput.push(noteIndex);
  playNote(freq[notes[noteIndex]]);

  if(playerInput.length === sequence.length){
    checkResult();
  }

  draw();
});

// ===== RESULTADO =====
function checkResult(){
  let correct = 0;

  for(let i=0;i<sequence.length;i++){
    if(sequence[i] === playerInput[i]) correct++;
  }

  score += correct;
  document.getElementById("score").innerText = score;

  playerInput = [];

  setTimeout(()=>{
    newSequence();
    playSequence();
  },800);
}

// ===== DESENHO =====
function drawStaff(){
  let mid = H/2;
  let space = 15;

  ctx.strokeStyle="black";

  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(50, mid + i*space);
    ctx.lineTo(W-50, mid + i*space);
    ctx.stroke();
  }

  // clave de sol
  ctx.font="60px serif";
  ctx.fillText("𝄞", 60, mid+20);
}

function drawNotes(){
  let mid = H/2;
  let space = 15;

  sequence.forEach((n,i)=>{
    let x = 150 + i*80;
    let y = mid - (n-5)*space;

    ctx.beginPath();
    ctx.ellipse(x,y,10,7,0,0,Math.PI*2);
    ctx.fill();
  });

  playerInput.forEach((n,i)=>{
    let x = 150 + i*80;
    let y = mid - (n-5)*space;

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.ellipse(x,y,10,7,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="black";
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawStaff();
  drawNotes();
}

// ===== START =====
function startGame(){
  score=0;
  document.getElementById("score").innerText = score;

  newSequence();
  playSequence();
  draw();
}

</script>

</body>
</html>
