<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Violino Interativo PRO</title>

<style>
body {
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button,input{
  font-size:16px;
  margin:5px;
}
</style>
</head>

<body>

<div id="ui">
BPM <input type="number" id="bpm" value="90">
<button onclick="start()">Iniciar</button>
<button onclick="stop()">Parar</button>
<button onclick="playAll()">Ouvir</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== SOM REAL (sample leve) =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let violinBuffer = null;

async function loadSample(){
  const url = "https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/FluidR3_GM/violin-mp3/C4.mp3";
  const res = await fetch(url);
  const array = await res.arrayBuffer();
  violinBuffer = await audioCtx.decodeAudioData(array);
}
loadSample();

function playViolin(freq, dur){
  if(!violinBuffer) return;

  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();

  src.buffer = violinBuffer;

  const baseFreq = 261.63; // C4
  src.playbackRate.value = freq/baseFreq;

  src.connect(gain);
  gain.connect(audioCtx.destination);

  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + dur);

  src.start();
  src.stop(audioCtx.currentTime + dur);
}

// ===== NOTAS =====
const notesMap = [
"E4","F4","G4","A4","B4",
"C5","D5","E5","F5","G5",
"A5","B5","C6"
];

const freqMap = {
"E4":329,"F4":349,"G4":392,"A4":440,"B4":494,
"C5":523,"D5":587,"E5":659,"F5":698,"G5":784,
"A5":880,"B5":988,"C6":1046
};

let staffTop,space;

// ===== ESTADO =====
let notes=[];
let running=false;
let speed;
let startTime;

const playX=120;

// ===== FUNÇÕES =====
function getNote(y){
  let i=Math.round((y-staffTop)/(space/2));
  i=Math.max(0,Math.min(notesMap.length-1,i));
  return notesMap[i];
}

function getY(n){
  return staffTop + notesMap.indexOf(n)*(space/2);
}

function getType(d){
  if(d<150) return "eighth";
  if(d<350) return "quarter";
  if(d<700) return "half";
  return "whole";
}

// ===== DESENHO =====
function drawStaff(){
  space = H/12;
  staffTop = H/2 - 2*space;

  ctx.strokeStyle="black";

  for(let i=0;i<5;i++){
    let y=staffTop+i*space;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
}

function drawClef(x){
  ctx.font=`${space*4}px serif`;
  ctx.fillText("𝄞",x,staffTop+space*3);
}

function drawNote(n){
  let y=getY(n.note);

  // cabeça
  if(n.type==="whole"||n.type==="half"){
    ctx.beginPath();
    ctx.ellipse(n.x,y,10,7,0,0,Math.PI*2);
    ctx.stroke();
  }else{
    ctx.beginPath();
    ctx.ellipse(n.x,y,10,7,0,0,Math.PI*2);
    ctx.fill();
  }

  // haste
  if(n.type!=="whole"){
    let up = y > staffTop+2*space;
    ctx.beginPath();
    if(up){
      ctx.moveTo(n.x-10,y);
      ctx.lineTo(n.x-10,y+30);
    }else{
      ctx.moveTo(n.x+10,y);
      ctx.lineTo(n.x+10,y-30);
    }
    ctx.stroke();
  }

  // colcheia bandeira
  if(n.type==="eighth"){
    ctx.beginPath();
    ctx.moveTo(n.x+10,y-30);
    ctx.quadraticCurveTo(n.x+25,y-20,n.x+10,y-10);
    ctx.stroke();
  }

  // linhas suplementares
  if(y<staffTop||y>staffTop+4*space){
    ctx.beginPath();
    ctx.moveTo(n.x-12,y);
    ctx.lineTo(n.x+12,y);
    ctx.stroke();
  }

  // ligadura (slide)
  if(n.tie){
    ctx.beginPath();
    ctx.moveTo(n.x,y);
    ctx.quadraticCurveTo(n.x+20,y-20,n.x+40,n.tieY);
    ctx.stroke();
  }
}

// agrupamento colcheias
function drawBeams(){
  for(let i=0;i<notes.length-1;i++){
    let a=notes[i], b=notes[i+1];
    if(a.type==="eighth" && b.type==="eighth"){
      ctx.beginPath();
      ctx.moveTo(a.x+10,getY(a.note)-30);
      ctx.lineTo(b.x+10,getY(b.note)-30);
      ctx.stroke();
    }
  }
}

// ===== LOOP =====
function loop(){
  if(!running) return;

  let t = performance.now()-startTime;

  ctx.clearRect(0,0,W,H);

  drawStaff();

  // playhead
  ctx.strokeStyle="red";
  ctx.beginPath();
  ctx.moveTo(playX,0);
  ctx.lineTo(playX,H);
  ctx.stroke();

  // clave
  drawClef(200 - t*speed);

  notes.forEach(n=>{
    n.x -= speed;

    if(!n.played && n.x<=playX){
      playViolin(freqMap[n.note], n.duration/1000 || 0.4);
      n.played=true;
    }

    drawNote(n);
  });

  drawBeams();

  requestAnimationFrame(loop);
}

// ===== CONTROLE =====
function start(){
  notes=[];
  running=true;
  startTime=performance.now();
  speed=parseInt(bpm.value)/60*2;
  loop();
}

function stop(){
  running=false;
}

// playback completo
function playAll(){
  let t=0;
  notes.forEach(n=>{
    setTimeout(()=>{
      playViolin(freqMap[n.note], n.duration/1000||0.4);
    },t);
    t += n.duration||200;
  });
}

// ===== TOQUE =====
let current=null;
let t0=0;

canvas.addEventListener("touchstart",e=>{
  if(!running) return;

  let y=e.touches[0].clientY;
  t0=performance.now();

  current={
    x:W,
    note:getNote(y),
    duration:0
  };

  notes.push(current);
});

canvas.addEventListener("touchmove",e=>{
  if(!current) return;

  let y=e.touches[0].clientY;

  current.note=getNote(y);
  current.tie=true;
  current.tieY=y;
});

canvas.addEventListener("touchend",e=>{
  if(!current) return;

  current.duration = performance.now()-t0;
  current.type = getType(current.duration);

  current=null;
});

</script>

</body>
</html>
