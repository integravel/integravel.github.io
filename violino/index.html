<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditado Musical</title>

<style>
body{
  margin:0;
  background:#fff;
  overflow:hidden;
  font-family:serif;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div id="ui">
  BPM <input type="number" id="bpm" value="80">
  <button onclick="startGame()">Iniciar</button>
  <button onclick="repeatSequence()">Repetir</button>
  <span>Precisão: <span id="accuracy">0%</span></span>
  <span>Notas: <span id="difficulty">3</span></span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ===== CONFIG =====
const notes = ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5"];

const freq = {
"C4":261,"D4":294,"E4":329,"F4":349,"G4":392,
"A4":440,"B4":494,"C5":523,"D5":587,"E5":659,"F5":698
};

const noteSteps = {
"C4":-2,"D4":-1,"E4":0,"F4":1,"G4":2,
"A4":3,"B4":4,"C5":5,"D5":6,"E5":7,"F5":8
};

let correctNotes = [];
let playerNotes = [];

let difficulty = 3;

let playing = false;
let showCorrection = false;

let totalAccuracy = 0;
let totalNotes = 0;

let cursorX = 180;

// ===== ÁUDIO =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playNote(f){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = f;
  osc.type = "triangle";

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

  osc.stop(audioCtx.currentTime + 0.6);
}

// ===== POSIÇÃO =====
function getYFromNote(note){
  let mid = H/2;
  let space = 32;
  let bottomLineY = mid + 2*space;
  let step = space/2;
  return bottomLineY - (noteSteps[note]*step);
}

function getNoteFromY(y){
  let mid = H/2;
  let space = 32;
  let bottomLineY = mid + 2*space;
  let step = space/2;

  let raw = (bottomLineY - y)/step;
  let index = Math.round(raw);

  let best = "C4";
  let minDiff = Infinity;

  for(let k in noteSteps){
    let diff = Math.abs(noteSteps[k] - index);
    if(diff < minDiff){
      minDiff = diff;
      best = k;
    }
  }

  return best;
}

// ===== SEQUÊNCIA =====
function newSequence(){

  correctNotes = [];

  let startX = 180;
  let endX = W - 80;
  let usableWidth = endX - startX;

  let irregularity = Math.max(0, (difficulty-3)/7);

  let weights = [];
  let totalWeight = 0;

  for(let i=0;i<difficulty;i++){
    let variation = (Math.random()*2 - 1) * irregularity;
    let w = Math.max(0.5, 1 + variation);

    weights.push(w);
    totalWeight += w;
  }

  let unitWidth = usableWidth / totalWeight;
  let x = startX;

  for(let i=0;i<difficulty;i++){

    let note = notes[Math.floor(Math.random()*notes.length)];

    correctNotes.push({
      x:x,
      y:getYFromNote(note),
      note:note,
      played:false
    });

    x += weights[i] * unitWidth;
  }

  document.getElementById("difficulty").innerText = difficulty;
}

// ===== PLAYBACK =====
function startPlayback(){
  cursorX = 180;
  playing = true;
  correctNotes.forEach(n=>n.played=false);
}

function repeatSequence(){
  if(playing || showCorrection) return;
  playerNotes = [];
  startPlayback();
}

// ===== LOOP =====
function update(){
  if(playing){
    cursorX += 2;

    correctNotes.forEach(n=>{
      if(!n.played && cursorX >= n.x){
        playNote(freq[n.note]);
        n.played = true;
      }
    });

    if(cursorX > W){
      playing = false;
    }
  }
}

// ===== INPUT (SEM SOM DO USUÁRIO) =====
canvas.addEventListener("touchstart",e=>{
  if(!playing) return;
  if(playerNotes.length >= difficulty) return;

  let t = e.touches[0];

  let noteName = getNoteFromY(t.clientY);

  playerNotes.push({
    x: t.clientX,
    y: getYFromNote(noteName),
    note: noteName
  });

  // ❌ REMOVIDO: playNote(...)
});

// ===== AVALIAÇÃO =====
function evaluate(){

  let total = 0;
  let count = Math.min(playerNotes.length, correctNotes.length);

  for(let i=0;i<count;i++){

    let dx = playerNotes[i].x - correctNotes[i].x;
    let dy = playerNotes[i].y - correctNotes[i].y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let acc = Math.max(0, 100 - dist);

    total += acc;
    totalAccuracy += acc;
    totalNotes++;
  }

  let avg = totalNotes ? Math.round(totalAccuracy / totalNotes) : 0;
  document.getElementById("accuracy").innerText = avg + "%";

  let roundAvg = count ? total / count : 0;

  if(roundAvg > 85 && difficulty < 10) difficulty++;
  else if(roundAvg < 50 && difficulty > 3) difficulty--;

  showCorrection = true;

  setTimeout(()=>{
    showCorrection = false;
    playerNotes = [];
    newSequence();
    startPlayback();
  },2000);
}

// ===== DESENHO =====
function drawStaff(){

  let mid = H/2;
  let space = 32;

  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(80, mid + i*space);
    ctx.lineTo(W-50, mid + i*space);
    ctx.stroke();
  }

  let solLineY = mid + space;

  ctx.font = "120px serif";
  ctx.textBaseline = "middle";

  ctx.fillText("𝄞", 70, solLineY - 8);
}

function drawSingleNote(n, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(n.x,n.y,12,9,0,0,Math.PI*2);
  ctx.fill();
}

function drawNotes(){
  playerNotes.forEach(n=>drawSingleNote(n,"blue"));

  if(showCorrection){
    correctNotes.forEach(n=>drawSingleNote(n,"red"));
  }
}

function drawCursor(){
  if(playing){
    ctx.strokeStyle="green";
    ctx.beginPath();
    ctx.moveTo(cursorX,0);
    ctx.lineTo(cursorX,H);
    ctx.stroke();
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawStaff();
  drawNotes();
  drawCursor();
}

function loop(){
  update();
  draw();

  if(!playing && !showCorrection && correctNotes.length){
    evaluate();
  }

  requestAnimationFrame(loop);
}
loop();

// ===== START =====
function startGame(){
  totalAccuracy = 0;
  totalNotes = 0;

  document.getElementById("accuracy").innerText = "0%";

  playerNotes=[];
  showCorrection=false;

  difficulty = 3;

  newSequence();
  startPlayback();
}
</script>

</body>
</html>
