<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besouros</title>

<style>

body {
  font-family: sans-serif;
  background: #f6f3ed;
  margin: 0;
  text-align: center;
}

.app {
  max-width: 100%;
  padding: 10px;
  box-sizing: border-box;
}

/* GRID RESPONSIVA */
#board {
  display: grid;
  gap: 6px;
  margin: 10px 0;
}

/* células adaptativas */
.cell {
  background: #f0eadf;
  border: 2px solid #cfc6b8;
  border-radius: 10px;

  aspect-ratio: 1 / 1;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: clamp(14px, 4vw, 22px);
  transition: 0.2s;
}

.cell.filled {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(0.8); }
  100% { transform: scale(1); }
}

/* jarros */
#jarArea {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 10px;
  padding: 5px;
}

.jar {
  width: 100%;
  max-width: 70px;
  margin: auto;
  cursor: grab;
  transition: 0.2s;
}

.jar:active {
  transform: scale(0.95);
}

.jar-top {
  background: #a8c7b8;
  color: #2f4f4f;
  font-size: 12px;
  border-radius: 10px 10px 0 0;
  padding: 3px;
  font-weight: bold;
}

.jar-body {
  border-radius: 0 0 16px 16px;
  background: linear-gradient(#e8f2ee, #d7e6df);
  border: 2px solid #aabfb6;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-content: flex-start;

  gap: 2px;
  padding: 5px;

  min-height: 70px;
}

.jar-body span {
  font-size: clamp(10px, 3vw, 14px);
  animation: wiggle 2s infinite ease-in-out;
}

@keyframes wiggle {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* feedback */
#feedback {
  font-size: clamp(14px, 4vw, 18px);
  height: 24px;
}

</style>
</head>

<body>

<div class="app">
  <div id="feedback"></div>
  <div id="board"></div>
  <div id="jarArea"></div>
</div>

<script>

// ===== ESTADO =====
let totalCells = 0;
let filledCells = 0;
let overflowErrors = 0;
let currentPhase = 0;

const basePhases = [
  { rows: 3, cols: 3, jars: [4,1,2,1,2,3] },
  { rows: 4, cols: 4, jars: [5,3,4,2,1,6,3] },
  { rows: 5, cols: 5, jars: [8,6,5,4,3,2,1,7] }
];

let currentData = null;

// ===== UTIL =====
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===== DIFICULDADE =====
function getDifficultyFactor() {
  let f = 1;
  if (overflowErrors === 0) f += 0.4;
  if (overflowErrors >= 3) f -= 0.3;
  return Math.max(0.7, Math.min(2, f));
}

function generateDynamicPhase() {
  const f = getDifficultyFactor();

  const size = Math.floor(3 + f * 2);
  const total = size * size;

  let jars = [];
  let sum = 0;

  while (sum < total) {
    let val = Math.floor(Math.random() * (3 + f * 4)) + 1;
    jars.push(val);
    sum += val;
  }

  return {
    rows: size,
    cols: size,
    jars: shuffle(jars)
  };
}

// ===== LOAD =====
function loadPhase() {

  if (currentPhase < basePhases.length) {
    currentData = basePhases[currentPhase];
  } else {
    currentData = generateDynamicPhase();
  }

  totalCells = currentData.rows * currentData.cols;
  filledCells = 0;
  overflowErrors = 0;

  board.innerHTML = "";
  jarArea.innerHTML = "";
  feedback.textContent = "";

  createBoard(currentData.rows, currentData.cols);
  createJars(currentData.jars);
}

// ===== BOARD =====
function createBoard(r,c) {

  board.style.gridTemplateColumns = `repeat(${c}, 1fr)`;

  for (let i=0;i<r*c;i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.filled = "false";
    board.appendChild(cell);
  }

  enableDrop();
}

// ===== JAR =====
function createJars(jars) {

  jars.forEach((amount,i)=>{

    let jar = document.createElement("div");
    jar.className = "jar";
    jar.id = "jar-"+i;
    jar.draggable = true;
    jar.dataset.amount = amount;

    let bugs="";
    for (let j=0;j<amount;j++){
      bugs += "<span>🐞</span>";
    }

    jar.innerHTML = `
      <div class="jar-top">${amount}</div>
      <div class="jar-body">${bugs}</div>
    `;

    jar.ondragstart = e=>{
      e.dataTransfer.setData("text", jar.id);
    };

    jarArea.appendChild(jar);
  });
}

// ===== DROP =====
function enableDrop() {

  board.ondragover = e => e.preventDefault();

  board.ondrop = e => {

    e.preventDefault();

    const jar = document.getElementById(
      e.dataTransfer.getData("text")
    );

    if (!jar) return;

    let amount = Number(jar.dataset.amount);

    let empty = [...document.querySelectorAll(".cell")]
      .filter(c => c.dataset.filled === "false");

    empty = shuffle(empty);

    let place = Math.min(amount, empty.length);
    let extra = amount - place;

    for (let i=0;i<place;i++){
      empty[i].textContent = "🐞";
      empty[i].dataset.filled = "true";
      empty[i].classList.add("filled");
    }

    if (extra > 0) overflowErrors += extra;

    filledCells += place;

    jar.style.transform = "scale(0)";
    jar.style.opacity = "0";
    setTimeout(()=> jar.remove(), 200);

    checkEnd();
  };
}

// ===== FIM =====
function checkEnd() {
  if (filledCells === totalCells) {

    feedback.textContent =
      overflowErrors === 0 ? "Perfeito! ✨" : "Quase! 🐞";

    setTimeout(()=>{
      currentPhase++;
      loadPhase();
    }, 600);
  }
}

// ===== INIT =====
const board = document.getElementById("board");
const jarArea = document.getElementById("jarArea");
const feedback = document.getElementById("feedback");

loadPhase();

</script>

</body>
</html>
