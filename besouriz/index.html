<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besouros</title>

<style>

body {
  font-family: sans-serif;
  background: #f6f3ed;
  margin: 0;
  text-align: center;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

/* container 3D */
#boardContainer {
  height: 340px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
}

/* cada camada */
.layer {
  display: grid;
  gap: 4px;
  justify-content: center;
}

/* leve efeito de profundidade */
.layer.back {
  opacity: 0.6;
  transform: scale(0.9);
}

.cell {
  width: 28px;
  height: 28px;
  background: #f0eadf;
  border: 2px solid #cfc6b8;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#jarArea {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px,1fr));
  gap: 10px;
}

.jar {
  width: 60px;
  margin: auto;
  cursor: grab;
}

.jar-top {
  background: #a8c7b8;
  font-size: 12px;
  border-radius: 8px 8px 0 0;
}

.jar-body {
  min-height: 60px;
  border-radius: 0 0 14px 14px;
  background: #e8f2ee;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

#feedback {
  height: 24px;
}

</style>
</head>

<body>

<div class="app">
  <div id="feedback"></div>
  <div id="boardContainer"></div>
  <div id="jarArea"></div>
</div>

<script>

// ===== SAVE =====
let save = JSON.parse(localStorage.getItem("besourosSave")) || {
  phase: 0,
  wins: 0,
  fails: 0
};

let currentPhase = save.phase;

// ===== STATE =====
let totalCells = 0;
let filledCells = 0;
let overflowErrors = 0;
let layers = [];

// ===== UTIL =====
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

// ===== GERADOR =====
function generatePhase() {

  const skill = save.wins / (save.wins + save.fails + 1);

  let rows = Math.floor(Math.random() * 10) + 1;
  let cols = Math.floor(Math.random() * 10) + 1;

  let depth = Math.random() < 0.4 ? 2 : 1;

  const total = rows * cols * depth;

  // solução base
  let solution = [];
  let sum = 0;

  while (sum < total) {
    let max = Math.min(6 + Math.floor(skill * 4), total - sum);
    let min = Math.max(1, max - 3);
    let v = Math.floor(Math.random() * (max - min + 1)) + min;

    solution.push(v);
    sum += v;
  }

  // extras
  let extras = [];
  let extraCount = 3 + Math.floor(Math.random() * 3);

  for (let i=0;i<extraCount;i++){
    extras.push(Math.floor(Math.random()*8)+1);
  }

  let jars = shuffle(solution.concat(extras));

  return { rows, cols, depth, jars };
}

// ===== LOAD =====
function loadPhase(){

  const data = generatePhase();

  totalCells = data.rows * data.cols * data.depth;
  filledCells = 0;
  overflowErrors = 0;

  boardContainer.innerHTML = "";
  jarArea.innerHTML = "";
  feedback.textContent = "";

  layers = [];

  for (let d = 0; d < data.depth; d++) {

    let layer = document.createElement("div");
    layer.className = "layer";
    if (d === 0 && data.depth > 1) layer.classList.add("back");

    layer.style.gridTemplateColumns = `repeat(${data.cols},28px)`;

    for (let i=0;i<data.rows*data.cols;i++){
      let c = document.createElement("div");
      c.className="cell";
      c.dataset.filled="false";
      layer.appendChild(c);
    }

    boardContainer.appendChild(layer);
    layers.push(layer);
  }

  createJars(data.jars);
}

// ===== JARS =====
function createJars(jars){

  jars.forEach((amount,i)=>{

    let jar = document.createElement("div");
    jar.className="jar";
    jar.id="jar"+i;
    jar.draggable=true;
    jar.dataset.amount=amount;

    jar.innerHTML = `
      <div class="jar-top">${amount}</div>
      <div class="jar-body">${"🐞".repeat(amount)}</div>
    `;

    jar.ondragstart=e=>{
      e.dataTransfer.setData("text", jar.id);
    };

    jarArea.appendChild(jar);
  });

  enableDrop();
}

// ===== DROP =====
function enableDrop(){

  document.querySelectorAll(".layer").forEach(layer => {

    layer.ondragover=e=>e.preventDefault();

    layer.ondrop=e=>{
      e.preventDefault();

      const jar = document.getElementById(
        e.dataTransfer.getData("text")
      );

      if(!jar)return;

      let amount = Number(jar.dataset.amount);

      let empty = [...document.querySelectorAll(".cell")]
        .filter(c=>c.dataset.filled==="false");

      empty = shuffle(empty);

      let place = Math.min(amount, empty.length);
      let extra = amount - place;

      for(let i=0;i<place;i++){
        empty[i].textContent="🐞";
        empty[i].dataset.filled="true";
      }

      if(extra>0) overflowErrors += extra;

      filledCells += place;

      jar.remove();

      checkEnd();
    };

  });
}

// ===== END =====
function checkEnd(){

  if(filledCells === totalCells){

    if(overflowErrors === 0){
      feedback.textContent = "Perfeito! ✨";
      save.wins++;
    } else {
      feedback.textContent = `Quase! Sobraram ${overflowErrors}`;
      save.fails++;
    }

    currentPhase++;
    save.phase = currentPhase;

    localStorage.setItem("besourosSave", JSON.stringify(save));

    setTimeout(loadPhase, 900);
  }
}

// ===== INIT =====
const boardContainer = document.getElementById("boardContainer");
const jarArea = document.getElementById("jarArea");
const feedback = document.getElementById("feedback");

loadPhase();

</script>

</body>
</html>
