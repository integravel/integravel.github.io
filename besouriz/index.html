<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besouros</title>

<style>

body {
  font-family: sans-serif;
  background: #f6f3ed;
  margin: 0;
  text-align: center;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

/* área fixa da grid */
#boardContainer {
  height: 340px; /* altura fixa */
  display: flex;
  align-items: center;
  justify-content: center;
}

#board {
  display: grid;
  gap: 4px;
}

/* células fixas */
.cell {
  width: 30px;
  height: 30px;

  background: #f0eadf;
  border: 2px solid #cfc6b8;
  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  transition: 0.2s;
}

.cell.filled {
  animation: pop 0.2s ease;
}

@keyframes pop {
  0% { transform: scale(0.7); }
  100% { transform: scale(1); }
}

/* jarros */
#jarArea {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 10px;
}

.jar {
  width: 60px;
  margin: auto;
  cursor: grab;
  transition: 0.2s;
}

.jar-top {
  background: #a8c7b8;
  color: #2f4f4f;
  font-size: 12px;
  border-radius: 8px 8px 0 0;
  padding: 2px;
  font-weight: bold;
}

.jar-body {
  min-height: 60px;
  border-radius: 0 0 14px 14px;

  background: linear-gradient(#e8f2ee, #d7e6df);
  border: 2px solid #aabfb6;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-content: flex-start;
  gap: 2px;
  padding: 4px;
}

.jar-body span {
  font-size: 12px;
  animation: wiggle 2s infinite ease-in-out;
}

@keyframes wiggle {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* feedback */
#feedback {
  height: 24px;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="app">
  <div id="feedback"></div>

  <div id="boardContainer">
    <div id="board"></div>
  </div>

  <div id="jarArea"></div>
</div>

<script>

// ===== ESTADO =====
let totalCells = 0;
let filledCells = 0;
let overflowErrors = 0;
let currentPhase = 0;

const basePhases = [
  { rows: 3, cols: 3, jars: [4,1,2,1,2,3] },
  { rows: 4, cols: 4, jars: [5,3,4,2,1,6,3] },
  { rows: 5, cols: 5, jars: [8,6,5,4,3,2,1,7] }
];

let currentData = null;

// ===== UTIL =====
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ===== NOVA LÓGICA DE TAMANHO =====
function getGridSize() {
  const base = 3 + Math.floor(currentPhase * 0.6);
  const variation = Math.floor(Math.random() * 3) - 1; // -1,0,1
  return Math.max(3, Math.min(10, base + variation));
}

// ===== DIFICULDADE =====
function generateDynamicPhase() {

  const size = getGridSize();
  const total = size * size;

  let jars = [];
  let sum = 0;

  while (sum < total) {
    let val = Math.floor(Math.random() * 6) + 1;
    jars.push(val);
    sum += val;
  }

  return {
    rows: size,
    cols: size,
    jars: shuffle(jars)
  };
}

// ===== LOAD =====
function loadPhase() {

  if (currentPhase < basePhases.length) {
    currentData = basePhases[currentPhase];
  } else {
    currentData = generateDynamicPhase();
  }

  totalCells = currentData.rows * currentData.cols;
  filledCells = 0;
  overflowErrors = 0;

  board.innerHTML = "";
  jarArea.innerHTML = "";
  feedback.textContent = "";

  createBoard(currentData.rows, currentData.cols);
  createJars(currentData.jars);
}

// ===== BOARD =====
function createBoard(r,c) {

  board.style.gridTemplateColumns = `repeat(${c}, 30px)`;

  for (let i=0;i<r*c;i++) {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.filled = "false";
    board.appendChild(cell);
  }

  enableDrop();
}

// ===== JAR =====
function createJars(jars) {

  jars.forEach((amount,i)=>{

    let jar = document.createElement("div");
    jar.className = "jar";
    jar.id = "jar-"+i;
    jar.draggable = true;
    jar.dataset.amount = amount;

    let bugs="";
    for (let j=0;j<amount;j++){
      bugs += "<span>🐞</span>";
    }

    jar.innerHTML = `
      <div class="jar-top">${amount}</div>
      <div class="jar-body">${bugs}</div>
    `;

    jar.ondragstart = e=>{
      e.dataTransfer.setData("text", jar.id);
    };

    jarArea.appendChild(jar);
  });
}

// ===== DROP =====
function enableDrop() {

  board.ondragover = e => e.preventDefault();

  board.ondrop = e => {

    e.preventDefault();

    const jar = document.getElementById(
      e.dataTransfer.getData("text")
    );

    if (!jar) return;

    let amount = Number(jar.dataset.amount);

    let empty = [...document.querySelectorAll(".cell")]
      .filter(c => c.dataset.filled === "false");

    empty = shuffle(empty);

    let place = Math.min(amount, empty.length);
    let extra = amount - place;

    for (let i=0;i<place;i++){
      empty[i].textContent = "🐞";
      empty[i].dataset.filled = "true";
      empty[i].classList.add("filled");
    }

    if (extra > 0) overflowErrors += extra;

    filledCells += place;

    jar.style.transform = "scale(0)";
    jar.style.opacity = "0";
    setTimeout(()=> jar.remove(), 200);

    checkEnd();
  };
}

// ===== FIM =====
function checkEnd() {
  if (filledCells === totalCells) {

    if (overflowErrors === 0) {
      feedback.textContent = "Perfeito! ✨";
    } else {
      feedback.textContent = `Quase! Sob
