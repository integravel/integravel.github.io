<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besouros</title>

<style>

body {
  font-family: sans-serif;
  background: #f6f3ed;
  margin: 0;
  text-align: center;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

#boardContainer {
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#board {
  display: grid;
  gap: 4px;
}

.cell {
  width: 30px;
  height: 30px;
  background: #f0eadf;
  border: 2px solid #cfc6b8;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#jarArea {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px,1fr));
  gap: 10px;
}

.jar {
  width: 60px;
  margin: auto;
  cursor: grab;
  transition: 0.2s;
}

.jar-top {
  background: #a8c7b8;
  font-size: 12px;
  border-radius: 8px 8px 0 0;
  padding: 2px;
}

.jar-body {
  min-height: 60px;
  border-radius: 0 0 14px 14px;
  background: #e8f2ee;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

#feedback {
  height: 24px;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="app">
  <div id="feedback"></div>
  <div id="boardContainer">
    <div id="board"></div>
  </div>
  <div id="jarArea"></div>
</div>

<script>

// ===== SAVE =====
let save = JSON.parse(localStorage.getItem("besourosSave")) || {
  phase: 0,
  wins: 0,
  fails: 0
};

let currentPhase = save.phase;

// ===== STATE =====
let totalCells = 0;
let filledCells = 0;
let overflowErrors = 0;
let totalJars = 0;

// ===== UTIL =====
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

// ===== GERADOR =====
function generatePhase() {

  const skill = save.wins / (save.wins + save.fails + 1);

  let rows = 3 + Math.floor(currentPhase * 0.4);
  let cols = 3 + Math.floor(currentPhase * 0.4);

  rows = Math.min(rows, 10);
  cols = Math.min(cols, 10);

  if (Math.random() > 0.5) cols++;

  const total = rows * cols;

  // ===== SOLUÇÃO BASE =====
  let solution = [];
  let sum = 0;

  while (sum < total) {

    let max = Math.min(6 + Math.floor(skill * 4), total - sum);
    let min = Math.max(1, max - 3);

    let value = Math.floor(Math.random() * (max - min + 1)) + min;

    solution.push(value);
    sum += value;
  }

  // ===== EXTRAS =====
  let extras = [];
  let extraCount = 3 + Math.floor(Math.random() * 3);

  for (let i = 0; i < extraCount; i++) {
    let val = Math.floor(Math.random() * (6 + Math.floor(skill * 4))) + 1;
    extras.push(val);
  }

  let jars = solution.concat(extras);

  // ordena parcialmente
  jars.sort((a,b)=>b-a);

  for (let i = jars.length - 1; i > 0; i--) {
    if (Math.random() < 0.5) {
      let j = Math.floor(Math.random() * (i+1));
      [jars[i], jars[j]] = [jars[j], jars[i]];
    }
  }

  return { rows, cols, jars };
}

// ===== LOAD =====
function loadPhase() {

  const data = generatePhase();

  totalCells = data.rows * data.cols;
  filledCells = 0;
  overflowErrors = 0;
  totalJars = data.jars.length;

  board.innerHTML = "";
  jarArea.innerHTML = "";
  feedback.textContent = "";

  createBoard(data.rows, data.cols);
  createJars(data.jars);
}

// ===== BOARD =====
function createBoard(r,c){

  board.style.gridTemplateColumns = `repeat(${c},30px)`;

  for(let i=0;i<r*c;i++){
    let d = document.createElement("div");
    d.className="cell";
    d.dataset.filled="false";
    board.appendChild(d);
  }

  enableDrop();
}

// ===== JARS =====
function createJars(jars){

  jars.forEach((amount,i)=>{

    let jar = document.createElement("div");
    jar.className="jar";
    jar.id="jar"+i;
    jar.draggable=true;
    jar.dataset.amount=amount;

    let bugs="";
    for(let j=0;j<amount;j++) bugs+="🐞";

    jar.innerHTML = `
      <div class="jar-top">${amount}</div>
      <div class="jar-body">${bugs}</div>
    `;

    jar.ondragstart=e=>{
      e.dataTransfer.setData("text", jar.id);
    };

    jarArea.appendChild(jar);
  });
}

// ===== DROP =====
function enableDrop(){

  board.ondragover=e=>e.preventDefault();

  board.ondrop=e=>{
    e.preventDefault();

    const jar = document.getElementById(
      e.dataTransfer.getData("text")
    );

    if(!jar)return;

    let amount = Number(jar.dataset.amount);

    let empty = [...document.querySelectorAll(".cell")]
      .filter(c=>c.dataset.filled==="false");

    empty = shuffle(empty);

    let place = Math.min(amount, empty.length);
    let extra = amount - place;

    for(let i=0;i<place;i++){
      empty[i].textContent="🐞";
      empty[i].dataset.filled="true";
    }

    if(extra>0) overflowErrors += extra;

    filledCells += place;

    jar.style.transform = "scale(0)";
    jar.style.opacity = "0";
    setTimeout(()=> jar.remove(), 200);

    checkEnd();
  };
}

// ===== END =====
function checkEnd(){

  if(filledCells === totalCells){

    if(overflowErrors === 0){
      feedback.textContent = `Perfeito! Usou ${totalJars - document.querySelectorAll('.jar').length} de ${totalJars} jarros ✨`;
      save.wins++;
    } else {
      feedback.textContent = `Quase! Sobraram ${overflowErrors} 🐞`;
      save.fails++;
    }

    currentPhase++;
    save.phase = currentPhase;

    localStorage.setItem("besourosSave", JSON.stringify(save));

    setTimeout(loadPhase, 900);
  }
}

// ===== INIT =====
const board = document.getElementById("board");
const jarArea = document.getElementById("jarArea");
const feedback = document.getElementById("feedback");

loadPhase();

</script>

</body>
</html>
