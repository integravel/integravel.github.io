<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  overflow:hidden;
  font-family:sans-serif;
  user-select:none;
}

#container{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#game{
  flex:1;
  display:grid;
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.wall{background:#2a2a2a;}
.floor{background:#1a1a1a;}

#entities{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

.entity{
  position:absolute;
  transition:transform 0.2s linear;
  font-size:22px;
}

.flip{transform:scaleX(-1);}

.timeMachine{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

#bottom{
  padding:10px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
}

#controls{
  display:grid;
  grid-template-areas:
    ". up ."
    "left down right";
  gap:10px;
  justify-content:center;
}

.btn{
  width:60px;
  height:60px;
  background:#333;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}

#up{grid-area:up;}
#down{grid-area:down;}
#left{grid-area:left;}
#right{grid-area:right;}
</style>
</head>

<body>

<div id="container">
  <div id="game"></div>
  <div id="entities"></div>

  <div id="bottom">
    <div id="controls">
      <div></div>
      <div id="up" class="btn">Ō¢▓</div>
      <div></div>

      <div id="left" class="btn">ŌŚĆ</div>
      <div id="down" class="btn">Ō¢╝</div>
      <div id="right" class="btn">Ō¢Č</div>
    </div>
  </div>
</div>

<script>

let map=[],W=13,H=15;
let player,clone;
let history=[];
let cellSize=28;

const game=document.getElementById("game");
const entities=document.getElementById("entities");

// ===== MAPA FIXO GARANTIDO =====
function generateMap(){

map=[
"#############",
"#P....T.....#",
"#.#####.###.#",
"#.#...#...#.#",
"#.#.###.#.#.#",
"#.#.#B#.#.#.#",
"#.#.#.#.#.#.#",
"#...#.#.#...#",
"###.#.#.###.#",
"#...#.#...#.#",
"#.###.###.#.#",
"#.....D...#G#",
"#############"
].map(r=>r.split(""));

player={x:1,y:1,dir:"L"};
clone=null;
history=[];
}

// ===== HELPERS =====
function get(x,y){
  return map[y][x];
}

function onButton(e){
  return get(e.x,e.y)==="B";
}

function doorOpen(){
  return onButton(player)||(clone&&onButton(clone));
}

function blocked(x,y){
  let c=get(x,y);
  if(c==="#")return true;
  if(c==="D"&&!doorOpen())return true;
  return false;
}

// ===== MOVE =====
function applyMove(e,dir){
  let dx=0,dy=0;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;

  let nx=e.x+dx, ny=e.y+dy;

  if(!blocked(nx,ny)){
    e.x=nx;
    e.y=ny;
    e.dir=dir;
  }
}

function move(dir){
  applyMove(player,dir);
  history.push(dir);

  if(get(player.x,player.y)==="T"){
    clone={
      x:1,y:1,
      moves:[...history],
      i:0,
      dir:"L"
    };
    cloneEl=createEntity();
  }

  drawGrid();
}

// ===== CLONE =====
function updateClone(){
  if(!clone)return;
  if(clone.i>=clone.moves.length)return;

  let dir=clone.moves[clone.i++];
  applyMove(clone,dir);
}

// ===== DRAW =====
function drawGrid(){

  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${W}, ${cellSize}px)`;
  game.style.gridTemplateRows=`repeat(${H}, ${cellSize}px)`;

  map.forEach((row,y)=>{
    row.forEach((c,x)=>{
      let d=document.createElement("div");
      d.classList.add("cell");

      if(c==="#") d.classList.add("wall");
      else d.classList.add("floor");

      if(c==="B"){
        let pressed=doorOpen();
        d.textContent=pressed?"­¤¤ó":"­¤öś";
      }

      if(c==="D"){
        if(!doorOpen()) d.textContent="­¤Ü¬";
      }

      if(c==="T"){
        d.textContent="­¤ō”";
        d.classList.add("timeMachine");
      }

      if(c==="G") d.textContent="­¤Åü";

      game.appendChild(d);
    });
  });
}

// ===== ENTITY =====
function createEntity(){
  let el=document.createElement("div");
  el.classList.add("entity");
  el.textContent="­¤”å";
  entities.appendChild(el);
  return el;
}

let playerEl=createEntity();
let cloneEl=null;

function renderEntity(e,el){
  el.style.transform=`translate(${e.x*cellSize}px,${e.y*cellSize}px)`;
  if(e.dir==="R") el.style.transform+=" scaleX(-1)";
}

// ===== LOOP =====
function loop(){
  updateClone();

  renderEntity(player,playerEl);
  if(clone && cloneEl){
    renderEntity(clone,cloneEl);
  }

  requestAnimationFrame(loop);
}

// ===== CONTROLES =====
function hold(btn,dir){
  let interval;

  btn.onpointerdown=()=>{
    move(dir);
    interval=setInterval(()=>move(dir),500);
  };

  btn.onpointerup=()=>clearInterval(interval);
  btn.onpointerleave=()=>clearInterval(interval);
}

hold(up,"U");
hold(down,"D");
hold(left,"L");
hold(right,"R");

// INIT
generateMap();
drawGrid();
loop();

</script>
</body>
</html>
