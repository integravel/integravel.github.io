<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root { --cell: min(9vw, 9vh); }

body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

#container{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#game{
  flex:1;
  display:grid;
  justify-content:center;
  align-content:start;
  padding-top:10px;
}

.cell{
  width:var(--cell);
  height:var(--cell);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:calc(var(--cell)*0.6);
}

.wall{ background:#2a2a2a; }
.floor{ background:#1a1a1a; }

.timeMachine{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); filter:brightness(1); }
  50%{ transform:scale(1.2); filter:brightness(1.6); }
  100%{ transform:scale(1); filter:brightness(1); }
}

.flip{ transform:scaleX(-1); }

#bottom{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

#timer{ font-size:26px; }

#controls{
  display:grid;
  grid-template-areas:
    ". up ."
    "left down right";
  gap:8px;
}

.btn{
  width:60px;
  height:60px;
  background:#333;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#up{grid-area:up;}
#down{grid-area:down;}
#left{grid-area:left;}
#right{grid-area:right;}

#win{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0008;
  padding:8px 16px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="win">✔ Resolvido!</div>

<div id="container">
  <div id="game"></div>

  <div id="bottom">
    <div id="timer">0</div>

    <div id="controls">
      <div></div>
      <div id="up" class="btn">▲</div>
      <div></div>

      <div id="left" class="btn">◀</div>
      <div id="down" class="btn">▼</div>
      <div id="right" class="btn">▶</div>
    </div>
  </div>
</div>

<script>

let map=[];
let W=10, H=10;

let player, clone;
let history=[];
let lastInputTime=0;

let time=0;
let reversing=false;
let rewindTimer=0;

let lastTimestamp=Date.now();

const game=document.getElementById("game");
const timerEl=document.getElementById("timer");
const winEl=document.getElementById("win");

// ===== GERAR MAPA =====

function generateMap(){

  // tamanho baseado na tela
  const cellSize = Math.min(window.innerWidth/10, window.innerHeight/12);
  W = Math.floor(window.innerWidth / cellSize) - 1;
  H = Math.floor((window.innerHeight-120) / cellSize);

  W = Math.max(8, Math.min(W, 14));
  H = Math.max(8, Math.min(H, 14));

  map = Array.from({length:H},()=>Array(W).fill("."));

  // bordas
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(x===0||y===0||x===W-1||y===H-1){
        map[y][x]="#";
      }
    }
  }

  // posições
  let start={x:1,y:1};
  let button={x:2,y:H-2};
  let timeM={x:Math.floor(W/2),y:Math.floor(H/2)};
  let door={x:W-3,y:H-2};
  let goal={x:W-2,y:H-2};

  map[start.y][start.x]="P";
  map[button.y][button.x]="B";
  map[timeM.y][timeM.x]="T";
  map[door.y][door.x]="D";
  map[goal.y][goal.x]="G";

  player={...start,dir:"R"};
  clone=null;

  history=[];
  time=0;
}

// ===== MAP =====

function getCell(x,y){
  if(!map[y]||!map[y][x]) return "#";
  return map[y][x];
}

function isOnButton(e){
  return getCell(e.x,e.y)==="B";
}

function isDoorOpen(){
  return (isOnButton(player) || (clone && isOnButton(clone)));
}

function isBlocked(x,y){
  const c=getCell(x,y);
  if(c==="#") return true;
  if(c==="D" && !isDoorOpen()) return true;
  return false;
}

// ===== MOVIMENTO =====

function applyMove(entity,dir){
  let dx=0,dy=0;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;

  const nx=entity.x+dx;
  const ny=entity.y+dy;

  if(!isBlocked(nx,ny)){
    entity.x=nx;
    entity.y=ny;
    entity.dir=dir;
  }
}

function move(dir){
  if(reversing) return;

  const delta=time-lastInputTime;
  lastInputTime=time;

  history.push({dir,delay:delta});

  applyMove(player,dir);

  if(getCell(player.x,player.y)==="T"){
    reversing=true;
    rewindTimer=0;
  }
}

// ===== CLONE =====

function updateClone(delta){
  if(!clone) return;

  clone.timer+=delta;

  while(
    clone.index<clone.commands.length &&
    clone.timer>=clone.commands[clone.index].delay
  ){
    const cmd=clone.commands[clone.index];
    clone.timer-=cmd.delay;

    applyMove(clone,cmd.dir);
    clone.index++;
  }
}

// ===== REWIND =====

function reverseTime(delta){
  rewindTimer+=delta;

  if(rewindTimer>=3){
    reversing=false;

    clone={
      x:player.x,
      y:player.y,
      commands:[...history],
      index:0,
      timer:0,
      dir:"R"
    };

    player={...clone};

    time=0;
  }
}

// ===== VITÓRIA =====

function checkWin(){
  if(getCell(player.x,player.y)==="G"){
    winEl.style.display="block";

    setTimeout(()=>{
      winEl.style.display="none";
      generateMap();
    },2000);
  }
}

// ===== RENDER =====

function draw(){

  game.style.gridTemplateColumns=`repeat(${W}, var(--cell))`;
  game.innerHTML="";

  map.forEach((row,y)=>{
    row.forEach((cell,x)=>{

      const div=document.createElement("div");
      div.classList.add("cell");

      if(cell==="#") div.classList.add("wall");
      else div.classList.add("floor");

      if(cell==="B"){
        const pressed = isOnButton(player) || (clone && isOnButton(clone));
        div.textContent = pressed ? "🟢" : "🔘";
      }

      if(cell==="D"){
        if(!isDoorOpen()) div.textContent="🚪";
      }

      if(cell==="T"){
        div.textContent="📦";
        div.classList.add("timeMachine");
      }

      if(cell==="G") div.textContent="🏁";

      if(player.x===x && player.y===y){
        div.textContent="🦆";
        if(player.dir==="L") div.classList.add("flip");
      }

      if(clone && clone.x===x && clone.y===y){
        div.textContent="🦆";
        if(clone.dir==="L") div.classList.add("flip");
      }

      game.appendChild(div);
    });
  });
}

// ===== LOOP =====

function loop(){
  const now=Date.now();
  const delta=(now-lastTimestamp)/1000;
  lastTimestamp=now;

  if(!reversing) time+=delta;
  else reverseTime(delta);

  updateClone(delta);

  timerEl.textContent=Math.floor(time);

  draw();
  checkWin();

  requestAnimationFrame(loop);
}

// ===== CONTROLES =====

let holdInterval=null;

function bind(id,dir){
  const el=document.getElementById(id);

  el.onmousedown=()=>startMove(dir);
  el.ontouchstart=(e)=>{e.preventDefault();startMove(dir);};

  el.onmouseup=stopMove;
  el.ontouchend=stopMove;
}

function startMove(dir){
  move(dir);
  holdInterval=setInterval(()=>move(dir),500);
}

function stopMove(){
  clearInterval(holdInterval);
}

bind("up","U");
bind("down","D");
bind("left","L");
bind("right","R");

// INIT
generateMap();
loop();

</script>
</body>
</html>
