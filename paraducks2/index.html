<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
  user-select:none;
}

#container{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#game{
  flex:1;
  display:grid;
  align-content:start;
  justify-content:start;
}

.cell{
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:transform 0.1s;
}

.wall{background:#2a2a2a;}
.floor{background:#1a1a1a;}

.timeMachine{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

#bottom{
  display:flex;
  justify-content:space-between;
  padding:10px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
}

#timer{
  font-size:28px;
}

#controls{
  display:grid;
  grid-template-areas:
    ". up ."
    "left down right";
  gap:10px;
}

.btn{
  width:60px;
  height:60px;
  background:#333;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}
</style>
</head>

<body>

<div id="container">
  <div id="game"></div>

  <div id="bottom">
    <div id="timer">🕒 0</div>

    <div id="controls">
      <div></div>
      <div id="up" class="btn">▲</div>
      <div></div>

      <div id="left" class="btn">◀</div>
      <div id="down" class="btn">▼</div>
      <div id="right" class="btn">▶</div>
    </div>
  </div>
</div>

<script>

let map=[],W=13,H=13;
let player,clone;
let history=[];
let time=0;
let lastInputTime=0;

let rewinding=false;
let usedMachine=false;

const game=document.getElementById("game");
const timerEl=document.getElementById("timer");

let cellSize=28;

// ===== MAPA =====
function generateMap(){
map=[
"#############",
"#P....T#....#",
"#.#####.###.#",
"#.#...#...#.#",
"#.#.###.#.#.#",
"#.#.#B#.#.#.#",
"#.#.#.#.#.#.#",
"#...#.#.#...#",
"###.#.#.###.#",
"#...#.#...#.#",
"#.###.###.#.#",
"#.....D...#G#",
"#############"
].map(r=>r.split(""));

player={x:1,y:1,dir:"L"};
clone=null;
history=[];
time=0;
lastInputTime=0;
rewinding=false;
usedMachine=false;
}

// ===== HELPERS =====
function get(x,y){return map[y][x];}
function onButton(e){return get(e.x,e.y)==="B";}
function doorOpen(){
  return onButton(player)||(clone&&onButton(clone));
}

function blocked(x,y){
  let c=get(x,y);
  if(c==="#")return true;
  if(c==="D"&&!doorOpen())return true;
  return false;
}

// ===== MOVE =====
function applyMove(e,dir){
  let dx=0,dy=0;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;

  let nx=e.x+dx, ny=e.y+dy;

  if(!blocked(nx,ny)){
    e.x=nx;
    e.y=ny;
    e.dir=dir;
  }
}

function move(dir){
  if(rewinding) return;

  const delta = time - lastInputTime;
  lastInputTime = time;

  if(!usedMachine){
    history.push({dir,delay:delta});
  }

  applyMove(player,dir);

  if(get(player.x,player.y)==="T" && !usedMachine){
    startRewind();
  }
}

// ===== REWIND =====
function startRewind(){
  rewinding=true;
  usedMachine=true;

  clone={
    x:player.x,
    y:player.y,
    commands:[...history].reverse(),
    index:0,
    timer:0,
    dir:"L"
  };
}

// ===== UPDATE =====
function update(dt){

  if(rewinding){

    time -= dt*3;
    if(time<0) time=0;

    clone.timer += dt*3;

    if(clone.index < clone.commands.length){

      let cmd = clone.commands[clone.index];

      if(clone.timer >= cmd.delay){
        clone.timer = 0;

        let rev={L:"R",R:"L",U:"D",D:"U"};
        applyMove(clone,rev[cmd.dir]);

        clone.index++;
      }

    }else{
      rewinding=false;

      clone.commands=[...history];
      clone.index=0;
      clone.timer=0;
    }

  }else{
    time+=dt;
  }

  // CLONE NORMAL
  if(clone && !rewinding){

    clone.timer += dt;

    if(clone.index < clone.commands.length){

      let cmd = clone.commands[clone.index];

      if(clone.timer >= cmd.delay){
        clone.timer -= cmd.delay;
        applyMove(clone,cmd.dir);
        clone.index++;
      }

    }else{
      clone=null;
    }
  }

  timerEl.textContent="🕒 "+Math.floor(time);

  checkWin();
}

// ===== VITÓRIA =====
function checkWin(){
  if(get(player.x,player.y)==="G" ||
     (clone && get(clone.x,clone.y)==="G")){
    
    timerEl.textContent="✔️";

    setTimeout(()=>{
      generateMap();
    },2000);
  }
}

// ===== DRAW =====
function draw(){
  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${W}, ${cellSize}px)`;

  map.forEach((row,y)=>{
    row.forEach((c,x)=>{
      let d=document.createElement("div");
      d.classList.add("cell");

      if(c==="#") d.classList.add("wall");
      else d.classList.add("floor");

      if(c==="B"){
        let pressed=doorOpen();
        d.textContent=pressed?"🟢":"🔘";
      }

      if(c==="D"){
        if(!doorOpen()) d.textContent="🚪";
      }

      if(c==="T"){
        d.textContent="📦";
        d.classList.add("timeMachine");
      }

      if(c==="G") d.textContent="🏁";

      // PLAYER
      if(player.x===x && player.y===y){
        d.textContent="🦆";
        if(player.dir==="R"){
          d.style.transform="scaleX(-1)";
        }
      }

      // CLONE
      if(clone && clone.x===x && clone.y===y){
        d.textContent="🦆";
        if(clone.dir==="R"){
          d.style.transform="scaleX(-1)";
        }
      }

      game.appendChild(d);
    });
  });
}

// ===== LOOP =====
let last=performance.now();

function loop(now){
  let dt=(now-last)/1000;
  last=now;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

// ===== CONTROLES =====
function hold(btn,dir){
  let interval;

  btn.onpointerdown=()=>{
    move(dir);
    interval=setInterval(()=>move(dir),500);
  };

  btn.onpointerup=()=>clearInterval(interval);
  btn.onpointerleave=()=>clearInterval(interval);
}

hold(up,"U");
hold(down,"D");
hold(left,"L");
hold(right,"R");

// INIT
generateMap();
draw();
requestAnimationFrame(loop);

</script>
</body>
</html>
