<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
  user-select:none;
}

#container{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

#game{
  flex:1;
  display:grid;
}

.cell{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.wall{background:#2a2a2a;}
.floor{background:#1a1a1a;}

.flip{transform:scaleX(-1);}

.timeMachine{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

#bottom{
  padding:10px;
}

#controls{
  display:grid;
  grid-template-areas:
    ". up ."
    "left down right";
  gap:10px;
  justify-content:center;
}

.btn{
  width:60px;
  height:60px;
  background:#333;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
}

#up{grid-area:up;}
#down{grid-area:down;}
#left{grid-area:left;}
#right{grid-area:right;}
</style>
</head>

<body>

<div id="container">
  <div id="game"></div>

  <div id="bottom">
    <div id="controls">
      <div></div>
      <div id="up" class="btn">▲</div>
      <div></div>

      <div id="left" class="btn">◀</div>
      <div id="down" class="btn">▼</div>
      <div id="right" class="btn">▶</div>
    </div>
  </div>
</div>

<script>

let map=[],W,H;
let player,clone;
let history=[];

const game=document.getElementById("game");

// ===== GERAR LABIRINTO (DFS) =====
function generateMaze(w,h){

  let maze = Array.from({length:h},()=>Array(w).fill("#"));

  function carve(x,y){
    let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
      .sort(()=>Math.random()-0.5);

    for(let [dx,dy] of dirs){
      let nx=x+dx, ny=y+dy;
      if(ny>0&&ny<h-1&&nx>0&&nx<w-1 && maze[ny][nx]==="#"){
        maze[ny][nx]=".";
        maze[y+dy/2][x+dx/2]=".";
        carve(nx,ny);
      }
    }
  }

  maze[1][1]=".";
  carve(1,1);
  return maze;
}

// ===== MAPA =====
function generateMap(){

  const controlsHeight=120;
  const cellSize=28;

  W=Math.floor(window.innerWidth/cellSize);
  H=Math.floor((window.innerHeight-controlsHeight)/cellSize);

  if(W%2===0)W--;
  if(H%2===0)H--;

  map = generateMaze(W,H);

  // posições fixas estratégicas
  let start={x:1,y:1};
  let button={x:1,y:H-2};
  let timeM={x:Math.floor(W/2),y:1};
  let door={x:Math.floor(W/2),y:Math.floor(H/2)};
  let goal={x:W-2,y:H-2};

  // limpar caminho mínimo garantido
  function digLine(a,b){
    let x=a.x,y=a.y;
    while(x!==b.x || y!==b.y){
      map[y][x]=".";
      if(x<b.x)x++; else if(x>b.x)x--;
      if(y<b.y)y++; else if(y>b.y)y--;
    }
  }

  digLine(start,button);
  digLine(start,timeM);
  digLine(button,door);
  digLine(door,goal);

  map[start.y][start.x]="P";
  map[button.y][button.x]="B";
  map[timeM.y][timeM.x]="T";
  map[door.y][door.x]="D";
  map[goal.y][goal.x]="G";

  player={...start,dir:"L"};
  clone=null;
  history=[];
}

// ===== LÓGICA =====
function get(x,y){
  if(!map[y]||!map[y][x]) return "#";
  return map[y][x];
}

function onButton(e){
  return get(e.x,e.y)==="B";
}

function doorOpen(){
  return onButton(player)||(clone&&onButton(clone));
}

function blocked(x,y){
  let c=get(x,y);
  if(c==="#")return true;
  if(c==="D"&&!doorOpen())return true;
  return false;
}

function applyMove(e,dir){
  let dx=0,dy=0;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;

  let nx=e.x+dx, ny=e.y+dy;

  if(!blocked(nx,ny)){
    e.x=nx;
    e.y=ny;
    e.dir=dir;
  }
}

function move(dir){
  applyMove(player,dir);
  history.push(dir);

  if(get(player.x,player.y)==="T"){
    clone={
      x:1,y:1,
      moves:[...history],
      i:0,
      dir:"L"
    };
  }
}

function updateClone(){
  if(!clone)return;
  if(clone.i>=clone.moves.length)return;

  let dir=clone.moves[clone.i++];
  applyMove(clone,dir);
}

// ===== RENDER =====
function draw(){

  game.style.gridTemplateColumns=`repeat(${W},1fr)`;
  game.innerHTML="";

  map.forEach((row,y)=>{
    row.forEach((c,x)=>{

      let d=document.createElement("div");
      d.classList.add("cell");

      if(c==="#") d.classList.add("wall");
      else d.classList.add("floor");

      if(c==="B"){
        let pressed = onButton(player)||(clone&&onButton(clone));
        d.textContent = pressed ? "🟢" : "🔘";
      }

      if(c==="D"){
        if(!doorOpen()) d.textContent="🚪";
      }

      if(c==="T"){
        d.textContent="📦";
        d.classList.add("timeMachine");
      }

      if(c==="G") d.textContent="🏁";

      if(player.x===x&&player.y===y){
        d.textContent="🦆";
        if(player.dir==="R") d.classList.add("flip");
      }

      if(clone && clone.x===x && clone.y===y){
        d.textContent="🦆";
        if(clone.dir==="R") d.classList.add("flip");
      }

      game.appendChild(d);
    });
  });
}

// ===== LOOP =====
function loop(){
  updateClone();
  draw();
  requestAnimationFrame(loop);
}

// ===== CONTROLES =====
function bind(id,dir){
  document.getElementById(id).onclick=()=>move(dir);
}

bind("up","U");
bind("down","D");
bind("left","L");
bind("right","R");

// INIT
generateMap();
loop();

</script>
</body>
</html>
