<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

#game{
  height:70vh;
  display:grid;
  justify-content:center;
  align-content:center;
}

.cell{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.wall{background:#333;}
.floor{background:#1a1a1a;}

.flip{transform:scaleX(-1);}

#controls{
  display:grid;
  grid-template-areas:
    ". up ."
    "left down right";
  gap:10px;
  justify-content:center;
}

.btn{
  width:60px;
  height:60px;
  background:#333;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="game"></div>

<div id="controls">
  <div></div>
  <div id="up" class="btn">▲</div>
  <div></div>

  <div id="left" class="btn">◀</div>
  <div id="down" class="btn">▼</div>
  <div id="right" class="btn">▶</div>
</div>

<script>

// ===== MAPA PERFEITO =====
let map=[
"###########",
"#P....T...#",
"#.#####.#.#",
"#.#...#.#.#",
"#.#.B.#.#.#",
"#.#...#.#.#",
"#.#####.#.#",
"#.....D..G#",
"###########"
].map(r=>r.split(""));

// ===== ESTADO =====
let player={x:1,y:1,dir:"R"};
let clone=null;
let history=[];

// ===== FUNÇÕES =====
function get(x,y){return map[y][x];}

function onButton(e){
  return get(e.x,e.y)==="B";
}

function doorOpen(){
  return onButton(player) || (clone && onButton(clone));
}

function blocked(x,y){
  if(get(x,y)==="#") return true;
  if(get(x,y)==="D" && !doorOpen()) return true;
  return false;
}

function move(dir){
  let dx=0,dy=0;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;

  let nx=player.x+dx;
  let ny=player.y+dy;

  if(!blocked(nx,ny)){
    player.x=nx;
    player.y=ny;
    player.dir=dir;
    history.push(dir);
  }

  if(get(player.x,player.y)==="T"){
    clone={
      x:1,y:1,
      moves:[...history],
      i:0
    };
  }
}

function updateClone(){
  if(!clone) return;
  if(clone.i>=clone.moves.length) return;

  let dir=clone.moves[clone.i];
  clone.i++;

  let dx=0,dy=0;
  if(dir==="L")dx=-1;
  if(dir==="R")dx=1;
  if(dir==="U")dy=-1;
  if(dir==="D")dy=1;

  let nx=clone.x+dx;
  let ny=clone.y+dy;

  if(!blocked(nx,ny)){
    clone.x=nx;
    clone.y=ny;
  }
}

// ===== RENDER =====
function draw(){
  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${map[0].length},40px)`;

  map.forEach((row,y)=>{
    row.forEach((c,x)=>{
      let d=document.createElement("div");
      d.classList.add("cell");

      if(c==="#") d.classList.add("wall");
      else d.classList.add("floor");

      if(c==="B") d.textContent="🔘";
      if(c==="D" && !doorOpen()) d.textContent="🚪";
      if(c==="T") d.textContent="📦";
      if(c==="G") d.textContent="🏁";

      if(player.x===x && player.y===y){
        d.textContent="🦆";
        if(player.dir==="R") d.classList.add("flip");
      }

      if(clone && clone.x===x && clone.y===y){
        d.textContent="🦆";
      }

      game.appendChild(d);
    });
  });
}

// ===== LOOP =====
function loop(){
  updateClone();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== CONTROLES =====
function bind(id,dir){
  document.getElementById(id).onclick=()=>move(dir);
}
bind("up","U");
bind("down","D");
bind("left","L");
bind("right","R");

</script>
</body>
</html>
