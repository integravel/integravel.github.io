<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* MENU NO TOPO */
.screen {
    display: none;
    min-height: 100vh;
    justify-content: flex-start; /* 🔥 mudou aqui */
    align-items: flex-start;     /* 🔥 mudou aqui */
    padding: 20px;
}
.active { display: flex; }

.container {
    background: white;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.label {
    font-size: 13px;
    color: #666;
    margin: 6px 0 4px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #4facfe;
    color: white;
    cursor: pointer;
}

/* 🔥 HISTÓRICO */
#history {
    margin-top: 15px;
    max-height: 200px;
    overflow-y: auto;
    border-top: 1px solid #ddd;
    padding-top: 10px;
}

.history-item {
    background: #f5f5f5;
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 8px;
    font-size: 12px;
}

.history-buttons {
    display: flex;
    gap: 5px;
    margin-top: 5px;
}

.small-btn {
    flex: 1;
    padding: 6px;
    font-size: 11px;
}

.delete { background: #ff5c5c; }

#canvas {
    width: 100%;
    border-radius: 12px;
    background: black;
}

.graph-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

#loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
<div class="container">

<div class="label">📐 Tamanho (px)</div>
<div class="grid">
<input id="width" value="400">
<input id="height" value="400">
</div>

<div class="label">🔵 Real</div>
<div class="grid">
<input id="xmin" value="-2">
<input id="xmax" value="2">
</div>

<div class="label">🟣 Imaginário</div>
<div class="grid">
<input id="ymin" value="-2">
<input id="ymax" value="2">
</div>

<div class="label">🧠 Função</div>
<input id="func" value="z^2">

<button onclick="gerar()">Gerar Gráfico</button>

<!-- 🔥 HISTÓRICO -->
<div id="history"></div>
<button onclick="limparHistorico()">Limpar histórico</button>

</div>
</div>

<div id="grafico" class="screen">
<div class="container">

<canvas id="canvas"></canvas>

<div class="graph-buttons">
<button onclick="voltar()">Voltar</button>
<button onclick="baixar()">Salvar</button>
</div>

</div>
</div>

<div id="loading">Gerando imagem...</div>

<script>
function trocarTela(a,b){
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

function showLoading(v){
    document.getElementById("loading").style.display = v ? "flex":"none";
}

/* 🔥 HISTÓRICO */
function salvarHistorico(dados){
    let hist = JSON.parse(localStorage.getItem("historico") || "[]");
    hist.unshift(dados);
    localStorage.setItem("historico", JSON.stringify(hist));
    renderHistorico();
}

function renderHistorico(){
    let hist = JSON.parse(localStorage.getItem("historico") || "[]");
    let div = document.getElementById("history");
    div.innerHTML = "";

    hist.forEach((item, i)=>{
        let el = document.createElement("div");
        el.className = "history-item";

        el.innerHTML = `
            <b>${item.func}</b><br>
            ${item.xmin} → ${item.xmax} | ${item.ymin} → ${item.ymax}

            <div class="history-buttons">
                <button class="small-btn" onclick="carregar(${i})">Carregar</button>
                <button class="small-btn delete" onclick="apagar(${i})">Apagar</button>
            </div>
        `;

        div.appendChild(el);
    });
}

function carregar(i){
    let hist = JSON.parse(localStorage.getItem("historico"));
    let d = hist[i];

    width.value=d.w;
    height.value=d.h;
    xmin.value=d.xmin;
    xmax.value=d.xmax;
    ymin.value=d.ymin;
    ymax.value=d.ymax;
    func.value=d.func;
}

function apagar(i){
    let hist = JSON.parse(localStorage.getItem("historico"));
    hist.splice(i,1);
    localStorage.setItem("historico", JSON.stringify(hist));
    renderHistorico();
}

function limparHistorico(){
    localStorage.removeItem("historico");
    renderHistorico();
}

function complexToColor(z){
    let arg=Math.atan2(z.im,z.re);
    let mag=Math.hypot(z.re,z.im);
    let hue=(arg+Math.PI)/(2*Math.PI);
    let val=1-Math.exp(-mag);
    return hsvToRgb(hue,1,val);
}

function hsvToRgb(h,s,v){
    let i=Math.floor(h*6);
    let f=h*6-i;
    let p=v*(1-s);
    let q=v*(1-f*s);
    let t=v*(1-(1-f)*s);
    let r,g,b;
    switch(i%6){
        case 0:r=v,g=t,b=p;break;
        case 1:r=q,g=v,b=p;break;
        case 2:r=p,g=v,b=t;break;
        case 3:r=p,g=q,b=v;break;
        case 4:r=t,g=p,b=v;break;
        case 5:r=v,g=p,b=q;break;
    }
    return [r*255,g*255,b*255];
}

function gerar(){
    trocarTela("menu","grafico");
    showLoading(true);

    requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{

            let w=+width.value;
            let h=+height.value;
            let xminv=+xmin.value;
            let xmaxv=+xmax.value;
            let yminv=+ymin.value;
            let ymaxv=+ymax.value;
            let expr=func.value;

            /* 🔥 SALVA */
            salvarHistorico({
                w,h,xmin:xminv,xmax:xmaxv,ymin:yminv,ymax:ymaxv,func:expr
            });

            let canvas=document.getElementById("canvas");
            canvas.width=w;
            canvas.height=h;

            let ctx=canvas.getContext("2d");
            let img=ctx.createImageData(w,h);

            let compiled;
            try{
                compiled=math.compile(expr);
            }catch{
                alert("Erro na função");
                voltar();
                showLoading(false);
                return;
            }

            for(let y=0;y<h;y++){
                for(let x=0;x<w;x++){

                    let a=xminv+x/w*(xmaxv-xminv);
                    let b=yminv+y/h*(ymaxv-yminv);

                    let z=math.complex(a,b);

                    let r;
                    try{
                        r=compiled.evaluate({z:z});
                    }catch{
                        r=math.complex(0,0);
                    }

                    let [R,G,B]=complexToColor(r);

                    let i=(y*w+x)*4;
                    img.data[i]=R;
                    img.data[i+1]=G;
                    img.data[i+2]=B;
                    img.data[i+3]=255;
                }
            }

            ctx.putImageData(img,0,0);
            showLoading(false);

        });
    });
}

function voltar(){
    trocarTela("grafico","menu");
}

function baixar(){
    let link=document.createElement("a");
    link.download="grafico.png";
    link.href=canvas.toDataURL();
    link.click();
}

/* 🔥 INICIALIZA */
renderHistorico();
</script>

</body>
</html>
