<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Função Complexa</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.screen {
    display: none;
    min-height: 100vh;
    width: 100%;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.active { display: flex; }

.container {
    background: white;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

h2 { text-align: center; }

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

@media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

#canvas {
    width: 100%;
    border-radius: 12px;
    background: black;
}

.graph-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

#loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

.bar {
    width: 200px;
    height: 10px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress {
    height: 100%;
    width: 0%;
    background: #4facfe;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
    <div class="container">
        <h2>Função Complexa</h2>

        <div class="grid">
            <input id="width" type="number" value="400">
            <input id="height" type="number" value="400">
        </div>

        <div class="grid">
            <input id="xmin" type="number" value="-2">
            <input id="xmax" type="number" value="2">
        </div>

        <div class="grid">
            <input id="ymin" type="number" value="-2">
            <input id="ymax" type="number" value="2">
        </div>

        <input id="func" value="z^2">

        <button onclick="gerar()">Gerar Gráfico</button>
    </div>
</div>

<div id="grafico" class="screen">
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="graph-buttons">
            <button onclick="voltar()">Voltar</button>
            <button onclick="baixar()">Salvar</button>
        </div>
    </div>
</div>

<div id="loading">
    <div>Gerando imagem...</div>
    <div class="bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
function trocarTela(a, b) {
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

function showLoading(show) {
    document.getElementById("loading").style.display = show ? "flex" : "none";
}

function complexToColor(z) {
    let arg = Math.atan2(z.im, z.re);
    let mag = Math.sqrt(z.re*z.re + z.im*z.im);

    let hue = (arg + Math.PI) / (2 * Math.PI);
    let val = 1 - Math.exp(-mag);

    return hsvToRgb(hue, 1, val);
}

function hsvToRgb(h, s, v) {
    let i = Math.floor(h * 6);
    let f = h * 6 - i;
    let p = v * (1 - s);
    let q = v * (1 - f * s);
    let t = v * (1 - (1 - f) * s);

    let r, g, b;
    switch(i % 6){
        case 0: r=v; g=t; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
    }

    return [r*255, g*255, b*255];
}

function gerar() {
    trocarTela("menu", "grafico");
    showLoading(true);

    setTimeout(() => {

        let w = +document.getElementById("width").value;
        let h = +document.getElementById("height").value;

        let xmin = +document.getElementById("xmin").value;
        let xmax = +document.getElementById("xmax").value;
        let ymin = +document.getElementById("ymin").value;
        let ymax = +document.getElementById("ymax").value;

        let expr = document.getElementById("func").value;

        let canvas = document.getElementById("canvas");
        canvas.width = w;
        canvas.height = h;

        let ctx = canvas.getContext("2d");
        let img = ctx.createImageData(w, h);

        let compiled;
        try {
            compiled = math.compile(expr);
        } catch {
            alert("Erro na função!");
            voltar();
            showLoading(false);
            return;
        }

        for(let py = 0; py < h; py++) {

            document.getElementById("progress").style.width =
                (py / h * 100) + "%";

            for(let px = 0; px < w; px++) {

                let a = xmin + (px / w) * (xmax - xmin);
                let b = ymin + (py / h) * (ymax - ymin);

                let z = math.complex(a, b);

                let result;
                try {
                    result = compiled.evaluate({ z: z });
                } catch {
                    result = math.complex(0,0);
                }

                let [r,g,bc] = complexToColor(result);

                let i = (py*w + px)*4;
                img.data[i] = r;
                img.data[i+1] = g;
                img.data[i+2] = bc;
                img.data[i+3] = 255;
            }
        }

        ctx.putImageData(img, 0, 0);
        showLoading(false);

    }, 50);
}

function voltar() {
    trocarTela("grafico", "menu");
}

function baixar() {
    let link = document.createElement("a");
    link.download = "grafico.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
