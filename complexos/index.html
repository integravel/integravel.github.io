<div id="menu" class="screen active">
    <div class="container">
        <h2>Função Complexa</h2>

        <p><b>📐 Tamanho da imagem</b><br>
        Define a resolução do gráfico em pixels.</p>

        <div class="grid">
            <input id="width" type="number" value="400" placeholder="Largura (px)">
            <input id="height" type="number" value="400" placeholder="Altura (px)">
        </div>

        <p><b>🔵 Intervalo Real (a)</b><br>
        Valores do eixo horizontal (parte real).</p>

        <div class="grid">
            <input id="xmin" type="number" value="-2" placeholder="Mínimo">
            <input id="xmax" type="number" value="2" placeholder="Máximo">
        </div>

        <p><b>🟣 Intervalo Imaginário (b)</b><br>
        Valores do eixo vertical (parte imaginária).</p>

        <div class="grid">
            <input id="ymin" type="number" value="-2" placeholder="Mínimo">
            <input id="ymax" type="number" value="2" placeholder="Máximo">
        </div>

        <p><b>🧠 Função f(z)</b><br>
        Digite usando notação matemática.<br>
        Ex: <i>z^2, sin(z), exp(z), 1/z</i></p>

        <input id="func" value="z^2">

        <button onclick="gerar()">Gerar Gráfico</button>
    </div>
</div>
