<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Função Complexa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* TELAS */
.screen {
    display: none;
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 15px;
}

.active {
    display: flex;
}

/* CONTAINER */
.container {
    background: white;
    width: 100%;
    max-width: 420px;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* GRID para organizar melhor no mobile */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #00c6ff;
}

/* TELA DO GRÁFICO */
#canvas {
    width: 100%;
    height: auto;
    border-radius: 12px;
    background: black;
}

/* BOTÕES DO GRÁFICO */
.graph-buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.graph-buttons button {
    flex: 1;
}

/* RESPONSIVO */
@media (max-width: 400px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- TELA MENU -->
<div id="menu" class="screen active">
    <div class="container">
        <h2>Função Complexa</h2>

        <div class="grid">
            <input type="number" id="width" placeholder="Largura" value="400">
            <input type="number" id="height" placeholder="Altura" value="400">
        </div>

        <div class="grid">
            <input type="number" id="xmin" placeholder="X min" value="-2">
            <input type="number" id="xmax" placeholder="X max" value="2">
        </div>

        <div class="grid">
            <input type="number" id="ymin" placeholder="Y min" value="-2">
            <input type="number" id="ymax" placeholder="Y max" value="2">
        </div>

        <input type="text" id="func" placeholder="Ex: sin(z), z^2, exp(z)" value="z^2">

        <button onclick="gerar()">Gerar Gráfico</button>
    </div>
</div>

<!-- TELA GRÁFICO -->
<div id="grafico" class="screen">
    <div class="container">
        <canvas id="canvas"></canvas>

        <div class="graph-buttons">
            <button onclick="voltar()">Voltar</button>
            <button onclick="baixar()">Salvar</button>
        </div>
    </div>
</div>

<script>
function trocarTela(de, para) {
    document.getElementById(de).classList.remove("active");
    document.getElementById(para).classList.add("active");
}

function complexToColor(z) {
    let arg = Math.atan2(z.im, z.re);
    let mag = Math.sqrt(z.re*z.re + z.im*z.im);

    let hue = (arg + Math.PI) / (2 * Math.PI);
    let val = 1 - Math.exp(-mag);

    return hsvToRgb(hue, 1, val);
}

function hsvToRgb(h, s, v) {
    let i = Math.floor(h * 6);
    let f = h * 6 - i;
    let p = v * (1 - s);
    let q = v * (1 - f * s);
    let t = v * (1 - (1 - f) * s);

    let r, g, b;
    switch(i % 6){
        case 0: r=v, g=t, b=p; break;
        case 1: r=q, g=v, b=p; break;
        case 2: r=p, g=v, b=t; break;
        case 3: r=p, g=q, b=v; break;
        case 4: r=t, g=p, b=v; break;
        case 5: r=v, g=p, b=q; break;
    }

    return [r*255, g*255, b*255];
}

function gerar() {
    trocarTela("menu", "grafico");

    let w = parseInt(document.getElementById("width").value);
    let h = parseInt(document.getElementById("height").value);

    let xmin = parseFloat(document.getElementById("xmin").value);
    let xmax = parseFloat(document.getElementById("xmax").value);

    let ymin = parseFloat(document.getElementById("ymin").value);
    let ymax = parseFloat(document.getElementById("ymax").value);

    let expr = document.getElementById("func").value;

    let canvas = document.getElementById("canvas");
    canvas.width = w;
    canvas.height = h;

    let ctx = canvas.getContext("2d");
    let img = ctx.createImageData(w, h);

    let compiled;
    try {
        compiled = math.compile(expr);
    } catch {
        alert("Erro na função!");
        voltar();
        return;
    }

    for(let px = 0; px < w; px++) {
        for(let py = 0; py < h; py++) {

            let a = xmin + (px / w) * (xmax - xmin);
            let b = ymin + (py / h) * (ymax - ymin);

            let z = math.complex(a, b);

            let result;
            try {
                result = compiled.evaluate({ z: z });
            } catch {
                result = math.complex(0,0);
            }

            let [r,g,bcolor] = complexToColor(result);

            let idx = (py * w + px) * 4;
            img.data[idx] = r;
            img.data[idx+1] = g;
            img.data[idx+2] = bcolor;
            img.data[idx+3] = 255;
        }
    }

    ctx.putImageData(img, 0, 0);
}

function voltar() {
    trocarTela("grafico", "menu");
}

function baixar() {
    let canvas = document.getElementById("canvas");
    let link = document.createElement("a");
    link.download = "grafico.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
