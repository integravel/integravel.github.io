<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Demonstração — √2 é irracional</title>

  <!-- ✅ CONFIG MathJax (CORRIGE A FONTE) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']]
      },
      chtml: {
        mtextInheritFont: true
      }
    };
  </script>

  <!-- MathJax -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<main>

  <p class="enunciado">
    <strong>Teorema.</strong>
    \( \sqrt{2} \) é irracional.
  </p>

  <p class="line">
    <strong>Demonstração.</strong>
    Suponha, por absurdo, que \( \sqrt{2} \) seja racional.
  </p>

  <p class="line">
    Então \( \sqrt{2} = \frac{a}{b} \), com \( a, b \in \mathbb{Z} \) e fração irredutível.
  </p>

  <!-- DROPZONES -->
  <div class="line dropzone" data-expected="1"></div>
  <div class="line dropzone" data-expected="2"></div>
  <div class="line dropzone" data-expected="3"></div>
  <div class="line dropzone" data-expected="4"></div>
  <div class="line dropzone" data-expected="5"></div>
  <div class="line dropzone" data-expected="6"></div>

  <p class="line">
    Isso contradiz o fato de que a fração é irredutível.
  </p>

  <p class="line">
    Logo, \( \sqrt{2} \) é irracional.
  </p>

  <div class="options dropzone-return"></div>

</main>

<!-- 🐱 GATO -->
<div id="pet-root">
  <img id="pet" src="cat_idle.png" draggable="false">
  <img id="pet-hand" src="" draggable="false">
</div>

<script src="script.js"></script>
</body>
</html>
