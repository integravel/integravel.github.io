<body>
<main>

  <h2>Demonstração — Mudança de Base</h2>

  <div class="line"><strong>Teorema.</strong> \( \log_b a = \frac{\log_c a}{\log_c b} \).</div>

  <div class="line"><strong>Demonstração.</strong> Seja \(x = \log_b a\).</div>
  <div class="line">Então, pela definição de logaritmo, \(b^x = a\).</div>

  <!-- DRAG DROP (6 partes) -->
  <div class="line dropzone" data-expected="1"></div>
  <div class="line dropzone" data-expected="2"></div>
  <div class="line dropzone" data-expected="3"></div>
  <div class="line dropzone" data-expected="4"></div>
  <div class="line dropzone" data-expected="5"></div>
  <div class="line dropzone" data-expected="6"></div>

  <!-- FINAL -->
  <div class="line">Mas \(x = \log_b a\), portanto \( \log_b a = \frac{\log_c a}{\log_c b} \).</div>

  <!-- OPÇÕES -->
  <div class="options dropzone-return"></div>

</main>
